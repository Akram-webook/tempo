  <script>
/* ============================================================
 * Webook Workload — Role dashboard (Director / Senior / Manager / Employee)
 * ------------------------------------------------------------
 * One route that adapts to the viewer's role, built from REAL computed
 * data (capacity engine + growth signals + access scope). No mock numbers.
 * ========================================================== */
(function (WP) {
  'use strict';
  const ui = WP.ui;

  function kpi(label, value, sub, color) {
    return '<div class="card"><div class="label">' + label + '</div>' +
      '<div class="value"' + (color ? ' style="color:' + color + '"' : '') + '>' + value + '</div>' +
      '<div class="sub">' + (sub || '') + '</div></div>';
  }
  /* Team Health on sample/empty data: a bare "0%" reads as broken/alarming, not
   * calm. When no real load signal exists yet, show a neutral "no data" state
   * instead of a misleading 0% (S1 — Calm UI). A real 0% with load is still shown. */
  function teamHealthKpi(m) {
    const t = WP.i18n.t;
    const hasData = m.snaps.some(function (s) { return s.load > 0; });
    if (!hasData) return kpi(t('teamHealth'), '—', t('noDataYet'), 'var(--text-muted)');
    // S3-3 — frame the headline as "{h} of {n} in healthy band" so a low/zero
    // percentage reads as informative (band split) rather than an alarm.
    const split = t('healthyBandSplit').replace('{h}', m.healthyCount).replace('{n}', m.size);
    return kpi(t('teamHealth'), m.teamHealth + '%', split, 'var(--state-balanced)');
  }
  function ofPeople(n) { return WP.i18n.t('ofPeople').replace('{n}', n); }
  function loadBar(pct) {
    const c = ui.stateColor(WP.capacity.stateForLoad(pct));
    return '<span class="bar"><i style="width:' + Math.min(100, pct) + '%;background:' + c + '"></i></span>';
  }
  function personRow(p, snap, rightHtml) {
    const c = ui.stateColor(snap.state);
    return '<div class="dash-row" data-open="' + p.id + '" style="--node-accent:' + c + '">' +
      ui.avatar(p, c) +
      '<div class="dash-meta"><div class="nm">' + ui.esc(WP.i18n.name(p)) + '</div>' +
        '<div class="ttl">' + ui.esc(WP.i18n.title(p)) + '</div></div>' +
      (rightHtml || '') + '</div>';
  }
  function stateChip(snap) {
    const c = ui.stateColor(snap.state);
    return '<span class="dash-pct" style="color:' + c + '">' + snap.load + '%</span>';
  }

  function director(root, viewer) {
    const t = WP.i18n.t, win = WP.state.window, ref = WP.state.refDate;
    const people = WP.access.visiblePeople(viewer);
    const m = WP.capacity.teamMetrics(people, win, ref);
    const attn = m.snaps.filter(function (s) {
      return s.state.key === 'overloaded' || s.state.key === 'near' || s.burnout;
    }).sort(function (a, b) { return b.load - a.load; }).slice(0, 6);

    let risk = 0, promo = 0, ramp = 0;
    people.forEach(function (p) {
      if (WP.growth.flightRisk(p).risk) risk++;
      if (WP.growth.promotionReadiness(p).pct >= 70) promo++;
      if (WP.growth.isRamping(p)) ramp++;
    });

    const leads = WP.access.directReports(viewer.id);
    const teamRows = leads.map(function (lead) {
      const team = WP.access.teamOf(lead.id);
      const tm = WP.capacity.teamMetrics(team, win, ref);
      const avg = Math.round(tm.snaps.reduce(function (a, s) { return a + s.load; }, 0) / (tm.snaps.length || 1));
      return '<div class="lr"><span class="nm">' + ui.esc(WP.i18n.name(lead).split(' ')[0]) +
        '<span class="ttl"> · ' + team.length + '</span></span>' + loadBar(avg) +
        '<span class="dash-pct">' + avg + '%</span>' +
        '<span class="tag">' + tm.teamHealth + '% ' + t('healthy') + '</span></div>';
    }).join('');

    const attnHtml = attn.length ? attn.map(function (s) {
      const p = WP.access.byId(s.id);
      const reason = s.burnout ? t('burnoutShort') : t('overloadedShort');
      return personRow(p, s, stateChip(s) +
        '<span class="tag" style="color:var(--state-' + (s.state.key === 'overloaded' || s.burnout ? 'overloaded' : 'near') + ')">' + reason + '</span>');
    }).join('') : '<div class="sub">' + t('allClear') + '</div>';

    root.innerHTML =
      '<div class="ttl">' + t('navDashboard') + ' · ' + t('director') + '</div>' +
      '<h2 style="margin:2px 0 16px">' + t('hi') + (WP.state.lang === 'ar' ? '، ' : ', ') + ui.esc(WP.i18n.name(viewer).split(' ')[0]) + '</h2>' +
      '<div class="metrics">' +
        teamHealthKpi(m) +
        kpi(t('available'), m.counts.available, ofPeople(people.length)) +
        kpi(t('nearCapacity'), m.nearOrOver, t('nearCapSub')) +
        kpi(t('earlyWarnings'), m.earlyWarnings, t('burnoutShort')) +
      '</div>' +
      '<div class="grid-2" style="align-items:start">' +
        '<div class="section"><h3>' + WP.ui.icon('alert', 16) + ' ' + t('needsAttention') + '</h3>' + attnHtml + '</div>' +
        '<div class="section"><h3>' + WP.ui.icon('sprout', 16) + ' ' + t('talent') + '</h3>' +
          '<div class="metrics" style="grid-template-columns:repeat(3,1fr)">' +
            kpi(t('newSkillShort'), promo, t('promoReady'), 'var(--state-available)') +
            kpi(t('flightRisk').split(' ')[0], risk, t('flightRisk'), 'var(--state-overloaded)') +
            kpi(t('rampingShort'), ramp, t('rampingUp').split('—')[0]) +
          '</div></div>' +
      '</div>' +
      '<div class="section"><h3>' + WP.ui.icon('users', 16) + ' ' + t('teamLoad') + '</h3>' + (teamRows || '<div class="sub">—</div>') + '</div>';
  }

  function leader(root, viewer) {
    const t = WP.i18n.t, win = WP.state.window, ref = WP.state.refDate;
    const team = WP.access.teamOf(viewer.id);
    const reports = team.filter(function (p) { return p.id !== viewer.id; });
    const m = WP.capacity.teamMetrics(team, win, ref);
    const snaps = {}; m.snaps.forEach(function (s) { snaps[s.id] = s; });

    const free = reports.slice().sort(function (a, b) { return snaps[a.id].load - snaps[b.id].load; }).slice(0, 5);
    const attn = reports.filter(function (p) {
      const s = snaps[p.id]; return s.state.key === 'overloaded' || s.state.key === 'near' || s.burnout;
    });
    const develop = reports.filter(function (p) { return WP.growth.promotionReadiness(p).fairnessGap || WP.growth.isRamping(p); });

    const freeHtml = free.length ? free.map(function (p) {
      const s = snaps[p.id];
      return personRow(p, s, stateChip(s) + (WP.access.canAct(viewer) && s.state.key !== 'overloaded'
        ? '<button class="btn" data-assign="' + p.id + '">' + t('assign') + '</button>'
        : '<span class="tag">' + WP.i18n.stateLabel(s.state) + '</span>'));
    }).join('') : '<div class="sub">—</div>';
    const attnHtml = attn.length ? attn.map(function (p) {
      const s = snaps[p.id];
      return personRow(p, s, stateChip(s) + '<span class="tag" style="color:var(--state-overloaded)">' + (s.burnout ? t('burnoutShort') : t('overloadedShort')) + '</span>');
    }).join('') : '<div class="sub">' + t('allClear') + '</div>';
    const devHtml = develop.length ? develop.map(function (p) {
      const pr = WP.growth.promotionReadiness(p);
      return personRow(p, snaps[p.id], '<span class="tag" style="color:var(--state-balanced)">' +
        (WP.growth.isRamping(p) ? t('rampingShort') : t('toDevelop')) + '</span>');
    }).join('') : '<div class="sub">—</div>';

    root.innerHTML =
      '<div class="ttl">' + t('navDashboard') + ' · ' + (viewer.level === 'sr_manager' ? t('director') : t('manager')) + '</div>' +
      '<h2 style="margin:2px 0 16px">' + t('hi') + (WP.state.lang === 'ar' ? '، ' : ', ') + ui.esc(WP.i18n.name(viewer).split(' ')[0]) + '</h2>' +
      '<div class="metrics">' +
        teamHealthKpi(m) +
        kpi(t('freeForWork'), m.counts.available, ofPeople(reports.length), 'var(--state-available)') +
        kpi(t('nearCapacity'), m.nearOrOver, t('nearCapSub'), 'var(--state-overloaded)') +
        kpi(t('toDevelop'), develop.length, t('talent')) +
      '</div>' +
      '<div class="grid-2" style="align-items:start">' +
        '<div class="section"><h3>' + WP.ui.icon('user', 16) + ' ' + t('whoCanTake') + '</h3>' + freeHtml + '</div>' +
        '<div class="section"><h3>' + WP.ui.icon('alert', 16) + ' ' + t('needsAttention') + '</h3>' + attnHtml + '</div>' +
      '</div>' +
      '<div class="section"><h3>' + WP.ui.icon('bulb', 16) + ' ' + t('toDevelop') + '</h3>' + devHtml + '</div>';
  }

  function employee(root, viewer) {
    const t = WP.i18n.t, win = WP.state.window, ref = WP.state.refDate;
    const snap = WP.capacity.snapshot(viewer, win, ref);
    const pr = WP.growth.promotionReadiness(viewer);
    const c = ui.stateColor(snap.state);

    root.innerHTML =
      '<div class="ttl">' + t('navDashboard') + ' · ' + t('employee') + '</div>' +
      '<h2 style="margin:2px 0 16px">' + t('hi') + (WP.state.lang === 'ar' ? '، ' : ', ') + ui.esc(WP.i18n.name(viewer).split(' ')[0]) + ' 👋</h2>' +
      '<div class="metrics">' +
        kpi(t('myLoad'), snap.load + '%', WP.i18n.stateLabel(snap.state), c) +
        kpi(t('currentProjects'), snap.eventCount, '') +
        kpi(t('promoReady'), pr.pct + '%', t('devOnly').split('—')[0]) +
      '</div>' +
      (snap.burnout ? '<div class="section" style="border-color:var(--state-overloaded)"><h3>' + WP.ui.icon('flame', 16) + ' ' + t('burnoutFlag') + '</h3><div class="sub">' + t('talkToManager') + '</div></div>' : '') +
      '<div class="section"><h3>' + WP.ui.icon('sprout', 16) + ' ' + t('yourGrowth') + '</h3><div class="sub">' + ui.esc(pr.note) + '</div></div>' +
      '<div class="section"><h3>' + WP.ui.icon('arrowRight', 16) + ' ' + t('quickLinks') + '</h3>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
          '<button class="btn" data-go="me">' + WP.ui.icon('target', 15) + ' ' + t('myProgress') + '</button>' +
          '<button class="btn" data-go="evaluations">' + WP.ui.icon('chart', 15) + ' ' + t('evaluationsHub') + '</button>' +
          '<button class="btn" data-go="daily">' + WP.ui.icon('clipboard', 15) + ' ' + t('dailyTasks') + '</button>' +
        '</div></div>';
  }

  function render(root) {
    const viewer = WP.viewer();
    const lvl = (viewer && viewer.level) || 'spec';
    if (lvl === 'director' || lvl === 'admin') director(root, viewer);
    else if (lvl === 'sr_manager' || lvl === 'manager') leader(root, viewer);
    else employee(root, viewer);

    // S3-2 — honest "Sample data" badge while KPIs are seeded, not live.
    root.insertAdjacentHTML('afterbegin', WP.ui.provenanceNote());

    root.querySelectorAll('[data-open]').forEach(function (el) {
      const open = function () { WP.setState({ route: 'profile', selectedId: el.dataset.open }); };
      // keyboard-accessible: clickable rows are divs, so make them real controls (WCAG 2.2)
      el.setAttribute('tabindex', '0');
      el.setAttribute('role', 'button');
      const who = WP.access.byId(el.dataset.open);
      if (who) el.setAttribute('aria-label', WP.i18n.t('openProfile') + ' — ' + WP.i18n.name(who));
      el.onclick = open;
      el.onkeydown = function (ev) { if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); open(); } };
    });
    root.querySelectorAll('[data-assign]').forEach(function (b) {
      b.onclick = function (e) { e.stopPropagation(); if (WP.ui.assignmentDrawer) WP.ui.assignmentDrawer.openRequest(); };
    });
    root.querySelectorAll('[data-go]').forEach(function (b) {
      b.onclick = function () { WP.setState({ route: b.dataset.go, selectedId: null }); };
    });
  }

  WP.ui.dashboard = { render: render };
})(window.WP = window.WP || {});

</script>
  <script>
/* ============================================================
 * Tempo — Workload Map (home screen)
 * Org chart + metric cards + chart/list toggle + node peek.
 * ========================================================== */
(function (WP) {
  'use strict';
  const ui = WP.ui;
  let listMode = false;
  let collapsed = {};      // person ids whose subtree is collapsed
  let collapseInit = false;
  let focusId = null;      // scope the tree to one team (subtree root)

  // Progressive disclosure: keep the leadership spine open (director + the team-lead
  // row) so the first view actually fills the canvas, and collapse only each team's
  // internals. One click on a team card then drills in.
  function defaultCollapsed(people) {
    const hasKids = {};
    people.forEach(function (p) { if (p.managerId) hasKids[p.managerId] = true; });
    const c = {};
    people.forEach(function (p) {
      // a "team lead" carries a team label; collapse their subtree by default
      if (hasKids[p.id] && p.team) c[p.id] = true;
    });
    return c;
  }

  function metricsBar(m) {
    const t = WP.i18n.t;
    function card(label, value, sub) {
      return '<div class="card"><div class="label">' + label + '</div>' +
             '<div class="value">' + value + '</div>' +
             '<div class="sub">' + sub + '</div></div>';
    }
    const healthSplit = t('healthyBandSplit').replace('{h}', m.healthyCount).replace('{n}', m.size);
    return WP.ui.provenanceNote() +
      '<div class="metrics">' +
      card(t('teamHealth'), m.teamHealth + '%', healthSplit) +
      card(t('available'), m.counts.available, t('available')) +
      card(t('nearCapacity'), m.nearOrOver, t('nearCapacity')) +
      card(t('earlyWarnings'), m.earlyWarnings, t('burnoutFlag').split('—')[0]) +
      '</div>';
  }

  // A "joining" date only counts while it is still in the FUTURE. Once the date
  // arrives (e.g. today is past it), the person is simply active — no stale badge.
  function joiningSoon(person) {
    if (!person.joining) return null;
    return person.joining > todayISO() ? person.joining : null;
  }

  // Employment / status chip (used in the LIST view, where there's room for a full label).
  function empBadge(person) {
    const t = WP.i18n.t;
    if (person.tbc) return '<span class="emp emp-open">' + t('openRole') + '</span>';
    const js = joiningSoon(person);
    if (js) return '<span class="emp emp-join">' + t('joining') + ' ' + WP.i18n.shortDate(js) + '</span>';
    if (person.employment === 'freelance') return '<span class="emp emp-free">' + t('freelance') + '</span>';
    return '<span class="emp emp-ft">' + t('fullTime') + '</span>';
  }

  // Clean one-line status for the TREE card — a small color-coded dot + word, so it's
  // instantly clear whether someone is Full-time or Freelance (or Open / Joining), with
  // none of the bulk of a full pill. Senior-design call: the dot carries the signal,
  // the label stays quiet, every card reads the same height.
  function statusLine(person) {
    const t = WP.i18n.t;
    if (person.tbc) return '<div class="statusline sl-open"><span class="sl-dot"></span>' + t('openRole') + '</div>';
    const js = joiningSoon(person);
    if (js) return '<div class="statusline sl-join"><span class="sl-dot"></span>' + t('joining') + ' ' + WP.i18n.shortDate(js) + '</div>';
    if (person.employment === 'freelance') return '<div class="statusline sl-free"><span class="sl-dot"></span>' + t('freelance') + '</div>';
    return '<div class="statusline sl-ft"><span class="sl-dot"></span>' + t('fullTime') + '</div>';
  }

  // Tier dot color for an account/event (Tier 1 = brand, 2 = near, 3 = muted).
  function tierColor(tier) {
    return tier === 1 ? 'var(--brand)' : tier === 2 ? 'var(--state-near)' : 'var(--text-muted)';
  }

  // Account line — WHICH account(s) this person handles. Shows the primary event
  // (tier-dot + name), "+N" if more, full list on hover. Keeps the tree scannable.
  function acctLine(person) {
    if (person.tbc) return '';
    const ids = person.assignedEvents || [];
    if (!ids.length) return '<div class="acctline acctline-none">' + WP.i18n.t('noAccount') + '</div>';
    const evs = ids.map(function (id) { return WP.data.EVENTS[id]; }).filter(Boolean);
    if (!evs.length) return '';
    const primary = evs[0];
    const more = evs.length > 1 ? ' <span class="acctline-more">+' + (evs.length - 1) + '</span>' : '';
    const names = evs.map(function (e) { return WP.i18n.eventName(e); }).join(' · ');
    return '<div class="acctline" title="' + ui.esc(names) + '">' +
      '<span class="acctline-dot" style="background:' + tierColor(primary.tier) + '"></span>' +
      '<span class="acctline-nm">' + ui.esc(WP.i18n.eventName(primary)) + '</span>' + more + '</div>';
  }

  // Segmented load bar — the load % broken into the accounts that fill it (one
  // colored segment per account), with a full per-account breakdown on hover.
  function loadBar(snap) {
    const parts = snap.breakdown || [];
    const segs = parts.map(function (p) {
      return '<i style="width:' + Math.min(100, p.pct) + '%;background:' + tierColor(p.tier) + '"></i>';
    }).join('');
    const title = parts.length
      ? parts.map(function (p) { return WP.i18n.eventName(WP.data.EVENTS[p.id]) + ' — ' + p.pct + '%'; }).join('\n')
          + '\n' + WP.i18n.t('totalLoad') + ' ' + snap.load + '%'
      : WP.i18n.t('noAccount');
    return '<div class="loadbar" title="' + ui.esc(title) + '">' +
      '<div class="loadbar-track">' + segs + '</div>' +
      '<div class="loadbar-pct" style="color:' + ui.stateColor(snap.state) + '">' +
        '<span class="dot"></span>' + snap.load + '%</div>' +
    '</div>';
  }

  function nodeHTML(person, snap, kidCount, isCol) {
    const accent = ui.stateColor(snap.state);
    const flame = snap.burnout ? '<div class="flame" title="' + WP.i18n.t('burnoutFlag') + '">' + WP.ui.icon('flame', 15) + '</div>' : '';
    // Caret keeps the report COUNT visible and acts as a secondary toggle; the whole
    // card is also clickable to expand (see render). aria-expanded for screen readers.
    const caret = kidCount
      ? '<button class="node-caret' + (isCol ? ' is-col' : '') + '" data-caret="' + person.id +
        '" aria-label="' + (isCol ? 'show team' : 'hide team') + '" aria-expanded="' + (!isCol) + '">' +
        kidCount + '<span class="chev"></span></button>'
      : '';
    // Manager cards expand on click; the avatar is the dedicated "open profile" affordance.
    return '<div class="node' + (person.tbc ? ' is-tbc' : '') + (kidCount ? ' has-kids' : '') + '"' +
        ' data-id="' + person.id + '" style="--node-accent:' + accent + '"' +
        (kidCount ? ' title="' + (isCol ? 'Click to show team' : 'Click to hide team') + '"' : '') + '>' +
      flame +
      '<span class="node-ava" data-profile="' + person.id + '" role="button" tabindex="0"' +
        ' aria-label="' + ui.esc(WP.i18n.name(person)) + ' — open profile">' + ui.avatar(person, accent) + '</span>' +
      '<div class="nm">' + ui.esc(WP.i18n.name(person)) + '</div>' +
      '<div class="ttl">' + ui.esc(WP.i18n.title(person)) + '</div>' +
      statusLine(person) +
      acctLine(person) +
      (person.tbc ? '' : loadBar(snap)) +
      caret +
    '</div>';
  }

  /* Classic top-down org tree: reports grouped beneath their manager,
   * connected by lines. Wrapped in a fit-to-width scaler so the whole
   * chart is visible without zooming the browser; collapse/expand keeps
   * it tidy; horizontal scroll only as a last resort. RTL-neutral. */
  function treeChart(people, snapById, colMap) {
    const inView = {};
    people.forEach(function (p) { inView[p.id] = true; });
    // Fixed business order for the top team sections (matches the official org chart);
    // anything without a defined rank falls back to alphabetical by team name.
    const TEAM_ORDER = ['Automation & Execution', 'Sports', 'Entertainment', 'On Ground', 'Cashless'];
    const LV = WP.data.LEVELS;
    const childrenOf = function (id) {
      return people.filter(function (p) { return p.managerId === id; }).sort(function (a, b) {
        // team leads → fixed section order, not by personal name
        if (a.team || b.team) {
          const ra = a.team ? (TEAM_ORDER.indexOf(a.team) + 1 || 99) : 999;
          const rb = b.team ? (TEAM_ORDER.indexOf(b.team) + 1 || 99) : 999;
          if (ra !== rb) return ra - rb;
          return (a.team || '').localeCompare(b.team || '');
        }
        // within a team → open roles last, then by seniority (rank), then name
        if (!!a.tbc !== !!b.tbc) return a.tbc ? 1 : -1;
        const la = (LV[a.level] && LV[a.level].rank != null) ? LV[a.level].rank : 9;
        const lb = (LV[b.level] && LV[b.level].rank != null) ? LV[b.level].rank : 9;
        if (la !== lb) return la - lb;
        return WP.i18n.name(a).localeCompare(WP.i18n.name(b), undefined, { sensitivity: 'base' });
      });
    };
    const roots = people.filter(function (p) { return !p.managerId || !inView[p.managerId]; });

    function teamTag(p) {
      if (!p.team) return '';
      const label = WP.state.lang === 'ar' ? (p.teamAr || p.team) : p.team;
      return '<div class="team-tag">' + ui.esc(label) + '</div>';
    }
    function li(p) {
      const kids = childrenOf(p.id);
      const isCol = !!colMap[p.id];
      const childUl = (kids.length && !isCol) ? '<ul>' + kids.map(li).join('') + '</ul>' : '';
      // team-lead nodes carry a labeled header so each section is named + separated
      return '<li' + (p.team ? ' class="team-branch"' : '') + '>' +
        teamTag(p) + nodeHTML(p, snapById[p.id], kids.length, isCol) + childUl + '</li>';
    }
    return '<div class="tree-scroll"><div class="tree-fit"><ul class="tree">' +
      roots.map(li).join('') + '</ul></div></div>';
  }

  function listView(people, snapById) {
    return '<div class="list">' + people
      .slice()
      .sort(function (a, b) { return snapById[b.id].load - snapById[a.id].load; })
      .map(function (p) {
        const s = snapById[p.id];
        const c = ui.stateColor(s.state);
        return '<div class="row" data-id="' + p.id + '" style="--node-accent:' + c + '">' +
          ui.avatar(p, c) +
          '<div style="min-width:150px"><div class="nm">' + ui.esc(WP.i18n.name(p)) + '</div>' +
          '<div class="ttl">' + ui.esc(WP.i18n.title(p)) + ' ' + empBadge(p) + '</div></div>' +
          '<div class="lr-acctline">' + acctLine(p) + '</div>' +
          '<div class="bar"><i style="width:' + Math.min(100, s.load) + '%"></i></div>' +
          '<div class="pct">' + s.load + '%</div>' +
          (s.burnout ? '<span title="' + WP.i18n.t('burnoutFlag') + '" style="color:var(--state-overloaded);line-height:0">' + WP.ui.icon('flame', 15) + '</span>' : '') +
        '</div>';
      }).join('') + '</div>';
  }

  // Localized team label (team leads carry a team name; everyone else falls back to their name).
  function teamLabel(p) {
    if (p.team) return WP.state.lang === 'ar' ? (p.teamAr || p.team) : p.team;
    return WP.i18n.name(p);
  }
  // The team a person belongs to = nearest ancestor (incl. self) that carries a team label.
  function teamLeadOf(id) {
    let p = WP.access.byId(id), guard = 0;
    while (p && guard++ < 20) { if (p.team) return p; p = p.managerId ? WP.access.byId(p.managerId) : null; }
    return null;
  }
  // The named teams = people who carry a team label (the real teams), in business order.
  // Sub-managers without a team label are NOT listed as "teams" here — they appear under
  // People (and still offer a "View team" chip because they have reports).
  function teamsList(base) {
    const ORDER = ['Automation & Execution', 'Sports', 'Entertainment', 'On Ground', 'Cashless'];
    return base.filter(function (p) { return p.team; }).sort(function (a, b) {
      return (ORDER.indexOf(a.team) + 1 || 99) - (ORDER.indexOf(b.team) + 1 || 99);
    });
  }

  // Generic themed dropdown (button + listbox) — used for View and Period so the
  // toolbar stays compact instead of two rows of segmented buttons.
  function ddMenu(id, btnIcon, label, items) {
    return '<div class="dd" id="' + id + '">' +
      '<button class="dd-btn" id="' + id + '-btn" aria-haspopup="listbox" aria-expanded="false">' +
        (btnIcon ? WP.ui.icon(btnIcon, 15) : '') +
        '<span class="dd-label">' + ui.esc(label) + '</span>' +
        '<span class="dd-caret">' + WP.ui.icon('caret', 14) + '</span></button>' +
      '<div class="dd-menu" id="' + id + '-menu" role="listbox">' +
        items.map(function (o) {
          return '<div class="dd-opt' + (o.sel ? ' selected' : '') + '" role="option" aria-selected="' + (!!o.sel) + '" data-val="' + o.val + '" tabindex="-1">' +
            (o.icon ? WP.ui.icon(o.icon, 15) : '') +
            '<span class="dd-opt-nm">' + ui.esc(o.label) + '</span>' +
            (o.sel ? '<span class="dd-check">' + WP.ui.icon('check', 14) + '</span>' : '') + '</div>';
        }).join('') +
      '</div></div>';
  }

  // Unified Find: ONE control that searches people AND teams. Person rows show the team
  // they sit under (a clickable chip) so you can jump to the person OR their whole team.
  function mapFilters(base) {
    const t = WP.i18n.t;
    const cur = focusId ? base.find(function (p) { return p.id === focusId; }) : null;
    const chip = cur
      ? '<button class="scope-chip" id="scope-clear" title="' + t('showAll') + '">' + WP.ui.icon('users', 14) +
          '<span>' + ui.esc(teamLabel(cur)) + '</span>' + WP.ui.icon('x', 12) + '</button>'
      : '';
    return '<div class="finder' + (cur ? ' has-scope' : '') + '" id="finder">' + chip +
      '<div class="search finder-input">' + WP.ui.icon('search', 15) +
        '<input id="map-search" type="text" placeholder="' + t('findPlaceholder') + '" aria-label="' + t('findPlaceholder') + '"' +
          ' role="combobox" aria-expanded="false" aria-autocomplete="list" aria-controls="map-suggest" autocomplete="off" />' +
        '<button class="search-clear" id="map-search-clear" aria-label="' + t('showAll') + '">' + WP.ui.icon('x', 13) + '</button>' +
      '</div>' +
      '<div class="predict finder-menu" id="map-suggest" role="listbox"></div>' +
    '</div>';
  }

  const MONTHS = {
    en: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'],
    ar: ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'],
  };
  function pad(n) { return ('0' + n).slice(-2); }
  function iso(d) { return d.toISOString().slice(0, 10); }
  function todayISO() { return iso(new Date()); }
  const WEEKDAYS = {
    en: ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'],
    ar: ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'],
  };

  // Apple-Calendar-style label for the current period.
  function periodLabel(win, refDate) {
    const ar = WP.state.lang === 'ar';
    const d = new Date(refDate);
    const y = d.getUTCFullYear(), mo = d.getUTCMonth(), day = d.getUTCDate();
    const mn = MONTHS[ar ? 'ar' : 'en'];
    if (win === 'year') return '' + y;
    if (win === 'month') return mn[mo] + ' ' + y;
    if (win === 'day') {
      // Clean day label — no weekday clutter (e.g. "23 Jun 2026"); the "today" dot already
      // signals when it's the current day, so the weekday + "Today" text are redundant.
      return day + ' ' + mn[mo] + ' ' + y;
    }
    // week → Sunday..Saturday containing refDate
    const dow = new Date(Date.UTC(y, mo, day)).getUTCDay();
    const s = new Date(Date.UTC(y, mo, day - dow));
    const e = new Date(s.getTime() + 6 * 86400000);
    const sm = MONTHS[ar ? 'ar' : 'en'][s.getUTCMonth()], em = MONTHS[ar ? 'ar' : 'en'][e.getUTCMonth()];
    return s.getUTCMonth() === e.getUTCMonth()
      ? s.getUTCDate() + '–' + e.getUTCDate() + ' ' + sm + ' ' + e.getUTCFullYear()
      : s.getUTCDate() + ' ' + sm + ' – ' + e.getUTCDate() + ' ' + em + ' ' + e.getUTCFullYear();
  }

  // Move the reference date by one unit of the granularity (dir = +1 / -1).
  function shiftDate(win, refDate, dir) {
    const d = new Date(refDate);
    const y = d.getUTCFullYear(), mo = d.getUTCMonth(), day = d.getUTCDate();
    if (win === 'day')   return iso(new Date(Date.UTC(y, mo, day + dir)));
    if (win === 'week')  return iso(new Date(Date.UTC(y, mo, day + 7 * dir)));
    if (win === 'year')  return iso(new Date(Date.UTC(y + dir, mo, 15)));
    return iso(new Date(Date.UTC(y, mo + dir, 15))); // month
  }

  // Is the viewed reference date the CURRENT real period for this granularity?
  function isCurrentPeriod(win, refDate) {
    const d = new Date(refDate), n = new Date();
    const y = d.getUTCFullYear(), mo = d.getUTCMonth(), da = d.getUTCDate();
    const ty = n.getFullYear(), tm = n.getMonth(), td = n.getDate();
    if (win === 'year') return y === ty;
    if (win === 'month') return y === ty && mo === tm;
    if (win === 'day') return y === ty && mo === tm && da === td;
    const sun = function (yy, mm, dd) { return Date.UTC(yy, mm, dd - new Date(Date.UTC(yy, mm, dd)).getUTCDay()); };
    return sun(y, mo, da) === sun(ty, tm, td);
  }

  // Apple-Calendar navigator: (Today) · ‹ · current-period label · ›
  // "Today" only appears when you've navigated away from the current period.
  function dateNav(win, refDate) {
    const t = WP.i18n.t;
    const cur = isCurrentPeriod(win, refDate);
    const future = refDate > todayISO();
    // State A (on current period): Today is PASSIVE (muted, no fill) — you're anchored on now.
    // State B (navigated away): Today is an ACTIONABLE "jump back to present" command —
    //   a directional arrow (← when ahead in the future, → when behind in the past), clean
    //   contrast, NOT a filled/selected pill (avoids reading as "this date = today").
    let today;
    if (cur) {
      // On the current period: no "Today" text — the pink dot on the label already says so.
      today = '';
    } else {
      // Arrow points toward "today". In LTR earlier=left / later=right; in RTL it's mirrored,
      // so choose the glyph explicitly per language (not relying on a blanket icon flip).
      const ar = WP.state.lang === 'ar';
      const backToToday = ar ? 'chevR' : 'chevL';  // in the future → go back to present
      const fwdToToday = ar ? 'chevL' : 'chevR';   // in the past   → go forward to present
      const arrow = future
        ? WP.ui.icon(backToToday, 15) + '<span>' + t('today') + '</span>'
        : '<span>' + t('today') + '</span>' + WP.ui.icon(fwdToToday, 15);
      today = '<button class="btn datenav-today is-away" data-nav="today" aria-label="' + t('today') + '">' + arrow + '</button>';
    }
    const dot = cur ? '<span class="today-dot" title="' + t('today') + '" aria-label="' + t('today') + '"></span>' : '';
    return '<div class="datenav">' + today +
      '<button class="btn icon-btn" data-nav="prev" aria-label="' + t('prevPeriod') + '">' + WP.ui.icon('chevL', 16) + '</button>' +
      '<span class="datenav-label' + (cur ? ' is-today' : '') + '" aria-live="polite">' + dot + ui.esc(periodLabel(win, refDate)) + '</span>' +
      '<button class="btn icon-btn" data-nav="next" aria-label="' + t('nextPeriod') + '">' + WP.ui.icon('chevR', 16) + '</button>' +
    '</div>';
  }

  function render(root) {
    const viewer = WP.viewer();
    const base = WP.access.visiblePeople(viewer);
    if (!collapseInit) { collapsed = defaultCollapsed(base); collapseInit = true; }

    // SCOPE → focus the tree on one team (subtree). Search is a predictive
    // quick-jump (typeahead), handled separately so typing never re-renders the tree.
    const inBase = {}; base.forEach(function (p) { inBase[p.id] = true; });
    const focusPerson = (focusId && inBase[focusId]) ? WP.access.byId(focusId) : null;
    const scopeSet = focusPerson ? WP.access.teamOf(focusId).filter(function (p) { return inBase[p.id]; }) : base;
    const people = scopeSet;

    const m = WP.capacity.teamMetrics(scopeSet, WP.state.window, WP.state.refDate);
    const snapById = {};
    m.snaps.forEach(function (s) { snapById[s.id] = s; });
    const colMap = collapsed;

    // snapshots for EVERYONE (so predictive search works across all teams,
    // even while the tree is focused on one team)
    const allSnapById = {};
    WP.capacity.teamMetrics(base, WP.state.window, WP.state.refDate).snaps
      .forEach(function (s) { allSnapById[s.id] = s; });

    const t = WP.i18n.t;
    const win = WP.state.window;
    const viewItems = [
      { val: 'chart', label: t('treeView'), icon: 'tree', sel: !listMode },
      { val: 'list', label: t('listView'), icon: 'list', sel: listMode },
    ];
    const periodItems = ['day', 'week', 'month', 'year'].map(function (k) {
      return { val: k, label: t(k), sel: k === win };
    });
    const toggle = '<div class="toolbar">' +
      ddMenu('view-dd', listMode ? 'list' : 'tree', listMode ? t('listView') : t('treeView'), viewItems) +
      ddMenu('period-dd', null, t(win), periodItems) +
      dateNav(win, WP.state.refDate) +
    '</div>';

    const legend = '<div class="legend">' + WP.data.STATES.map(function (s) {
      return '<span class="legend-item"><span class="dot" style="background:' + ui.stateColor(s) + '"></span>' +
        ui.esc(WP.i18n.stateLabel(s)) + ' <em>' + s.min + '–' + (s.max > 100 ? '100+' : s.max) + '%</em></span>';
    }).join('') +
      '<span class="legend-sep" aria-hidden="true"></span>' +
      '<span class="legend-item"><span class="emp emp-ft">' + t('fullTime') + '</span></span>' +
      '<span class="legend-item"><span class="emp emp-free">' + t('freelance') + '</span></span>' +
      '</div>';

    const body = people.length === 0
      ? '<div class="map-empty">' + WP.ui.icon('users', 18) + ' <span>' + t('emptyTeam') + '</span>' +
          (focusPerson ? ' <button class="btn" id="empty-showall">' + t('showAll') + '</button>' : '') + '</div>'
      : (listMode ? listView(people, snapById) : treeChart(people, snapById, colMap));
    root.innerHTML = metricsBar(m) +
      '<div class="controlbar">' + toggle + mapFilters(base) + '</div>' +
      legend + body;

    // Apple-style date navigator — prev / next / today (keeps the granularity)
    root.querySelectorAll('[data-nav]').forEach(function (b) {
      b.onclick = function () {
        const dir = b.dataset.nav;
        if (dir === 'today') WP.setState({ refDate: todayISO() });
        else WP.setState({ refDate: shiftDate(WP.state.window, WP.state.refDate, dir === 'next' ? 1 : -1) });
      };
    });
    // caret chip — secondary toggle (still shows the report count)
    root.querySelectorAll('[data-caret]').forEach(function (b) {
      b.onclick = function (e) {
        e.stopPropagation();
        collapsed[b.dataset.caret] = !collapsed[b.dataset.caret];
        render(root);
      };
    });
    // avatar = dedicated "open profile" affordance (works on every card)
    root.querySelectorAll('[data-profile]').forEach(function (el) {
      el.onclick = function (e) { e.stopPropagation(); WP.ui.peek(el.dataset.profile); };
      el.onkeydown = function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); WP.ui.peek(el.dataset.profile); } };
    });
    // TREE card: click the body to show/hide the team (one click, no hunting for arrows).
    // Cards with no reports just open the profile.
    root.querySelectorAll('.tree .node[data-id]').forEach(function (el) {
      el.onclick = function (e) {
        if (e.target.closest('[data-caret]') || e.target.closest('[data-profile]')) return;
        const id = el.dataset.id;
        if (el.classList.contains('has-kids')) { collapsed[id] = !collapsed[id]; render(root); }
        else WP.ui.peek(id);
      };
    });
    // LIST rows always open the profile
    root.querySelectorAll('.list .row[data-id]').forEach(function (el) {
      el.onclick = function () { WP.ui.peek(el.dataset.id); };
    });

    // compact toolbar dropdowns (View · Period)
    setupMenu(root, 'view-dd', function (v) { listMode = (v === 'list'); render(root); });
    setupMenu(root, 'period-dd', function (v) { WP.setState({ window: v }); });
    closeMenusOnOutside(root);
    const esa = root.querySelector('#empty-showall');
    if (esa) esa.onclick = function () { focusId = null; render(root); };

    // unified Find — searches people AND teams; jump to a person or their whole team
    setupFinder(root, base, allSnapById);

    // drag-to-pan the org canvas (grab / grabbing cursors)
    setupPan(root);

    // keep the board live — refresh on a light interval (see scheduleAutoRefresh)
    scheduleAutoRefresh(root);
  }

  // Live clock for the "Updated …" indicator.
  function nowClock() {
    const d = new Date();
    return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
  }

  // Auto-refresh every 10s so the board always reflects the latest state. It re-renders
  // ONLY when it's safe: the view is still mounted + visible, no menu open, the user isn't
  // typing in search, and no drag is in progress — and it restores the scroll position so
  // the refresh is invisible. A single shared timer (cleared each render) avoids pile-ups.
  let refreshTimer = null;
  function stopAutoRefresh() { if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; } }
  function scheduleAutoRefresh(root) {
    stopAutoRefresh();
    refreshTimer = setInterval(function () {
      // Critical: every view shares the same #view container. Only refresh while the
      // Workload map is the ACTIVE route — otherwise we'd repaint the map over whatever
      // page the user navigated to (Evaluations, Daily tasks, …). Stop the timer the
      // moment we're no longer on the map.
      const onMap = WP.state && (WP.state.route === 'map' || WP.state.route == null);
      if (!onMap || !document.body.contains(root)) { stopAutoRefresh(); return; }
      if (document.hidden) return;
      const sc = root.querySelector('.tree-scroll');
      const menuOpen = root.querySelector('.dd.open, .finder.open, .predict.open');
      const search = root.querySelector('#map-search');
      const typing = search && (document.activeElement === search || search.value);
      const dragging = sc && sc.classList.contains('panning');
      if (menuOpen || typing || dragging) return;                 // don't interrupt the user
      const sx = sc ? sc.scrollLeft : 0, sy = sc ? sc.scrollTop : 0;
      render(root);
      const sc2 = root.querySelector('.tree-scroll');
      if (sc2) { sc2.scrollLeft = sx; sc2.scrollTop = sy; }
    }, 10000);
  }

  // Click-and-drag panning on the tree canvas, with native grab/grabbing cursors.
  // Listeners are scoped per-drag (added on mousedown, removed on mouseup) so
  // re-renders never leak handlers. A small move threshold suppresses the click
  // that would otherwise open a profile right after a pan.
  function setupPan(root) {
    const sc = root.querySelector('.tree-scroll');
    if (!sc) return;
    sc.addEventListener('mousedown', function (e) {
      if (e.button !== 0) return;                       // left button only
      const sx = e.clientX, sy = e.clientY;
      const sl = sc.scrollLeft, st = sc.scrollTop;
      let moved = false;
      sc.classList.add('panning');                      // → cursor: grabbing
      function mv(ev) {
        const dx = ev.clientX - sx, dy = ev.clientY - sy;
        if (Math.abs(dx) + Math.abs(dy) > 4) moved = true;
        sc.scrollLeft = sl - dx;
        sc.scrollTop = st - dy;
        ev.preventDefault();
      }
      function up() {
        sc.classList.remove('panning');                 // → back to cursor: grab
        document.removeEventListener('mousemove', mv);
        document.removeEventListener('mouseup', up);
        if (moved) {                                     // swallow the trailing click
          sc.addEventListener('click', function sw(c) {
            c.stopPropagation(); c.preventDefault();
            sc.removeEventListener('click', sw, true);
          }, true);
        }
      }
      document.addEventListener('mousemove', mv);
      document.addEventListener('mouseup', up);
    });
  }

  // Generic dropdown menu wiring (View / Period). One open at a time; full keyboard support.
  function closeMenusOnOutside(root) {
    if (WP._ddDocClose) document.removeEventListener('click', WP._ddDocClose);
    WP._ddDocClose = function (ev) {
      root.querySelectorAll('.dd.open, .finder.open').forEach(function (w) {
        if (!w.contains(ev.target)) {
          w.classList.remove('open');
          const b = w.querySelector('.dd-btn'); if (b) b.setAttribute('aria-expanded', 'false');
          const m = w.querySelector('.finder-menu'); if (m) m.classList.remove('open');
        }
      });
    };
    document.addEventListener('click', WP._ddDocClose);
  }
  function setupMenu(root, id, onChoose) {
    const wrap = root.querySelector('#' + id);
    if (!wrap) return;
    const btn = root.querySelector('#' + id + '-btn');
    const menu = root.querySelector('#' + id + '-menu');
    const opts = [].slice.call(menu.querySelectorAll('.dd-opt'));
    function open() {
      root.querySelectorAll('.dd.open').forEach(function (w) { if (w !== wrap) w.classList.remove('open'); });
      wrap.classList.add('open'); btn.setAttribute('aria-expanded', 'true');
      const s = menu.querySelector('.dd-opt.selected') || opts[0]; if (s) s.focus();
    }
    function close() { wrap.classList.remove('open'); btn.setAttribute('aria-expanded', 'false'); }
    btn.onclick = function (e) { e.stopPropagation(); wrap.classList.contains('open') ? close() : open(); };
    btn.onkeydown = function (e) { if (e.key === 'ArrowDown' || e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); } };
    opts.forEach(function (o, i) {
      o.onclick = function () { close(); onChoose(o.dataset.val); };
      o.onkeydown = function (e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); close(); onChoose(o.dataset.val); }
        else if (e.key === 'ArrowDown') { e.preventDefault(); (opts[i + 1] || opts[0]).focus(); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); (opts[i - 1] || opts[opts.length - 1]).focus(); }
        else if (e.key === 'Escape') { e.preventDefault(); close(); btn.focus(); }
      };
    });
  }

  function highlight(name, q) {
    const i = name.toLowerCase().indexOf(q);
    if (i < 0) return ui.esc(name);
    return ui.esc(name.slice(0, i)) + '<mark>' + ui.esc(name.slice(i, i + q.length)) + '</mark>' + ui.esc(name.slice(i + q.length));
  }

  // Unified Find: one combobox over people + teams. Person rows carry a clickable team
  // chip, so a director can jump straight to a person OR scope the whole tree to their team.
  function setupFinder(root, base, snapById) {
    const t = WP.i18n.t;
    const finder = root.querySelector('#finder');
    const input = root.querySelector('#map-search');
    const dd = root.querySelector('#map-suggest');
    const clr = root.querySelector('#map-search-clear');
    if (!finder || !input || !dd) return;
    const teams = teamsList(base);
    const hasRep = {};
    base.forEach(function (p) { if (p.managerId) hasRep[p.managerId] = true; });
    let rows = [], active = -1;
    const hay = function (p) { return (p.name + ' ' + (p.nameAr || '') + ' ' + (p.title || '') + ' ' + (p.titleAr || '')).toLowerCase(); };

    function closeDd() { finder.classList.remove('open'); dd.classList.remove('open'); dd.innerHTML = ''; rows = []; active = -1; input.setAttribute('aria-expanded', 'false'); }
    function focusTeam(id) { closeDd(); input.value = ''; focusId = id || null; collapsed = focusId ? {} : defaultCollapsed(base); render(root); }
    function openPerson(id) { closeDd(); input.value = ''; WP.ui.peek(id); }

    // Team row: lead's photo + the TEAM name + who leads it + a clear "View team" action.
    function teamRow(p, q) {
      return '<div class="predict-row pr-team" role="option" data-team="' + p.id + '">' +
        ui.avatar(p, 'var(--brand)') +
        '<span class="predict-meta"><span class="nm">' + (q ? highlight(teamLabel(p), q) : ui.esc(teamLabel(p))) + '</span>' +
        '<span class="ttl">' + t('ledBy') + ' ' + ui.esc(WP.i18n.name(p)) + '</span></span>' +
        '<span class="pr-go">' + t('viewTeam') + '</span></div>';
    }
    // Person row: their photo + name + role, plus ONE team chip — "View team" if they lead
    // a team, otherwise "in <their team>" — so every row says who they are and where they sit.
    function personRow(p, q) {
      const s = snapById[p.id]; const c = s ? ui.stateColor(s.state) : 'var(--brand)';
      const lead = teamLeadOf(p.id);
      let chip = '';
      if (hasRep[p.id]) chip = ' · <button class="pr-teamchip is-lead" data-team="' + p.id + '">' + WP.ui.icon('users', 11) + ' ' + t('viewTeam') + '</button>';
      else if (lead) chip = ' · <button class="pr-teamchip" data-team="' + lead.id + '" title="' + ui.esc(teamLabel(lead)) + '">' + WP.ui.icon('users', 11) + ' ' + t('inTeam') + ' ' + ui.esc(teamLabel(lead)) + '</button>';
      const load = s ? '<span class="predict-load" style="color:' + c + '">' + s.load + '%</span>' : '';
      return '<div class="predict-row pr-person" role="option" data-pick="' + p.id + '">' +
        ui.avatar(p, c) +
        '<span class="predict-meta"><span class="nm">' + (q ? highlight(WP.i18n.name(p), q) : ui.esc(WP.i18n.name(p))) + '</span>' +
        '<span class="ttl">' + ui.esc(WP.i18n.title(p)) + chip + '</span></span>' + load + '</div>';
    }

    function build() {
      const q = input.value.trim().toLowerCase();
      let html = '';
      if (focusId) html += '<div class="predict-row pr-clear" role="option" data-team=""><span class="pr-ico">' + WP.ui.icon('users', 15) + '</span><span class="predict-meta"><span class="nm">' + t('allTeams') + '</span></span></div>';
      const mTeams = teams.filter(function (p) { return !q || teamLabel(p).toLowerCase().indexOf(q) >= 0 || hay(p).indexOf(q) >= 0; });
      const mPeople = q ? base.filter(function (p) { return hay(p).indexOf(q) >= 0; }).slice(0, 8) : [];
      if (mTeams.length) html += '<div class="predict-group">' + t('teams') + '</div>' + mTeams.map(function (p) { return teamRow(p, q); }).join('');
      if (mPeople.length) html += '<div class="predict-group">' + t('people') + '</div>' + mPeople.map(function (p) { return personRow(p, q); }).join('');
      if (!html) html = '<div class="predict-empty">' + t('noResults') + '</div>';
      dd.innerHTML = html;
      finder.classList.add('open'); dd.classList.add('open'); input.setAttribute('aria-expanded', 'true');
      rows = [].slice.call(dd.querySelectorAll('.predict-row')); active = -1;
      dd.querySelectorAll('.pr-teamchip').forEach(function (b) {
        b.onmousedown = function (e) { e.preventDefault(); e.stopPropagation(); focusTeam(b.dataset.team); };
      });
      dd.querySelectorAll('[data-pick]').forEach(function (r) {
        r.onmousedown = function (e) { if (e.target.closest('.pr-teamchip')) return; e.preventDefault(); openPerson(r.dataset.pick); };
      });
      dd.querySelectorAll('.predict-row[data-team]').forEach(function (r) {
        r.onmousedown = function (e) { e.preventDefault(); focusTeam(r.dataset.team || null); };
      });
    }
    function setActive(i) {
      active = i;
      rows.forEach(function (r, idx) { const on = idx === i; r.classList.toggle('active', on); if (on && r.scrollIntoView) r.scrollIntoView({ block: 'nearest' }); });
    }
    function activate(r) { if (!r) return; if (r.dataset.pick) openPerson(r.dataset.pick); else focusTeam(r.getAttribute('data-team') || null); }

    input.onfocus = build;
    input.oninput = build;
    input.onkeydown = function (e) {
      if (e.key === 'ArrowDown') { e.preventDefault(); if (rows.length) setActive(Math.min(rows.length - 1, active + 1)); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); if (rows.length) setActive(Math.max(0, active - 1)); }
      else if (e.key === 'Enter') { e.preventDefault(); activate(active >= 0 ? rows[active] : rows[0]); }
      else if (e.key === 'Escape') { closeDd(); input.blur(); }
    };
    input.onblur = function () { setTimeout(closeDd, 160); };
    if (clr) clr.onclick = function () { input.value = ''; build(); input.focus(); };
    const sce = root.querySelector('#scope-clear');
    if (sce) sce.onclick = function () { focusTeam(null); };
  }

  WP.ui.workloadMap = { render: render };
})(window.WP = window.WP || {});

</script>
  <script>
/* ============================================================
 * Tempo — Peek popover + Employee Profile
 * ========================================================== */
(function (WP) {
  'use strict';
  const ui = WP.ui;

  function projectsList(person) {
    const ids = (person && person.assignedEvents) || [];
    const evs = ids.map(function (eid) { return WP.data.EVENTS[eid]; }).filter(Boolean);
    if (!evs.length) {
      return '<div class="sub">' + WP.i18n.t('noProjects') + '</div>';
    }
    return evs.map(function (ev) {
      const tier = WP.data.TIERS[ev.tier] || { labelAr: '', labelEn: '', weight: 0 };
      return '<div class="proj">' +
        '<span class="tier-chip" style="background:' + ui.tierColor(ev.tier) + '">' +
          (WP.state.lang === 'ar' ? tier.labelAr : tier.labelEn).split('·')[0].trim() + '</span>' +
        '<div style="flex:1"><div class="nm" style="font-size:13px">' + ui.esc(WP.i18n.eventName(ev)) + '</div>' +
        '<div class="ttl">' + ev.start + ' → ' + ev.end + ' · ' + ui.esc(ev.city) + '</div></div>' +
        '<b>' + tier.weight + '%</b></div>';
    }).join('');
  }

  /* ---- peek popover ---- */
  function peek(id) {
    const p = WP.access.byId(id);
    if (!p || !WP.access.canSee(WP.viewer(), id)) return;
    const snap = WP.capacity.snapshot(p, WP.state.window, WP.state.refDate);
    const c = ui.stateColor(snap.state);
    const host = document.getElementById('overlay-host');
    host.innerHTML = '<div class="overlay"><div class="popover">' +
      '<button class="popover-close" id="peek-close" aria-label="Close">' + ui.icon('x', 14) + '</button>' +
      '<div class="profile-head">' + ui.avatar(p, c) +
        '<div><div class="nm">' + ui.esc(WP.i18n.name(p)) + '</div>' +
        '<div class="ttl">' + ui.esc(WP.i18n.title(p)) + '</div>' +
        '<div class="load-pill" style="--node-accent:' + c + ';margin-top:6px"><span class="dot"></span>' +
          snap.load + '% · ' + ui.esc(WP.i18n.stateLabel(snap.state)) + '</div></div></div>' +
      '<h3 style="font-size:13px;margin:6px 0">' + WP.i18n.t('currentProjects') + '</h3>' +
      projectsList(p) +
      '<button class="btn primary" id="open-profile" style="width:100%;margin-top:14px">' +
        WP.i18n.t('openProfile') + '</button></div></div>';
    host.querySelector('.overlay').onclick = function (e) { if (e.target.classList.contains('overlay')) host.innerHTML = ''; };
    host.querySelector('#peek-close').onclick = function () { host.innerHTML = ''; };
    host.querySelector('#open-profile').onclick = function () {
      host.innerHTML = '';
      WP.setState({ route: 'profile', selectedId: id });
    };
  }

  /* ---- growth: skills, EQ, lenses, quarterly, tenure ---- */
  function skillRow(sk) {
    const ladderMax = 5;
    const trend = WP.growth.skillTrend(sk);
    const arrow = trend > 0 ? '<span class="trend-up"><span class="ar ar-up"></span> +' + trend + '</span>'
                : trend < 0 ? '<span class="trend-down"><span class="ar ar-dn"></span> ' + Math.abs(trend) + '</span>'
                : '<span style="color:var(--text-muted)">–</span>';
    const typeKey = sk.type === 'hard' ? 'hardSkills' : 'softSkills';
    return '<div class="skill">' +
      '<div class="nm2">' + ui.esc(sk.name) + '<span class="chip-type">' + WP.i18n.t(typeKey) + '</span></div>' +
      '<div class="track"><i style="width:' + (sk.level / ladderMax * 100) + '%"></i>' +
        '<span class="req" style="inset-inline-start:' + (sk.required / ladderMax * 100) + '%" title="' + WP.i18n.t('required') + '"></span></div>' +
      '<div class="trend">' + sk.level + '/5 ' + arrow + '</div></div>';
  }

  function growthSections(p, sens, selfView) {
    const g = WP.data.GROWTH[p.id];
    if (!g) return '';
    const t = WP.i18n.t;
    const ar = WP.state.lang === 'ar';

    const eq = WP.data.EQ_DOMAINS.map(function (d) {
      const v = g.eq[d.key];
      return '<div class="eq-row"><span style="min-width:120px">' + (ar ? d.ar : d.en) + '</span>' +
        '<span class="eq-bar"><i style="width:' + (v / 5 * 100) + '%"></i></span>' +
        '<b style="font-size:12px">' + v + '/5</b></div>';
    }).join('');

    const q = g.quarterly[0];
    const managerLens =
      '<div class="section"><h3>' + t('managerLens') + '</h3>' +
        '<div class="mini-label">' + t('strengths') + '</div>' +
        '<div>' + g.managerNote.strengths.map(function (x) { return '<span class="tag">' + ui.icon('plus', 12) + ' ' + ui.esc(x) + '</span>'; }).join('') + '</div>' +
        '<div class="mini-label" style="margin-top:6px">' + t('growthAreas') + '</div>' +
        '<div>' + g.managerNote.growth.map(function (x) { return '<span class="tag">' + ui.icon('arrowUp', 12) + ' ' + ui.esc(x) + '</span>'; }).join('') + '</div>' +
        '<div class="mini-label" style="margin-top:8px">' + t('suggestion') + '</div><div style="font-size:13px">' + ui.esc(g.managerNote.suggestion) + '</div>' +
      '</div>';
    const directorLens =
      '<div class="section"><h3>' + t('directorLens') + '</h3>' +
        '<div class="kv"><div class="k">' + t('impact') + '</div><div>' + ui.esc(g.directorNote.impact) + '</div>' +
        '<div class="k">' + t('potential') + '</div><div>' + ui.esc(g.directorNote.potential) + '</div></div>' +
        '<div class="mini-label" style="margin-top:8px">' + t('suggestion') + '</div><div style="font-size:13px">' + ui.esc(g.directorNote.suggestion) + '</div>' +
      '</div>';

    const quarterly = '<div class="section"><h3>' + t('quarterly') +
      ' <span class="rating ' + q.rating + '">' + q.q + ' · ' + q.rating + '</span></h3>' +
      '<div style="font-size:13px;margin-bottom:8px">' + ui.esc(q.summary) + '</div>' +
      '<div class="mini-label">' + t('improved') + '</div><div>' +
        (q.improved.length ? q.improved.map(function (x) { return '<span class="tag">' + WP.ui.icon('check',14) + ' ' + ui.esc(x) + '</span>'; }).join('') : '—') + '</div>' +
      '<div class="mini-label" style="margin-top:6px">' + t('focusNext') + '</div><div>' +
        q.focus.map(function (x) { return '<span class="tag">' + ui.icon('target', 12) + ' ' + ui.esc(x) + '</span>'; }).join('') + '</div>' +
      '<div style="border-top:1px solid var(--border);margin-top:10px;padding-top:8px">' +
        '<div class="mini-label">' + t('reliability') + '</div>' +
        '<div class="kv" style="margin-top:4px"><div class="k">' + t('attendanceL') + '</div><div>' + ui.esc(q.reliability.attendance) + '</div>' +
        '<div class="k">' + t('engagementL') + '</div><div>' + ui.esc(q.reliability.engagement) + '</div></div>' +
      '</div></div>';

    const skills = '<div class="section"><h3>' + t('skills') + '</h3>' +
      g.skills.map(skillRow).join('') +
      '<div class="disclaimer">' + WP.i18n.t('required') + ' = ' + (ar ? 'العلامة الرمادية' : 'the grey marker') + '</div></div>';

    const eqSection = '<div class="section"><h3>' + t('eq') + '</h3><div class="eq-grid">' + eq + '</div>' +
      '<div class="disclaimer">' + t('eqDisclaimer') + '</div></div>';

    const tn = '<div class="section"><h3>' + t('tenure') + '</h3><div class="kv">' +
      '<div class="k">' + t('inCompany') + '</div><div>' + WP.growth.tenureMonths(p) + ' ' + t('months') + '</div>' +
      '<div class="k">' + t('inRole') + '</div><div>' + WP.growth.monthsInRole(p) + ' ' + t('months') + '</div>' +
      '</div></div>';

    const ws = g.workStyle;
    const st = ws ? WP.data.WORK_STAGES[ws.stage] : null;
    const workStyle = ws ? '<div class="section"><h3>' + t('workStyle') +
      (ws.followUp ? ' <span class="rating Developing">' + t('needsFollowUp') + '</span>' : '') + '</h3>' +
      '<div style="font-size:15px;font-weight:600">' + (ar ? st.ar : st.en) + '</div>' +
      '<div class="mini-label" style="margin-top:8px">' + t('howToManage') + '</div>' +
      '<div style="font-size:13px">' + (ar ? st.doAr : st.doEn) + '</div>' +
      '<div style="font-size:13px;margin-top:6px;color:var(--text-muted)">' + ui.esc(ws.note) + '</div>' +
      '<div class="disclaimer">' + t('workStyleNote') + '</div></div>' : '';

    // Operational data (skills, tenure) is visible to anyone who can see the
    // person; people-sensitive sections are gated to direct manager / self / director.
    if (!sens) {
      return skills + tn +
        '<div class="section"><div class="sub">' + WP.ui.icon('lock',14) + ' ' + t('sensitiveHidden') + '</div></div>';
    }
    // Self sees development view (manager coaching, skills, EQ, quarterly) but NOT
    // the raw management signals (director succession note + work-style label).
    const lensPart = managerLens + (selfView ? '' : directorLens);
    const wsPart = selfView ? '' : workStyle;
    return lensPart + wsPart + skills + eqSection + quarterly + tn;
  }

  function promoSection(p) {
    const r = WP.growth.promotionReadiness(p);
    const t = WP.i18n.t;
    const col = r.fairnessGap ? 'var(--state-near)' : (r.pct >= 70 ? 'var(--state-available)' : 'var(--state-balanced)');
    return '<div class="section"><h3>' + t('promoReady') + '</h3>' +
      '<div class="promo">' +
        '<div class="ring" style="color:' + col + ';box-shadow:inset 0 0 0 6px ' + col + '">' + r.pct + '%</div>' +
        '<div style="flex:1"><div style="font-size:13px">' + ui.esc(r.note) + '</div>' +
        '<div class="mini-label" style="margin-top:6px">Tier-1 delivered: ' + r.tier1Delivered +
          ' · ' + (r.sustainable ? (WP.state.lang === 'ar' ? 'مستدام' : 'sustainable') : (WP.state.lang === 'ar' ? 'محمّل زيادة' : 'over-loaded')) + '</div>' +
        '</div></div>' +
      '<div class="disclaimer">' + t('devOnly') + '</div></div>';
  }

  /* Upward feedback RECEIVED by a manager — visible only to people above
   * them (skip-level) / admin, aggregated + anonymous, k-threshold suppressed. */
  function upwardReceived(p) {
    if (!WP.access.canSeeUpward(WP.viewer(), p.id)) return '';
    if (!WP.access.directReports(p.id).length) return '';
    const t = WP.i18n.t, ar = WP.state.lang === 'ar';
    const u = WP.data.UPWARD[p.id];
    if (!u || u.n < WP.data.MIN_RATERS) {
      return '<div class="section"><h3>' + t('upwardReceived') + '</h3>' +
        '<div class="sub">' + WP.ui.icon('lock',14) + ' ' + t('upwardSuppressed').replace('{k}', WP.data.MIN_RATERS).replace('{n}', (u ? u.n : 0)) + '</div></div>';
    }
    const ov = WP.evaluation.upwardOverall(u);
    const bars = WP.data.UPWARD_CRITERIA.map(function (c) {
      const s = u.scores[c.id] || 0;
      return '<div class="skill"><div class="nm2">' + (ar ? c.ar : c.en) + '</div>' +
        '<div class="track"><i style="width:' + (s / 5 * 100) + '%"></i></div>' +
        '<div class="trend">' + s + '/5</div></div>';
    }).join('');
    return '<div class="section"><h3>' + t('upwardReceived') +
      ' <span class="rating Meets">' + ov + '/5 · ' + u.n + ' ' + t('raters') + '</span></h3>' +
      bars +
      '<div class="mini-label" style="margin-top:8px">' + t('themes') + '</div>' +
      '<div>' + u.themes.map(function (x) { return '<span class="tag">“' + ui.esc(x) + '”</span>'; }).join('') + '</div>' +
      '<div class="disclaimer">' + t('upwardReceivedNote') + '</div></div>';
  }

  /* Compensation — budget authority only (Director / Super Admin). Shows
   * pay-band + compa-ratio context, never peer-by-peer salaries. */
  function compPanel(p) {
    if (!WP.access.canSeeComp(WP.viewer())) return '';
    const c = WP.data.COMP[p.id];
    if (!c) return '';
    const t = WP.i18n.t;
    const compa = WP.evaluation.compaRatio(c);
    const pos = Math.max(0, Math.min(100, (c.salary - c.min) / (c.max - c.min) * 100));
    const money = function (n) { return n.toLocaleString() + ' SAR'; };
    return '<div class="section"><h3>' + WP.ui.icon('wallet',16) + ' ' + t('compensation') + '</h3>' +
      '<div class="kv"><div class="k">' + t('band') + '</div><div>' + c.band + '</div>' +
      '<div class="k">' + t('salary') + '</div><div>' + money(c.salary) + ' / mo</div>' +
      '<div class="k">' + t('compaRatio') + '</div><div>' + compa + (compa < 0.8 ? ' · below band' : compa > 1.2 ? ' · red zone' : ' · in band') + '</div></div>' +
      '<div class="mini-label" style="margin-top:8px">' + t('rangePosition') + '</div>' +
      '<div class="track" style="height:10px;position:relative"><i style="width:' + pos + '%"></i>' +
        '<span class="req" style="inset-inline-start:50%"></span></div>' +
      '<div class="ttl" style="margin-top:4px">' + money(c.min) + ' — ' + money(c.mid) + ' — ' + money(c.max) + '</div>' +
      '<div class="disclaimer">' + t('compNote') + '</div></div>';
  }

  /* ---- Evidence Timeline (Intelligence Layer P1) — manager/director/self only.
   * Read-only, derived from real signals, every entry sourced (no fabrication).
   * Growth highlighted; risk framed as early support. Filter by quarter+category. */
  const CAT_LABEL = { workload: 'catWorkload', wellbeing: 'catWellbeing', evaluation: 'catEvaluation', recognition: 'catRecognition', decision: 'catDecision', delivery: 'catDelivery', risk: 'catRisk', plan: 'catPlan' };
  const CAT_ICON = { workload: 'gauge', wellbeing: 'sprout', evaluation: 'clipboard', recognition: 'star', decision: 'key', delivery: 'check', risk: 'alert', plan: 'target' };
  function timelineSection(p) {
    const t = WP.i18n.t, ar = WP.state.lang === 'ar';
    const cached = (WP._tlCache && WP._tlCache.id === p.id) ? WP._tlCache.all : null;
    if (!cached) {
      // load persisted + derived once per opened profile, then re-render
      WP.events.query(p.id, {}, WP.state.refDate).then(function (evts) {
        WP._tlCache = { id: p.id, all: evts }; WP.setState({});
      });
    }
    const all = cached || WP.events.sortDesc(WP.events.derive(p.id, WP.state.refDate)); // derived view while loading
    const q = WP._tlQuarter || 'all', cat = WP._tlCategory || 'all';
    const shown = WP.events.filter(all, { quarter: q, category: cat });
    const qs = WP.events.quarters(all);

    const qChips = ['all'].concat(qs).map(function (x) {
      return '<button class="tl-chip' + (x === q ? ' on' : '') + '" data-tlq="' + x + '">' + (x === 'all' ? t('tlAll') : x) + '</button>';
    }).join('');
    const catChips = ['all'].concat(WP.events.CATEGORIES).map(function (x) {
      return '<button class="tl-chip' + (x === cat ? ' on' : '') + '" data-tlc="' + x + '">' + (x === 'all' ? t('tlAll') : t(CAT_LABEL[x])) + '</button>';
    }).join('');

    let body;
    if (!shown.length) {
      body = '<div style="text-align:center;padding:22px 0"><div class="sub" style="font-weight:600">' + t('tlEmpty') + '</div>' +
        '<div class="sub">' + t('tlEmptyNote') + '</div></div>';
    } else {
      body = shown.map(function (e) {
        const d = new Date(e.ts), date = isNaN(d) ? '' : d.toISOString().slice(0, 10);
        const label = t(CAT_LABEL[e.category] || 'catDecision');
        return '<div class="tl-row' + (e.growth ? ' tl-growth' : '') + '">' +
            '<span class="tl-cat tl-' + e.category + '">' + WP.ui.icon(CAT_ICON[e.category] || 'list', 13) + ' ' + label + '</span>' +
            '<div class="tl-body"><div class="tl-desc">' + ui.esc(e.description) + '</div>' +
              '<div class="tl-meta">' + date + ' · ' + t('tlSource') + ': ' + ui.esc(e.source) +
                (e.confidence ? ' · ' + ui.esc(e.confidence) : '') + '</div></div>' +
          '</div>';
      }).join('');
    }
    return '<div class="section"><h3>' + WP.ui.icon('list', 16) + ' ' + t('tlTitle') + '</h3>' +
      '<div class="disclaimer" style="margin-top:0">' + WP.ui.icon('bulb', 13) + ' ' + t('tlHint') + '</div>' +
      '<div class="tl-filters">' + qChips + '<span class="tl-sep"></span>' + catChips + '</div>' +
      body + '</div>';
  }

  /* ---- full profile ---- */
  function render(root) {
    const p = WP.access.byId(WP.state.selectedId);
    if (!p || !WP.access.canSee(WP.viewer(), p.id)) {
      root.innerHTML = '<div class="section">Not authorized to view this profile.</div>';
      return;
    }
    const snap = WP.capacity.snapshot(p, WP.state.window, WP.state.refDate);
    const c = ui.stateColor(snap.state);
    const dc = p.dailyCheckin;
    const t = WP.i18n.t;
    const fr = WP.growth.flightRisk(p);
    const rel = WP.access.relationshipTo(WP.viewer(), p.id);
    const sens = WP.access.canSeeSensitive(WP.viewer(), p.id);
    const selfView = rel === 'self'; // employees see their development view, not raw risk labels
    const relText = { self: t('relSelf'), manager: t('relManager'), senior: t('relSenior'), director: t('relDirector') }[rel] || '';
    const provenance = '<div class="provenance"><span>' + WP.ui.icon('lock',14) + '</span> ' + relText +
      (sens ? '' : ' · <em>' + t('sensitiveHidden') + '</em>') + '</div>';

    root.innerHTML =
      '<button class="btn" id="back" style="margin-bottom:16px"><span class="ar ar-left"></span> ' + t('back') + '</button>' +
      '<div class="profile-head">' + ui.avatar(p, c) +
        '<div><div class="nm" style="font-size:20px">' + ui.esc(WP.i18n.name(p)) + '</div>' +
        '<div class="ttl">' + ui.esc(WP.i18n.title(p)) + '</div></div>' +
        '<div style="margin-inline-start:auto;text-align:end">' +
        '<div class="value" style="color:' + c + ';font-size:28px;font-weight:700">' + snap.load + '%</div>' +
        '<div class="sub">' + ui.esc(WP.i18n.stateLabel(snap.state)) + '</div></div></div>' +

      provenance +
      ((rel === 'manager' || rel === 'director') ? '<button class="btn primary" id="open-eval" style="margin-bottom:14px">' + ui.icon('clipboard', 15) + ' ' + t('openEvaluation') + '</button>' : '') +
      (selfView ? '<button class="btn primary" id="self-eval" style="margin-bottom:14px">' + WP.ui.icon('pencil',15) + ' ' + t('mySelfAssessment') + '</button> ' : '') +
      (selfView && p.managerId ? '<button class="btn" id="eval-mgr" style="margin-bottom:14px"><span class="ar ar-up"></span> ' + t('evaluateMyManager') + '</button>' : '') +
      (snap.burnout ? '<div class="warn-banner">' + WP.ui.icon('flame',15) + ' ' + t('burnoutFlag') + '</div>' : '') +
      (sens && !selfView && fr.risk ? '<div class="banner-risk">' + WP.ui.icon('alert',15) + ' ' + t('flightRisk') + ' — ' + ui.esc(fr.reasons.join(' · ')) + '</div>' : '') +
      (WP.growth.isRamping(p) ? '<div class="banner-info">' + WP.ui.icon('sprout',15) + ' ' + t('rampingUp') + '</div>' : '') +

      (sens ? promoSection(p) : '') +

      '<div class="profile-body">' +
        '<div class="section"><h3>' + t('pressure') + '</h3>' + projectsList(p) + '</div>' +
        (dc ? '<div class="section"><h3>' + t('dailySummary') + '</h3><div class="kv">' +
          '<div class="k">' + t('plan') + '</div><div>' + ui.esc(dc.plan) + '</div>' +
          '<div class="k">' + t('done') + '</div><div>' + ui.esc(dc.done) + '</div>' +
          '<div class="k">' + t('remaining') + '</div><div>' + ui.esc(dc.remaining) + '</div>' +
          '<div class="k">' + t('learned') + '</div><div>' + ui.esc(dc.learned) + '</div>' +
          '</div></div>' : '') +
        growthSections(p, sens, selfView) +
        (sens ? timelineSection(p) : '') +
        upwardReceived(p) +
        compPanel(p) +
      '</div>';

    root.querySelector('#back').onclick = function () { WP._tlCache = null; WP._tlQuarter = 'all'; WP._tlCategory = 'all'; WP.setState({ route: 'map', selectedId: null }); };
    root.querySelectorAll('[data-tlq]').forEach(function (b) { b.onclick = function () { WP._tlQuarter = b.dataset.tlq; WP.setState({}); }; });
    root.querySelectorAll('[data-tlc]').forEach(function (b) { b.onclick = function () { WP._tlCategory = b.dataset.tlc; WP.setState({}); }; });
    const oe = root.querySelector('#open-eval');
    // S4-1 — opened from a profile → evaluation's back button returns to the profile.
    if (oe) oe.onclick = function () { WP.setState({ route: 'evaluation', evalOrigin: 'profile' }); };
    const em = root.querySelector('#eval-mgr');
    if (em) em.onclick = function () { WP.setState({ route: 'upward', selectedId: p.managerId }); };
    const se = root.querySelector('#self-eval');
    if (se) se.onclick = function () { WP.setState({ route: 'evaluation', selectedId: p.id, evalOrigin: 'profile' }); };
  }

  WP.ui.peek = peek;
  WP.ui.profile = { render: render };
})(window.WP = window.WP || {});

</script>
  <script>
/* ============================================================
 * Tempo — Assignment Drawer
 * ------------------------------------------------------------
 * AI suggests, humans decide. Candidates are ranked by proximity
 * then lowest load. Hover/select simulates the projected load and
 * state change. Overloaded candidates are soft-locked and require
 * a logged override (who/when/why) — transparency, not punishment.
 * ========================================================== */
(function (WP) {
  'use strict';
  const ui = WP.ui;

  function proximity(viewer, person) {
    if (person.managerId === viewer.id) return 0;          // direct report
    if (WP.access.teamOf(viewer.id).some(function (p) { return p.id === person.id; })) return 1; // in team
    return 2;
  }

  /* Step 1 — capture the work request (this is what makes the tool the
   * single place requests land, instead of Slack + verbal). */
  function openRequest() {
    const viewer = WP.viewer();
    if (!WP.access.canAct(viewer)) return;
    const t = WP.i18n.t;
    const host = document.getElementById('overlay-host');
    const tierOpts = Object.keys(WP.data.TIERS).map(function (k) {
      const ti = WP.data.TIERS[k];
      return '<option value="' + k + '">' + (WP.state.lang === 'ar' ? ti.labelAr : ti.labelEn) + ' · ' + ti.weight + '%</option>';
    }).join('');
    host.innerHTML = '<div class="overlay"><div class="drawer">' +
      '<button class="btn icon-btn" id="close" style="margin-bottom:14px" aria-label="Close">' + WP.ui.icon('x', 14) + '</button>' +
      '<h3>' + WP.ui.icon('plus', 16) + ' ' + t('newRequest') + '</h3>' +
      '<div class="sub" style="margin-bottom:14px">' + t('newRequestNote') + '</div>' +
      '<label class="req-l">' + t('reqTitle') + '</label><input id="r-title" class="req-i" placeholder="e.g. Pop-up Concert" />' +
      '<label class="req-l">' + t('reqTier') + '</label><select id="r-tier" class="req-i">' + tierOpts + '</select>' +
      '<div style="display:flex;gap:10px">' +
        '<div style="flex:1"><label class="req-l">' + t('reqStart') + '</label><input id="r-start" type="date" class="req-i" value="' + WP.state.refDate + '" /></div>' +
        '<div style="flex:1"><label class="req-l">' + t('reqEnd') + '</label><input id="r-end" type="date" class="req-i" value="' + WP.state.refDate + '" /></div></div>' +
      '<label class="req-l">' + t('reqCity') + '</label><input id="r-city" class="req-i" placeholder="Riyadh" />' +
      '<button class="btn primary" id="r-find" style="margin-top:16px;width:100%">' + t('findCandidates') + ' →</button>' +
      '</div></div>';
    host.querySelector('#close').onclick = function () { host.innerHTML = ''; };
    host.querySelector('.overlay').onclick = function (e) { if (e.target.classList.contains('overlay')) host.innerHTML = ''; };
    host.querySelector('#r-find').onclick = function () {
      const title = host.querySelector('#r-title').value.trim() || t('untitledRequest');
      const tier = parseInt(host.querySelector('#r-tier').value, 10);
      const start = host.querySelector('#r-start').value || WP.state.refDate;
      const end = host.querySelector('#r-end').value || start;
      const city = host.querySelector('#r-city').value.trim() || '—';
      const id = 'req_' + Date.now();
      WP.data.EVENTS[id] = { id: id, tier: tier, nameEn: title, nameAr: title, start: start, end: (end < start ? start : end), city: city, intl: false };
      WP.logEvent({ type: 'request-created', by: WP.state.viewerId, target: title + ' (T' + tier + ')' });
      open(id); // step 2 → ranked candidates
    };
  }

  function open(eventId) {
    const viewer = WP.viewer();
    if (!WP.access.canAct(viewer)) return;
    const ev = WP.data.EVENTS[eventId];
    const people = WP.access.visiblePeople(viewer).filter(function (p) { return p.id !== viewer.id; });

    const ranked = people.map(function (p) {
      return { p: p, sim: WP.capacity.simulateAssignment(p, eventId, WP.state.window, WP.state.refDate),
               prox: proximity(viewer, p) };
    }).sort(function (a, b) {
      if (a.prox !== b.prox) return a.prox - b.prox;       // proximity first
      return a.sim.before - b.sim.before;                  // then lowest current load
    });

    // The top of the ranked list is the system's SUGGESTED pick (capacity + proximity).
    // We record whether the human took it — honest AI-acceptance provenance, only when
    // a suggestion was actually shown (ranked has candidates). No ranking → no flag.
    const aiSuggested = ranked.length ? ranked[0].p.id : null;

    const host = document.getElementById('overlay-host');
    host.innerHTML = '<div class="overlay"><div class="drawer">' +
      '<button class="btn icon-btn" id="close" style="margin-bottom:14px" aria-label="Close">' + WP.ui.icon('x', 14) + '</button>' +
      '<h3>' + WP.i18n.t('assign') + ': ' + ui.esc(WP.i18n.eventName(ev)) +
        ' <span class="tier-chip" style="background:' + ui.tierColor(ev.tier) + '">T' + ev.tier + '</span></h3>' +
      '<div class="sub" style="margin-bottom:12px">' + WP.i18n.t('candidates') + '</div>' +
      ranked.map(function (r) {
        const after = r.sim.afterState, c = ui.stateColor(after);
        const locked = r.sim.softLocked;
        return '<div class="row" data-pid="' + r.p.id + '" style="--node-accent:' + ui.stateColor(r.sim.beforeState) + '">' +
          ui.avatar(r.p, ui.stateColor(r.sim.beforeState)) +
          '<div style="flex:1"><div class="nm" style="font-size:13px">' + ui.esc(WP.i18n.name(r.p)) + '</div>' +
          '<div class="ttl">' + WP.i18n.t('projected') + ': ' + r.sim.before + '% → <b style="color:' + c + '">' +
            r.sim.after + '%</b> · ' + ui.esc(WP.i18n.stateLabel(after)) + '</div></div>' +
          (locked
            ? '<button class="btn" data-override="' + r.p.id + '">' + WP.i18n.t('softLocked') + '</button>'
            : '<button class="btn primary icon-btn" data-do="' + r.p.id + '" aria-label="' + WP.i18n.t('assign') + '">' + WP.ui.icon('plus', 15) + '</button>') +
        '</div>';
      }).join('') +
      '</div></div>';

    host.querySelector('#close').onclick = function () { host.innerHTML = ''; };
    host.querySelector('.overlay').onclick = function (e) { if (e.target.classList.contains('overlay')) host.innerHTML = ''; };

    host.querySelectorAll('[data-do]').forEach(function (b) {
      b.onclick = function () { doAssign(eventId, b.dataset.do, false, null, aiSuggested); host.innerHTML = ''; };
    });
    host.querySelectorAll('[data-override]').forEach(function (b) {
      b.onclick = function () {
        const why = prompt('Override reason (logged):');
        if (why) { doAssign(eventId, b.dataset.override, true, why, aiSuggested); host.innerHTML = ''; }
      };
    });
  }

  function doAssign(eventId, personId, override, why, aiSuggested) {
    const p = WP.access.byId(personId);
    if (!p.assignedEvents.includes(eventId)) p.assignedEvents.push(eventId);
    const entry = {
      type: override ? 'override-assign' : 'assign',
      by: WP.state.viewerId, target: personId, event: eventId, reason: why || null,
    };
    // AI-acceptance provenance: only stamp when a suggestion was actually shown.
    // Taking the top-ranked pick = accepted; choosing another / overriding = not.
    if (aiSuggested != null) entry.aiAccepted = (!override && personId === aiSuggested);
    WP.logEvent(entry);
    WP.setState({}); // re-render
  }

  WP.ui.assignmentDrawer = { open: open, openRequest: openRequest };
})(window.WP = window.WP || {});
