  <script>
/* ============================================================
 * Webook Workload — Daily Tasks (auto-read from Slack #daily-checkin)
 * ------------------------------------------------------------
 * IA: overview-first summary, then compact "smart cards" — one key line
 * (today's done) + icon chips for status. Full detail (remaining/learned)
 * opens on click (progressive disclosure) to cut cognitive load & space.
 * ========================================================== */
(function (WP) {
  'use strict';
  const ui = WP.ui;

  function isAvailable(p, snap) {
    const dc = p.dailyCheckin;
    return (dc && dc.remaining && /noth|نشيء|nothing/i.test(dc.remaining)) || snap.load === 0;
  }

  function chip(icon, cls, title) {
    return '<span class="dt-chip ' + cls + '" title="' + ui.esc(title) + '" aria-label="' + ui.esc(title) + '">' + WP.ui.icon(icon, 14) + '</span>';
  }

  function card(p) {
    const dc = p.dailyCheckin;
    const snap = WP.capacity.snapshot(p, WP.state.window, WP.state.refDate);
    const c = ui.stateColor(snap.state);
    const t = WP.i18n.t;

    const avail = dc && isAvailable(p, snap);
    const chips =
      (snap.burnout ? chip('flame', 'risk', t('burnoutFlag')) : '') +
      (avail ? chip('sprout', 'ok', t('availableFlag')) : '') +
      (dc && dc.learned && dc.learned !== '—' ? chip('bulb', 'mut', t('learned') + ': ' + dc.learned) : '');

    const line = dc
      ? '<div class="dt-done">' + WP.ui.icon('check', 14) + '<span>' + ui.esc(dc.done || '—') + '</span></div>'
      : '<div class="dt-done none">' + t('noCheckin') + '</div>';

    return '<div class="dt-card" data-id="' + p.id + '" style="--node-accent:' + c + '" title="' + ui.esc(WP.i18n.title(p)) + '">' +
      '<div class="dt-top">' + ui.avatar(p, c) +
        '<div class="dt-id"><div class="nm">' + ui.esc(WP.i18n.name(p)) + '</div>' +
        '<div class="ttl">' + ui.esc(WP.i18n.title(p)) + '</div></div>' +
        '<div class="dt-load" style="color:' + c + '">' + snap.load + '%</div></div>' +
      line +
      (chips ? '<div class="dt-chips">' + chips + '</div>' : '') +
    '</div>';
  }

  function stat(icon, n, label, cls) {
    return '<div class="dt-stat ' + (cls || '') + '">' + WP.ui.icon(icon, 15) +
      '<b>' + n + '</b><span>' + label + '</span></div>';
  }

  function render(root) {
    const t = WP.i18n.t;
    const people = WP.access.visiblePeople(WP.viewer())
      .filter(function (p) { return p.dailyCheckin !== undefined; });

    // counts for the overview strip
    let checkedIn = 0, atRisk = 0, available = 0, noCheckin = 0;
    people.forEach(function (p) {
      const snap = WP.capacity.snapshot(p, WP.state.window, WP.state.refDate);
      if (p.dailyCheckin) checkedIn++; else noCheckin++;
      if (snap.burnout) atRisk++;
      if (p.dailyCheckin && isAvailable(p, snap)) available++;
    });

    // attention-first: at-risk → checked-in (recent) → no check-in last
    people.sort(function (a, b) {
      const sa = WP.capacity.snapshot(a, WP.state.window, WP.state.refDate);
      const sb = WP.capacity.snapshot(b, WP.state.window, WP.state.refDate);
      const rank = function (p, s) { return s.burnout ? 0 : (p.dailyCheckin ? 1 : 2); };
      const ra = rank(a, sa), rb = rank(b, sb);
      if (ra !== rb) return ra - rb;
      return new Date((b.dailyCheckin || {}).at || 0) - new Date((a.dailyCheckin || {}).at || 0);
    });

    root.innerHTML =
      '<button class="btn" id="back" style="margin-bottom:16px"><span class="ar ar-left"></span> ' + t('back') + '</button>' +
      '<h2 style="margin:0 0 2px">' + t('dailyTasks') + '</h2>' +
      '<div class="sub" style="margin-bottom:14px">' + t('dailyTasksNote') + '</div>' +
      '<div class="dt-summary">' +
        stat('check', checkedIn, t('checkedIn'), 'ok') +
        stat('flame', atRisk, t('earlyWarnings'), 'risk') +
        stat('sprout', available, t('available'), 'ok') +
        stat('clock', noCheckin, t('noCheckinShort'), 'mut') +
      '</div>' +
      '<div class="dt-grid">' + people.map(card).join('') + '</div>';

    root.querySelector('#back').onclick = function () { WP.setState({ route: 'map' }); };
    root.querySelectorAll('[data-id]').forEach(function (el) {
      el.onclick = function () { WP.setState({ route: 'profile', selectedId: el.dataset.id }); };
    });
  }

  WP.ui.dailyTasks = { render: render };
})(window.WP = window.WP || {});

</script>

(function (WP) {

  }

  function whatTheySee(level) {
    const map = {
      admin:      { en: 'Everything + manage permissions', ar: 'كل شيء + إدارة الصلاحيات' },

  function render(root) {

    if (!WP.access.canManage(WP.viewer())) {
      root.innerHTML = '<button class="btn" id="back" style="margin-bottom:16px"><span class="ar ar-left"></span> ' + t('back') + '</button>' +
        '<div class="section"><div class="sub">' + WP.ui.icon('lock',14) + ' ' + t('permsDenied') + '</div></div>';
      root.querySelector('#back').onclick = function () { WP.setState({ route: 'map' }); };
      return;
    }

    const rows = WP.data.PEOPLE.slice()
      .sort(function (a, b) { return WP.i18n.name(a).localeCompare(WP.i18n.name(b)); })

          '<div class="perm-meta"><div class="nm">' + ui.esc(WP.i18n.name(p)) + '</div>' +

    root.innerHTML =
      '<button class="btn" id="back" style="margin-bottom:16px"><span class="ar ar-left"></span> ' + t('back') + '</button>' +
      '<h2 style="margin:0 0 2px">' + t('permsTitle') + '</h2>' +
      '<div class="sub" style="margin-bottom:16px">' + t('permsNote') + '</div>' +
      '<div class="section"><h3>' + t('assignRole') + '</h3>' +
        '<div class="perm-list">' + rows + '</div>' +
        '<div class="disclaimer">' + t('permsLog') + '</div></div>';

    root.querySelector('#back').onclick = function () { WP.setState({ route: 'map' }); };
    root.querySelectorAll('[data-role]').forEach(function (sel) {
      sel.onchange = function () {
        const p = WP.access.byId(sel.dataset.role);
        const oldLevel = p.level;
        // safety: don't let an admin demote their own access and lock themselves out
        if (p.id === WP.state.viewerId && !WP.access.canManage(Object.assign({}, p, { level: sel.value }))) {
          window.alert(WP.i18n.t('cantDemoteSelf'));
          sel.value = oldLevel; return;
        }
        // governance + risk mitigation: confirm before changing someone's access
        const ok = window.confirm(WP.i18n.t('confirmRole')
          .replace('{n}', WP.i18n.name(p)).replace('{r}', roleLabel(sel.value)));
        if (!ok) { sel.value = oldLevel; return; }
        p.level = sel.value;
        WP.logEvent({ type: 'role-change', by: WP.state.viewerId, target: p.id,
                      reason: roleLabel(oldLevel) + ' → ' + roleLabel(p.level) });
        WP.setState({});
      };
    });
  }

  WP.ui.permissions = { render: render };
})(window.WP = window.WP || {});

  <script>
/* ============================================================
 * Webook Workload — Performance Evaluation screen (downward)
 * ------------------------------------------------------------
 * The LINE MANAGER (or director/admin) rates 16 weighted criteria
 * 1–5 and writes the qualitative feedback. Weighted overall → /5.
 * Interactive: click a score, type feedback, approve.
 * ========================================================== */
(function (WP) {
  'use strict';
  const ui = WP.ui;

  function canEvaluate(viewer, targetId) {
    const rel = WP.access.relationshipTo(viewer, targetId);
    return rel === 'manager' || rel === 'director'; // direct line manager, director, or admin
  }

  function statusClass(s) {
    return s === 'Completed' ? 'Exceeds' : s === 'In progress' ? 'Developing' : 'Meets';
  }

  // Localized label for an event category — reuses the timeline cat* keys.
  function catLabel(c, t) {
    var key = 'cat' + c.charAt(0).toUpperCase() + c.slice(1);
    var lbl = t(key);
    return (lbl && lbl !== key) ? lbl : c;
  }

  // One sourced evidence line: text + an attributed source chip (no judgement).
  function lineHTML(ln, t) {
    var when = ln.ts ? new Date(ln.ts).toISOString().slice(0, 10) : '';
    return '<li class="ep-line">' +
        '<span class="ep-text">' + WP.ui.esc(ln.text) + '</span>' +
        '<span class="ep-src">' + WP.ui.icon('eye', 12) + ' ' + t('epSource') + ': ' + WP.ui.esc(ln.source) +
          (when ? ' · ' + when : '') + '</span>' +
      '</li>';
  }

  // Mirror of evalIntel's citeId(): the stable ref string for a cited item. Lets the
  // band's "cites N" chip resolve its refs back to the sourced evidence objects.
  function refOf(e) { return e && (e.id || e.source || ((e.category || '') + '@' + (e.ts || ''))); }

  // "cites N items" as a REAL, keyboard-accessible control (Heuristic #1/#6 — evidence
  // is traceable, not decorative). Carries its refs so a click opens them. Empty refs →
  // no chip (never a dead affordance). Plural-correct via WP.i18n.plural.
  function evChip(refs, prefix, t) {
    var ids = (refs || []).filter(Boolean);
    if (!ids.length) return '';
    return '<button type="button" class="wbk-band-ev" data-refs="' + WP.ui.esc(ids.join('|')) + '"' +
        ' title="' + t('sbViewEvidence') + '">' +
      WP.ui.icon('eye', 12) + ' ' + WP.ui.esc(WP.i18n.plural(prefix, ids.length)) + '</button>';
  }

  // Evidence "timeline" filtered to a point's refs: a calm drawer listing the SOURCED
  // items behind it. De-fabricated — only items actually on record appear.
  function openEvidence(refs, all, t) {
    var set = {}; (refs || []).forEach(function (r) { set[r] = 1; });
    var items = (all || []).filter(function (e) { return set[refOf(e)]; });
    var host = document.getElementById('overlay-host');
    if (!host) return;
    host.innerHTML = '<div class="overlay"><div class="drawer">' +
      '<button class="btn icon-btn" id="ev-close" style="margin-bottom:14px" aria-label="Close">' + WP.ui.icon('x', 14) + '</button>' +
      '<h3>' + WP.ui.icon('eye', 16) + ' ' + t('sbEvTitle') + '</h3>' +
      '<div class="disclaimer">' + t('sbEvIntro') + '</div>' +
      (items.length
        ? '<ul class="ep-list">' + items.map(function (e) {
            return lineHTML({ text: e.text || catLabel(e.category || '', t), source: e.source, ts: e.ts }, t);
          }).join('') + '</ul>'
        : '<div class="ep-empty"><div class="ttl">' + t('sbEvNone') + '</div></div>') +
      '</div></div>';
    host.querySelector('#ev-close').onclick = function () { host.innerHTML = ''; };
    host.querySelector('.overlay').onclick = function (e) { if (e.target.classList.contains('overlay')) host.innerHTML = ''; };
  }

  // Wire the cited-evidence chips inside a freshly-rendered band to the evidence drawer.
  function wireEvidence(host, all, t) {
    host.querySelectorAll('.wbk-band-ev[data-refs]').forEach(function (btn) {
      btn.onclick = function () { openEvidence(btn.dataset.refs.split('|'), all, t); };
    });
  }

  /* Render the evidence-prep summary. PREP ONLY — deliberately renders NO score,
   * rating, or verdict; just sourced lines, growth highlights, and listed gaps. */
  function prepHTML(s, t, ar) {
    var head = '<h3>' + WP.ui.icon('clipboard', 14) + ' ' + t('epTitle') + '</h3>' +
      '<div class="disclaimer">' + t('epIntro') + '</div>';

    // Sparse → say so plainly; still show whatever little is on record.
    // S4-2 — when SOME sourced evidence exists, "Not enough evidence yet" reads as
    // contradictory next to the items shown. Soften to "Limited evidence so far"
    // so the banner and the listed evidence agree. Only a truly empty store keeps
    // the firmer "Not enough evidence yet" line.
    if (!s.enough) {
      var hasSome = s.sourcedCount > 0;
      var thin = s.sections.map(function (sec) {
        return '<div class="ep-cat"><div class="mini-label">' + catLabel(sec.category, t) + '</div>' +
          '<ul class="ep-list">' + sec.lines.map(function (l) { return lineHTML(l, t); }).join('') + '</ul></div>';
      }).join('');
      return head +
        '<div class="ep-empty"><div class="ttl" style="font-weight:600">' + WP.ui.icon('clock', 14) + ' ' +
            (hasSome ? t('epLimited') : t('epNotEnough')) + '</div>' +
          '<div class="ttl">' + (hasSome ? t('epLimitedNote') : t('epNotEnoughNote')) + '</div></div>' +
        thin +
        '<div class="disclaimer">' + t('epHuman') + '</div>';
    }

    var highlights = s.highlights.length
      ? '<div class="ep-cat ep-highlights"><div class="mini-label">' + WP.ui.icon('sprout', 13) + ' ' + t('epHighlights') + '</div>' +
          '<ul class="ep-list">' + s.highlights.map(function (l) { return lineHTML(l, t); }).join('') + '</ul></div>'
      : '';

    var sections = s.sections.map(function (sec) {
      return '<div class="ep-cat"><div class="mini-label">' + catLabel(sec.category, t) +
          ' <span class="ep-count">' + t('epCount').replace('{n}', sec.lines.length) + '</span></div>' +
        '<ul class="ep-list">' + sec.lines.map(function (l) { return lineHTML(l, t); }).join('') + '</ul></div>';
    }).join('');

    var gaps = s.gaps.length
      ? '<div class="ep-gaps"><div class="mini-label">' + WP.ui.icon('alert', 13) + ' ' + t('epGaps') + '</div>' +
          '<ul class="ep-list">' + s.gaps.map(function (g) {
            return '<li class="ep-gap">' + t('epGapLine').replace('{c}', catLabel(g.category, t)) + '</li>';
          }).join('') + '</ul></div>'
      : '';

    return head + highlights + sections + gaps +
      '<div class="disclaimer">' + t('epHuman') + '</div>';
  }

  /* Render the SUGGESTED RANGE as a calm support panel (P3, WP.evalIntel). It shows a
   * /5 BAND [low–high] — never a single number to copy — with confidence, cited
   * reasoning, and risks framed "weigh these". It NEVER replaces the manager's input
   * and carries NO apply button (the human decides). Sensitive-gated by the caller. */
  function bandHTML(s, t) {
    var head = '<h3>' + WP.ui.icon('sparkles', 14) + ' ' + t('sbTitle') + '</h3>' +
      '<div class="disclaimer">' + t('sbIntro') + '</div>';

    // "Not enough evidence yet" is a first-class, honest result — no fabricated band.
    if (!s || s.denied || !s.enoughEvidence || !Array.isArray(s.range)) {
      return head +
        '<div class="wbk-band-empty"><strong>' + WP.ui.icon('clock', 14) + ' ' + t('sbNotEnough') + '</strong>' +
          '<div class="wbk-band-sub">' + t('sbNotEnoughNote') + '</div></div>' +
        '<div class="disclaimer">' + t('sbHuman') + '</div>';
    }

    var lo = s.range[0], hi = s.range[1];
    var pct = function (v) { return ((v - 1) / 4) * 100; }; // /5 → 0–100% across the track
    var left = pct(lo), width = Math.max(pct(hi) - pct(lo), 2);
    var confKey = s.confidence === 'high' ? 'sbConfHigh' : (s.confidence === 'low' ? 'sbConfLow' : 'sbConfMed');

    var track =
      '<div class="wbk-band-val">' + lo.toFixed(1) + '–' + hi.toFixed(1) + '<span>/5</span></div>' +
      // gridlines (1–5) keep the span keyed to the scale, not floating decoration (#4).
      '<div class="wbk-band-track" role="img" aria-label="' + t('sbAria').replace('{lo}', lo).replace('{hi}', hi) + '">' +
        '<span class="wbk-band-grid" aria-hidden="true"></span>' +
        '<span class="wbk-band-span" style="inset-inline-start:' + left + '%;inline-size:' + width + '%"></span></div>' +
      '<div class="wbk-band-scale"><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></div>';

    var reason = s.reasoning && s.reasoning.length
      ? '<ul class="wbk-band-reason">' + s.reasoning.map(function (r) {
          return '<li><span>' + WP.ui.esc(r.text) + '</span>' + evChip(r.evidence, 'sbCites', t) + '</li>';
        }).join('') + '</ul>'
      : '';

    var risks = s.risks && s.risks.length
      ? '<div class="ep-gaps"><div class="mini-label">' + WP.ui.icon('alert', 13) + ' ' + t('sbWeigh') + '</div>' +
          '<ul class="wbk-band-reason">' + s.risks.map(function (rk) {
            return '<li class="wbk-band-risk"><span>' + WP.ui.esc(rk.text) + '</span>' + evChip(rk.evidence, 'sbCites', t) + '</li>';
          }).join('') + '</ul></div>'
      : '';

    var anchor = s.baseline
      ? '<div class="wbk-band-sub">' + (s.baseline.anchoredTo === 'orgMean'
          ? t('sbAnchorOrg').replace('{v}', s.baseline.value) : t('sbAnchorDefault')) + '</div>'
      : '';

    return head +
      '<div class="wbk-band-head"><span class="wbk-band-conf">' + WP.ui.icon('gauge', 12) + ' ' + t(confKey) + '</span></div>' +
      track + anchor + reason + risks +
      '<div class="disclaimer">' + t('sbHuman') + '</div>';
  }

  function render(root) {
    const t = WP.i18n.t, ar = WP.state.lang === 'ar';
    const p = WP.access.byId(WP.state.selectedId);
    const viewer = WP.viewer();
    const selfMode = !!(viewer && p && viewer.id === p.id);
    // S4-1 — the back button must match where the evaluation was opened from.
    // Self-assessments and anything launched from the Evaluations hub return there;
    // an evaluation opened from a person's profile returns to that profile.
    const fromEval = selfMode || WP.state.evalOrigin === 'evaluations';
    const backRoute = fromEval ? 'evaluations' : 'profile';
    const backLabel = fromEval ? t('backToEvaluations') : t('backToProfile');
    const back = function () { WP.setState({ route: backRoute }); };
    if (!p || (!selfMode && !canEvaluate(viewer, p.id))) {
      root.innerHTML = '<button class="btn" id="back" style="margin-bottom:16px"><span class="ar ar-left"></span> ' + backLabel + '</button>' +
        '<div class="section"><div class="sub">' + WP.ui.icon('lock',14) + ' ' + t('evalDenied') + '</div></div>';
      root.querySelector('#back').onclick = back; return;
    }
    // S3-1 — the evaluation belongs to the cycle the user opened it from (the
    // active cycle from the hub, or an explicitly selected one), not a stale
    // hardcoded period. Resolve it and show THAT cycle in the header.
    const cycle = WP.evaluation.cycles().find(function (c) { return c.id === WP.state.selectedCycle; })
      || WP.evaluation.activeCycle();
    const ev = selfMode ? WP.evaluation.ensureSelf(p.id) : WP.evaluation.ensure(p.id);
    const periodLabel = (cycle && cycle.name) ? cycle.name : ev.period;
    const selfCmp = selfMode ? null : WP.data.SELF[p.id]; // manager sees the employee's self-rating beside theirs
    const score = WP.evaluation.overall(ev);
    const evaluator = ev.evaluatorId ? WP.access.byId(ev.evaluatorId) : null;
    // Evaluation prep (P2) — evidence the manager already has, manager-gated and
    // never in self-mode. PREP ONLY: the panel never shows a score/rating/verdict.
    const showPrep = !selfMode && WP.evalPrep && WP.access.canSeeSensitive(viewer, p.id);

    const criteria = WP.data.EVAL_CRITERIA.map(function (c, i) {
      const cur = ev.scores[c.id];
      const scale = [1, 2, 3, 4, 5].map(function (n) {
        return '<button class="scale-btn' + (cur === n ? ' on' : '') + '" data-c="' + c.id + '" data-n="' + n + '">' + n + '</button>';
      }).join('');
      const selfBadge = (selfCmp && typeof selfCmp.scores[c.id] === 'number')
        ? '<span class="self-badge" title="self-rating">' + WP.ui.icon('user',13) + ' ' + selfCmp.scores[c.id] + '</span>' : '';
      return '<div class="crit-row">' +
        '<div class="crit-name"><span class="crit-num">' + (i + 1) + '</span> ' + (ar ? c.ar : c.en) +
          '<span class="crit-w">' + c.weight + '%</span>' + selfBadge + '</div>' +
        '<div class="scale">' + scale + '</div></div>';
    }).join('');

    const questions = WP.data.EVAL_QUESTIONS
      .filter(function (q) { return !(selfMode && q.key === 'recommendations'); })
      .map(function (q) {
      return '<div class="eval-q">' +
        '<div class="mini-label">' + (ar ? q.ar : q.en) + (q.sensitive ? ' ' + WP.ui.icon('lock',14) + '' : '') + '</div>' +
        '<div class="ttl" style="margin-bottom:6px">' + (ar ? q.promptAr : q.promptEn) + '</div>' +
        '<textarea class="eval-ta" data-q="' + q.key + '" rows="2" placeholder="…">' + ui.esc(ev.feedback[q.key] || '') + '</textarea>' +
      '</div>';
    }).join('');

    root.innerHTML =
      '<button class="btn" id="back" style="margin-bottom:14px"><span class="ar ar-left"></span> ' + backLabel + '</button>' +
      '<div class="eval-head">' +
        '<div><div class="ttl">' + t('performance') + ' · ' + ui.esc(periodLabel) + '</div>' +
          '<h2 style="margin:2px 0">' + (selfMode ? t('selfAssessment') : t('evaluation')) + ' — ' + ui.esc(WP.i18n.name(p)) + '</h2>' +
          '<div class="ttl">' + ui.esc(WP.i18n.title(p)) +
            (evaluator ? ' · ' + t('evaluator') + ': ' + ui.esc(WP.i18n.name(evaluator)) : '') + '</div></div>' +
        '<div class="eval-score"><div class="eval-num">' + (score == null ? '–' : score) + '<span>/5</span></div>' +
          '<span class="rating ' + statusClass(ev.status) + '">' + ui.esc(ev.status) + '</span></div>' +
      '</div>' +

      (showPrep ? '<div class="section eval-prep" id="eval-prep-host" aria-live="polite"><div class="ttl">' + WP.ui.icon('clipboard',14) + ' ' + t('epLoading') + '</div></div>' : '') +

      // ANCHORING GUARD (Heuristic #2/#5): the suggested range is COLLAPSED on load —
      // the manager forms their own view first, then reveals it on demand. data-suggested
      // stays EMPTY until reveal, so "shown" == "revealed" for B1's provenance stamp.
      (showPrep ? '<div class="section wbk-band wbk-band--collapsed" id="eval-suggested-band" data-suggested="" aria-live="polite">' +
        '<h3>' + WP.ui.icon('sparkles',14) + ' ' + t('sbTitle') + '</h3>' +
        '<div class="disclaimer">' + t('sbRevealNote') + '</div>' +
        '<button type="button" class="btn" id="sb-reveal" disabled>' + WP.ui.icon('eye',14) + ' ' + t('epLoading') + '</button>' +
      '</div>' : '') +

      '<div class="section"><h3>' + (selfMode ? t('selfAssessment') : t('downwardFeedback')) + ' · ' + t('criteriaTitle') +
        '<span class="ttl" style="font-weight:400"> · ' + t('groupWeight') + ' 100% · ' + t('scale') + ' 1–5</span></h3>' +
        (selfCmp ? '<div class="disclaimer">' + WP.ui.icon('user',13) + ' = ' + t('selfRating') + '</div>' : '') +
        criteria + '</div>' +

      '<div class="section"><h3>' + t('feedbackQs') + '</h3>' + questions +
        '<div class="disclaimer">' + t('evalNote') + '</div>' +
        '<div style="margin-top:12px;display:flex;gap:8px">' +
          '<button class="btn primary" id="approve">' + (ev.status === 'Completed' ? '' + WP.ui.icon('check',14) + ' ' + t('approved') : t('approve')) + '</button>' +
          '<button class="btn" id="dl">' + t('downloadReport') + '</button></div>' +
      '</div>';

    root.querySelector('#back').onclick = back;

    // AI-acceptance provenance: alongside the prep panel (same sensitive-access gate),
    // pull the engine's SUGGESTED rating band. We stamp acceptance at approval only
    // when a real suggestion exists (enoughEvidence) — never fabricate it on a manual
    // eval with no AI input. Held in a closure the approve handler reads.
    let aiSuggestion = null;
    if (showPrep && WP.evalIntel) {
      // Fetch eagerly so reveal is instant, but DO NOT render or stamp until the
      // manager reveals it. Revealing is the act that makes the suggestion "shown":
      // only then do we fill the band, stamp data-suggested, and arm aiSuggestion for
      // the acceptance flag. A band never revealed = no AI shown = no provenance — which
      // keeps B1's later aiAccepted stamp honest. (CONTRACT: shown == revealed.)
      const revealBand = function (s, host) {
        if (s && s.enoughEvidence && Array.isArray(s.range)) aiSuggestion = s;
        host.classList.remove('wbk-band--collapsed');
        host.innerHTML = bandHTML(s, t);
        host.setAttribute('data-suggested',
          (s && s.enoughEvidence && Array.isArray(s.range)) ? (s.range[0] + '-' + s.range[1]) : '');
        wireEvidence(host, (s && s.evidence) || [], t); // chips → cited-evidence drawer (#1)
      };
      const armReveal = function (s) {
        const host = root.querySelector('#eval-suggested-band');
        if (!host) return;
        const btn = host.querySelector('#sb-reveal');
        if (!btn) return;
        btn.disabled = false;
        btn.innerHTML = WP.ui.icon('eye', 14) + ' ' + t('sbReveal');
        btn.onclick = function () { revealBand(s, host); };
      };
      Promise.resolve(WP.evalIntel.suggestedRange(p.id, ev.period, { viewer: viewer, refDate: WP.state.refDate }))
        .then(armReveal)
        .catch(function () { armReveal(null); });
    }

    // Fill the evidence-prep panel asynchronously (reads the append-only event store).
    if (showPrep) {
      WP.evalPrep.prepare(p.id, {}, WP.state.refDate).then(function (summary) {
        const host = root.querySelector('#eval-prep-host');
        if (host) host.innerHTML = prepHTML(summary, t, ar);
      }).catch(function () {
        const host = root.querySelector('#eval-prep-host');
        if (host) host.innerHTML = '<div class="ttl">' + t('epNotEnough') + '</div>';
      });
    }

    // Downward evaluations sync through WP.db (shared backend + localStorage
    // fallback). Self-assessments (SELF) stay local in Phase 1 — out of scope.
    const saveEval = function () {
      ev.updated_at = new Date().toISOString();
      if (!selfMode && WP.db && WP.db.evaluations) {
        WP.db.evaluations.upsert(p.id, ev).then(function (r) { if (r && r.offline) WP.setState({}); });
      }
    };
    root.querySelectorAll('.scale-btn').forEach(function (b) {
      b.onclick = function () {
        ev.scores[b.dataset.c] = parseInt(b.dataset.n, 10);
        if (ev.status === 'Not started') ev.status = 'In progress';
        saveEval();
        WP.setState({});
      };
    });
    root.querySelectorAll('.eval-ta').forEach(function (ta) {
      ta.onchange = function () { ev.feedback[ta.dataset.q] = ta.value; saveEval(); };
    });
    const ap = root.querySelector('#approve');
    if (ap) ap.onclick = function () {
      ev.status = 'Completed'; ev.evaluatorId = ev.evaluatorId || WP.state.viewerId;
      const overall = WP.evaluation.overall(ev);
      const entry = { type: 'evaluation', by: WP.state.viewerId, target: p.id, reason: 'approved · ' + (overall || '–') + '/5' };
      // Accepted = the human's final overall landed inside the AI-suggested band.
      // Only when a suggestion was actually shown (enoughEvidence); else no flag.
      if (aiSuggestion && typeof overall === 'number') {
        entry.aiAccepted = (overall >= aiSuggestion.range[0] && overall <= aiSuggestion.range[1]);
      }
      WP.logEvent(entry);
      saveEval();
      WP.setState({});
    };
    const dl = root.querySelector('#dl');
    if (dl) dl.onclick = function () { dl.textContent = t('downloadReport') + ' ' + WP.ui.icon('check',14) + ''; };
  }

  WP.ui.evaluation = { render: render };
})(window.WP = window.WP || {});

</script>
  <script>
/* ============================================================
 * Webook Workload — Upward feedback (employee → manager)
 * ------------------------------------------------------------
 * A report rates their manager on leadership BEHAVIORS. The result
 * is aggregated + anonymous and routed UP the chain (to the manager's
 * manager / C-level) — never shown to the rated manager raw. So the
 * rater feels safe. Behaviors, not personality.
 * ========================================================== */
(function (WP) {
  'use strict';
  const ui = WP.ui;

  // who receives the routed-up feedback about `manager`
  function recipientLabel(manager) {
    if (manager && manager.managerId) {
      const up = WP.access.byId(manager.managerId);
      return up ? WP.i18n.name(up) : 'their manager';
    }
    return 'C-level'; // rating the Director → goes to C-level
  }

  function render(root) {
    const t = WP.i18n.t, ar = WP.state.lang === 'ar';
    const manager = WP.access.byId(WP.state.selectedId);
    const viewer = WP.viewer();
    const back = function () { WP.setState({ route: 'map', selectedId: null }); };
    // you may rate only your OWN manager
    if (!manager || !viewer || viewer.managerId !== manager.id) {
      root.innerHTML = '<button class="btn" id="back" style="margin-bottom:16px"><span class="ar ar-left"></span> ' + t('back') + '</button>' +
        '<div class="section"><div class="sub">' + t('upwardOnlyOwn') + '</div></div>';
      root.querySelector('#back').onclick = back; return;
    }

    const draft = (WP._upwardDraft = WP._upwardDraft || { scores: {}, feedback: {} });
    const crit = WP.data.UPWARD_CRITERIA.map(function (c) {
      const cur = draft.scores[c.id];
      const scale = [1, 2, 3, 4, 5].map(function (n) {
        return '<button class="scale-btn' + (cur === n ? ' on' : '') + '" data-c="' + c.id + '" data-n="' + n + '">' + n + '</button>';
      }).join('');
      return '<div class="crit-row"><div class="crit-name">' + (ar ? c.ar : c.en) + '</div><div class="scale">' + scale + '</div></div>';
    }).join('');
    const qs = WP.data.UPWARD_QUESTIONS.map(function (q) {
      return '<div class="eval-q"><div class="mini-label">' + (ar ? q.ar : q.en) + '</div>' +
        '<textarea class="eval-ta" data-q="' + q.key + '" rows="2">' + ui.esc(draft.feedback[q.key] || '') + '</textarea></div>';
    }).join('');

    root.innerHTML =
      '<button class="btn" id="back" style="margin-bottom:14px"><span class="ar ar-left"></span> ' + t('back') + '</button>' +
      '<h2 style="margin:0 0 2px">' + t('upwardTitle') + '</h2>' +

  <script>
/* ============================================================
 * Webook Workload — Evaluations hub (Performance › Evaluations)
 * ------------------------------------------------------------
 * The home for evaluations: the active cycle, MY pending tasks +
 * deadline, team-progress %, and status per person. Super Admin
 * can open a new cycle. Mirrors a real performance-tool dashboard.
 * ========================================================== */
(function (WP) {
  'use strict';
  const ui = WP.ui;

  function statusChip(s) {
    const cls = s === 'Completed' ? 'Exceeds' : s === 'In progress' ? 'Developing' : 'Meets';
    return '<span class="rating ' + cls + '">' + s + '</span>';
  }

  // Backend sync states (loading / offline-fallback / subtle success). Reads
  // WP.db.status; renders nothing when signed-out/local-only (no backend).
  function syncBanner() {
    const t = WP.i18n.t;
    const db = WP.db;
    if (!db || !db.usingBackend || !db.usingBackend()) return '';
    const s = db.status || {};
    if (s.loading) return '<div class="sync-note loading">' + WP.ui.icon('clock', 14) + ' ' + t('evalSyncing') + '</div>';
    if (s.offline) return '<div class="sync-note offline">' + WP.ui.icon('alert', 14) + ' ' + t('evalLoadError') + '</div>';
    if (s.synced)  return '<div class="sync-note synced">' + WP.ui.icon('check', 14) + ' ' + t('evalSynced') + '</div>';
    return '';
  }

  // Phase 1: re-fetch shared evaluations once per session, then re-render.
  // Realtime subscriptions are a later phase (SPEC P4).
  function ensureLoaded() {
    const db = WP.db;
    if (db && db.usingBackend && db.usingBackend() && !db._evalLoaded) {
      db._evalLoaded = true;
      db.evaluations.list().then(function () { WP.setState({}); });
    }
  }

  function render(root) {
    ensureLoaded();
    const t = WP.i18n.t, ar = WP.state.lang === 'ar';
    const viewer = WP.viewer();
    const cycle = WP.evaluation.activeCycle();
    const isReal = viewer && viewer.id !== '__admin__';
    const reports = isReal ? WP.access.directReports(viewer.id) : [];
    const scope = WP.access.visiblePeople(viewer).filter(function (p) { return p.id !== viewer.id; });

    const dStatus = function (id) { const e = WP.data.EVALUATIONS[id]; return e ? e.status : 'Not started'; };
    const pending = reports.filter(function (p) { return dStatus(p.id) !== 'Completed'; });

    // my self-assessment task
    const selfEv = isReal ? WP.evaluation.ensureSelf(viewer.id) : null;
    const selfPending = selfEv && selfEv.status !== 'Completed';

    // team progress across scope
    const counts = { Completed: 0, 'In progress': 0, 'Not started': 0 };
    scope.forEach(function (p) { counts[dStatus(p.id)] = (counts[dStatus(p.id)] || 0) + 1; });
    const total = scope.length || 1;
    const pct = function (n) { return Math.round((n / total) * 100); };

    // ---- my tasks card ----
    let tasks = '';
    if (!pending.length && !selfPending) {
      tasks = '<div style="text-align:center;padding:24px 0"><div style="color:var(--state-available)">' + WP.ui.icon('check',32) + '</div>' +
        '<div style="font-weight:600;margin-top:6px">' + t('allCaughtUp') + '</div>' +
        '<div class="sub">' + t('allCaughtUpNote') + '</div></div>';
    } else {
      tasks = (selfPending ? '<div class="task-row" data-self="1">' +
          '<span>' + WP.ui.icon('pencil',15) + ' ' + t('mySelfAssessment') + '</span>' + statusChip(selfEv.status) + '</div>' : '') +
        pending.map(function (p) {
          return '<div class="task-row" data-eval="' + p.id + '">' +
            '<span>' + ui.esc(WP.i18n.name(p)) + '</span>' + statusChip(dStatus(p.id)) + '</div>';
        }).join('');
    }

    // ---- employee status list (scope) ----
    const rows = scope.map(function (p) {
      return '<div class="ev-row" data-open="' + p.id + '">' + ui.avatar(p, 'var(--brand)') +
        '<div class="ev-meta"><div class="nm">' + ui.esc(WP.i18n.name(p)) + '</div>' +
          '<div class="ttl">' + ui.esc(WP.i18n.title(p)) + '</div></div>' +
        '<div class="ev-status">' + statusChip(dStatus(p.id)) + '</div></div>';
    }).join('');

    const cycleOptions = WP.evaluation.cycles().map(function (c) {
      return '<option value="' + c.id + '"' + (c.id === cycle.id ? ' selected' : '') + '>' + c.name + ' · ' + c.status + '</option>';
    }).join('');

    root.innerHTML =
      '<div class="ttl">' + t('performance') + ' › ' + t('evaluationsHub') + '</div>' +
      '<div class="eval-head" style="margin-top:4px">' +
        '<div><h2 style="margin:0 0 2px">' + ui.esc(cycle.name) + ' ' + t('evaluation') +
          ' <span class="rating ' + (cycle.status === 'Active' ? 'Exceeds' : 'Meets') + '">' + cycle.status + '</span></h2>' +
          '<div class="ttl">' + cycle.type + ' · ' + cycle.start + ' → ' + cycle.end + '</div></div>' +
        '<div style="display:flex;gap:8px;align-items:center">' +
          '<select id="cycle" class="btn">' + cycleOptions + '</select>' +
          (WP.access.canManage(viewer) ? '<button class="btn primary" id="new-cycle">' + WP.ui.icon('plus', 15) + ' ' + t('newCycle') + '</button>' : '') +
        '</div>' +
      '</div>' +

      syncBanner() +

      '<div class="grid-2" style="align-items:start">' +
        '<div class="section"><h3>' + t('myTasks') + '</h3>' + tasks + '</div>' +
        '<div class="section"><h3>' + t('teamProgress') + '</h3>' +
          '<div class="prog"><i class="pg-done" style="width:' + pct(counts.Completed) + '%"></i>' +
            '<i class="pg-prog" style="width:' + pct(counts['In progress']) + '%"></i></div>' +
          '<div class="prog-legend">' +
            '<span><span class="dot" style="background:var(--state-available)"></span> ' + pct(counts.Completed) + '% ' + t('done') + '</span>' +
            '<span><span class="dot" style="background:var(--brand)"></span> ' + pct(counts['In progress']) + '% ' + t('inProgressL') + '</span>' +
            '<span><span class="dot" style="background:var(--text-muted)"></span> ' + pct(counts['Not started']) + '% ' + t('notStartedL') + '</span></div></div>' +
      '</div>' +

      // Consistency / bias AWARENESS (P3) — only for an actual evaluator, about THEIR
      // OWN ratings. Neutral "worth a second look", never blocking, never a rank.
      ((isReal && reports.length) ? '<div class="section wbk-band" id="eval-consist-host" aria-live="polite" hidden></div>' : '') +

      '<div class="section"><h3>' + t('employees') + ' · ' + scope.length + '</h3>' + (rows || '<div class="sub">—</div>') + '</div>';

    // S3-1 + S4-1 — open THIS cycle's evaluation, and remember we came from the hub
    // so the evaluation's back button returns here ("Back to evaluations").
    // Fill the consistency-awareness panel asynchronously (reads completed reviews +
    // their evidence counts). Neutral cards; hidden entirely when there's nothing to
    // flag or not enough data — never an empty accusation, never a score of anyone.
    const consistHost = root.querySelector('#eval-consist-host');
    if (consistHost && WP.evalIntel && WP.evalIntel.consistencyCheck) {
      Promise.resolve(WP.evalIntel.consistencyCheck(viewer.id, cycle.id, { refDate: WP.state.refDate }))
        .then(function (c) {
          // Not enough data → stay hidden (no fabricated calibration claim).
          if (!c || !c.enoughData) { consistHost.hidden = true; return; }
          consistHost.hidden = false;
          // Zero warnings but the check DID run → a quiet "looks consistent" line so the
          // evaluator knows it ran and passed (#6) — never an accusation, never a score.
          if (!c.warnings || !c.warnings.length) {
            consistHost.innerHTML =
              '<div class="wbk-consist-ok"><span class="wbk-consist-ok-ic">' + WP.ui.icon('check', 14) + '</span> ' +
                ui.esc(t('ccOk')) + '</div>';
            return;
          }
          consistHost.innerHTML =
            '<h3>' + WP.ui.icon('bulb', 14) + ' ' + t('ccTitle') + '</h3>' +
            '<div class="disclaimer">' + t('ccIntro') + '</div>' +
            '<div class="wbk-consist">' + c.warnings.map(function (w) {
              return '<div class="wbk-consist-card">' +
                '<span class="wbk-consist-ic">' + WP.ui.icon('alert', 16) + '</span>' +
                '<div><div class="wbk-consist-t">' + ui.esc(w.text) + '</div>' +
                  '<div class="wbk-consist-x">' + ui.esc(w.explanation || '') + '</div>' +
                  '<div class="wbk-band-ev">' + WP.ui.icon('eye', 12) + ' ' +
                    ui.esc(WP.i18n.plural('ccCites', (w.evidence || []).length)) + '</div></div>' +
              '</div>';
            }).join('') + '</div>';
        })
        .catch(function () { consistHost.hidden = true; });
    }

    const openEval = function (id) {
      WP.setState({ route: 'evaluation', selectedId: id, selectedCycle: cycle.id, evalOrigin: 'evaluations' });
    };
    root.querySelectorAll('[data-eval]').forEach(function (el) {
      el.onclick = function () { openEval(el.dataset.eval); };
    });
    root.querySelectorAll('[data-open]').forEach(function (el) {
      el.onclick = function () { openEval(el.dataset.open); };
    });
    const selfTask = root.querySelector('[data-self]');
    if (selfTask) selfTask.onclick = function () { openEval(viewer.id); };
    root.querySelector('#cycle').onchange = function (e) { WP.evaluation.setActiveCycle(e.target.value); WP.setState({}); };
    const nc = root.querySelector('#new-cycle');
    if (nc) nc.onclick = function () {
      const name = prompt(t('newCyclePrompt'));
      if (!name) return;
      const id = 'c_' + Date.now();
      WP.evaluation.addCycle({ id: id, name: name, type: 'Quarterly', start: '—', end: '—', status: 'Active' });
      WP.logEvent({ type: 'cycle-created', by: WP.state.viewerId, target: name });
      WP.setState({});
    };
  }

  WP.ui.evaluations = { render: render };
})(window.WP = window.WP || {});

 * Webook Workload — "My Progress" (the employee's daily home)
 * ------------------------------------------------------------
 * The healthy-engagement dashboard: small wins, gentle streak,
 * endowed goal progress, recognition. No leaderboards, no shaming,
 * nothing tied to overwork. The thing that makes people WANT to
 * open it daily — for progress + recognition, not grinding.
 * ========================================================== */

      ? e.doneToday.map(function (d) { return '<div class="done-item"><span class="done-tick">' + WP.ui.icon('check',14) + '</span> ' + ui.esc(d) + '</div>'; }).join('')

      // milestone celebration (gentle, only when a milestone is reached)
      (justHit ? '<div class="banner-info">🎉 ' + t('milestoneHit').replace('{n}', e.streak) + '</div>' : '') +

      // habit meter — the journey to ~66 days (the science, not "21 days")
      '<div class="section"><h3>' + WP.ui.icon('sprout',15) + ' ' + t('habitForming') + '</h3>' +
        '<div class="track" style="height:12px"><i style="width:' + habitPct + '%"></i></div>' +
        '<div class="ttl" style="margin-top:6px">' + t('dayOf').replace('{d}', e.daysActive).replace('{n}', habitDays) +
          (nextMs ? ' · ' + t('toMilestone').replace('{x}', Math.max(0, nextMs - e.streak)).replace('{m}', nextMs) : ' · ' + t('habitFormed')) + '</div>' +
        '<div class="disclaimer">' + t('habitNote') + '</div></div>' +

      '<div class="me-grid">' +
        // streak (gentle)
        '<div class="me-tile"><div class="me-big">' + WP.ui.icon('flame',15) + ' ' + e.streak + '</div>' +
          '<div class="me-label">' + t('dayStreak') + '</div>' +
          '<div class="ttl" style="margin-top:4px">' + e.freeze + ' ' + t('freezeAvail') + '</div></div>' +
        // weekly goal (endowed progress — never starts at 0)
        '<div class="me-tile"><div class="me-label">' + t('weeklyGoal') + '</div>' +
          '<div class="me-big" style="font-size:24px">' + e.weekDone + ' / ' + e.weekGoal + '</div>' +
          '<div class="track" style="margin-top:8px"><i style="width:' + goalPct + '%"></i></div>' +
          '<div class="ttl" style="margin-top:6px">' + (goalPct >= 100 ? t('goalHit') : t('almostThere').replace('{p}', goalPct)) + '</div></div>' +
        // growth / level
        '<div class="me-tile"><div class="me-label">' + t('yourGrowth') + '</div>' +
          '<div class="me-big" style="font-size:20px">' + ui.esc(e.level) + ' · L' + e.levelNo + '</div>' +
          '<div class="track" style="margin-top:8px"><i style="width:' + e.levelPct + '%"></i></div>' +
          '<div class="ttl" style="margin-top:6px">' + t('toNextLevel').replace('{p}', e.levelPct) + '</div></div>' +
      '</div>' +

      // Done today — the hero (Progress Principle)
      '<div class="section"><h3>' + WP.ui.icon('check',15) + ' ' + t('doneToday') + '</h3>' + doneFeed +
        (e.doneYesterday.length ? '<div class="mini-label" style="margin-top:10px">' + t('yesterdayCatchup') + '</div>' +
          e.doneYesterday.map(function (d) { return '<div class="done-item"><span class="done-tick">' + WP.ui.icon('check',14) + '</span> ' + ui.esc(d) + '</div>'; }).join('') : '') +
        '<div class="seg" style="margin-top:12px">' +
          '<button data-day="today" class="' + (day === 'today' ? 'active' : '') + '">' + t('forToday') + '</button>' +
          '<button data-day="yesterday" class="' + (day === 'yesterday' ? 'active' : '') + '">' + t('forYesterday') + '</button></div>' +
        '<div style="display:flex;gap:8px;margin-top:8px">' +
          '<input id="win" class="req-i" style="flex:1" placeholder="' + t('addWinPh') + '" />' +
          '<button class="btn primary" id="add-win">' + WP.ui.icon('plus', 14) + ' ' + t('addWin') + '</button></div>' +
        '<div class="disclaimer">' + t('backfillNote') + '</div></div>' +

      // recognition
      '<div class="section"><h3>' + WP.ui.icon('star',16) + ' ' + t('kudosInbox') + '</h3>' + kudos + '</div>' +

      '<div class="disclaimer">' + t('meEthos') + '</div>';

    const add = root.querySelector('#add-win');
    const inp = root.querySelector('#win');
    function addWin() {
      const v = (inp.value || '').trim();
      if (!v) return;
      if (day === 'yesterday') {
        e.doneYesterday.unshift(v);
        WP.logEvent({ type: 'win-backfill', by: me.id, target: v + ' (yesterday · streak protected)' });
      } else {
        e.doneToday.unshift(v);
        e.weekDone = Math.min(e.weekGoal, e.weekDone + 1);
        WP.logEvent({ type: 'win-logged', by: me.id, target: v });
      }
      WP.setState({});
    }
    if (add) add.onclick = addWin;
    if (inp) inp.onkeydown = function (ev) { if (ev.key === 'Enter') addWin(); };
    root.querySelectorAll('[data-day]').forEach(function (b) {
      b.onclick = function () { WP._meDay = b.dataset.day; WP.setState({}); };
    });
    const cb = root.querySelector('#checkin-btn');
    if (cb) cb.onclick = function () { WP.ui.dailyPrompt.open(); };
  }

  WP.ui.me = { render: render };
})(window.WP = window.WP || {});

  <script>
/* ============================================================
 * Webook Workload — Daily check-in pop-up (on open)
 * ------------------------------------------------------------
 * When you open the app you get one tiny pop-up:
 *   • "Log what I did" — type freely, Save → goes to your progress
 *     and (in production) to Slack #daily-checkin, created if missing.
 *   • "Yesterday's summary" — just SHOWS what you did, info only, no
 *     task to fill — to minimise the work.
 * Effortless, dismissible, once per session. Free text → AI structures
 * it in production. No shaming, no required fields.
 * ========================================================== */
(function (WP) {
  'use strict';
  const ui = WP.ui;

  function open() {
    const me = WP.viewer();
    if (!me || me.id === '__admin__') return;
    const t = WP.i18n.t, host = document.getElementById('overlay-host');
    if (!host) return;
    const e = WP.engage.get(me.id);
    const mode = WP._promptMode || 'log';
    const day = (WP._meDay = WP._meDay || 'today');
    const yest = (e.doneYesterday && e.doneYesterday.length) ? e.doneYesterday
      : (me.dailyCheckin && me.dailyCheckin.done && me.dailyCheckin.done !== '—' ? [me.dailyCheckin.done] : []);

    const tabs = '<div class="seg" style="margin-bottom:12px">' +
      '<button data-mode="log" class="' + (mode === 'log' ? 'active' : '') + '">' + WP.ui.icon('pencil',15) + ' ' + t('checkinLog') + '</button>' +
      '<button data-mode="summary" class="' + (mode === 'summary' ? 'active' : '') + '">' + WP.ui.icon('eye',15) + ' ' + t('checkinSummary') + '</button></div>';

    let body;
    if (mode === 'summary') {
      body = '<div class="mini-label">' + t('yesterdaySummary') + '</div>' +
        (yest.length ? yest.map(function (d) { return '<div class="done-item"><span class="done-tick">' + WP.ui.icon('check',14) + '</span> ' + ui.esc(d) + '</div>'; }).join('')
                     : '<div class="sub">' + t('nothingYesterday') + '</div>');
    } else {
      body = '<div class="seg" style="margin-bottom:8px">' +
          '<button data-day="today" class="' + (day === 'today' ? 'active' : '') + '">' + t('forToday') + '</button>' +
          '<button data-day="yesterday" class="' + (day === 'yesterday' ? 'active' : '') + '">' + t('forYesterday') + '</button></div>' +
        '<textarea id="chk" class="eval-ta" rows="4" placeholder="' + t('checkinPh') + '"></textarea>';
    }

    host.innerHTML = '<div class="overlay"><div class="popover" style="width:420px;max-width:92vw">' +
      '<button class="popover-close" id="chk-x" aria-label="Close">' + WP.ui.icon('x', 14) + '</button>' +
      '<h3 style="margin:0 0 2px">' + t('hi') + ', ' + ui.esc(WP.i18n.name(me).split(' ')[0]) + ' 👋</h3>' +
      '<div class="sub" style="margin-bottom:12px">' + t('checkinTitle') + '</div>' +
      tabs + body +
      '<div class="disclaimer">' + t('checkinSlackNote') + '</div>' +
      '<div style="display:flex;gap:8px;margin-top:12px">' +
        (mode === 'log' ? '<button class="btn primary" id="chk-save" style="flex:1">' + t('save') + '</button>' : '') +
        '<button class="btn" id="chk-skip" style="flex:' + (mode === 'log' ? '0 0 auto' : '1') + '">' + t('skip') + '</button>' +
      '</div></div></div>';

    function close() { host.innerHTML = ''; }
    host.querySelector('.overlay').onclick = function (ev) { if (ev.target.classList.contains('overlay')) close(); };
    host.querySelector('#chk-x').onclick = close;
    host.querySelector('#chk-skip').onclick = close;
    host.querySelectorAll('[data-mode]').forEach(function (b) {
      b.onclick = function () { WP._promptMode = b.dataset.mode; open(); };
    });
    host.querySelectorAll('[data-day]').forEach(function (b) {
      b.onclick = function () { WP._meDay = b.dataset.day; open(); };
    });
    const save = host.querySelector('#chk-save');
    if (save) save.onclick = function () {
      const txt = (host.querySelector('#chk').value || '').trim();
      if (!txt) { close(); return; }
      const items = txt.split('\n').map(function (s) { return s.trim(); }).filter(Boolean);
      const target = day === 'yesterday' ? (e.doneYesterday = e.doneYesterday || []) : e.doneToday;
      items.forEach(function (it) { target.unshift(it); });
      if (day === 'today') e.weekDone = Math.min(e.weekGoal, e.weekDone + items.length);
      WP.logEvent({ type: 'checkin-saved', by: me.id, target: items.length + ' item(s) → Slack #daily-checkin (' + day + ')' });
      close();
      WP.setState({ route: 'me', selectedId: null }); // show them their progress update
    };
  }

  WP.ui.dailyPrompt = { open: open };
})(window.WP = window.WP || {});

</script>
  <script>
/* ============================================================
 * Tempo — Weekly Intelligence Report (Intelligence Layer P5 · VIEW)
 * SPEC: docs/SPEC-decision-memory.md · GATE: ai-os/00-governance/INTELLIGENCE-ETHICS.md
 * ------------------------------------------------------------
 * Surfaces WP.decisionMemory.weeklyReport() — the SHAPE of leadership decisions
 * (counts by type, top focus areas, recurring themes, AI-acceptance, week-over-week
 * shifts), each with cited evidence. Director/admin only (canManage). De-identified
 * by construction: the engine strips people; this view NEVER re-introduces a name,
 * per-person row, score, or rank. Built on V3 .wbk-* tokens; both themes; LTR+RTL.
 * ========================================================== */
(function (WP) {
  'use strict';
  var ui = WP.ui;

  function focusLabel(focus, t) {
    var k = 'wrFocus_' + focus.replace(/-/g, '_');
    var v = t(k);
    return v === k ? focus.replace(/-/g, ' ') : v;
  }
  function typeLabel(type, t) {
    var k = 'wrType_' + type.replace(/-/g, '_');
    var v = t(k);
    return v === k ? type.replace(/-/g, ' ') : v;
  }
  function cites(n, t) { return '<span class="wr-cite">' + WP.ui.icon('eye', 12) + ' ' + WP.i18n.plural('wrCites', n) + '</span>'; }

  // ISO date shifted by n days — for the window stepper (no Date.now: we parse refDate).
  function shiftDays(iso, n) {
    var d = new Date((iso || '') + 'T00:00:00');
    if (isNaN(d)) return iso;
    d.setDate(d.getDate() + n);
    return d.toISOString().slice(0, 10);
  }

  function render(root) {
    var t = WP.i18n.t;
    var viewer = WP.viewer();

    // ACCESS GATE (Ethics #6): director/admin only. Anyone else gets a calm denial,
    // never the data. The nav entry is already hidden for them — this is defence in depth.
    if (!viewer || !WP.access.canManage(viewer)) {
      root.innerHTML = '<div class="section"><div class="sub">' + WP.ui.icon('lock', 14) + ' ' + t('wrDenied') + '</div></div>';
      return;
    }

    // WINDOW (#3): a stepper (‹ older · newer ›) + a 7/30-day toggle. The engine already
    // takes {days, ref}; we shift ref back by `back` whole windows. back=0 = most recent.
    var win = WP.state.weeklyWin || { days: 7, back: 0 };
    var ref = shiftDays(WP.state.refDate, -win.back * win.days);
    var rep = WP.decisionMemory.weeklyReport({ days: win.days, ref: ref }, { viewer: viewer });

    var rangeOpts = [7, 30].map(function (d) {
      return '<button type="button" class="wr-range' + (win.days === d ? ' is-on' : '') +
        '" data-days="' + d + '" aria-pressed="' + (win.days === d) + '">' + t('wrRange' + d) + '</button>';
    }).join('');
    var stepper =
      '<div class="wr-win">' +
        '<button type="button" class="btn icon-btn" id="wr-older" aria-label="' + t('wrOlder') + '">' + WP.ui.icon('arrowLeft', 14) + '</button>' +
        '<span class="wr-win-lbl">' + (rep.period ? rep.period.start + ' → ' + rep.period.end : '') + '</span>' +
        '<button type="button" class="btn icon-btn" id="wr-newer" aria-label="' + t('wrNewer') + '"' + (win.back <= 0 ? ' disabled' : '') + '>' + WP.ui.icon('arrowRight', 14) + '</button>' +
        '<span class="wr-range-group" role="group" aria-label="' + t('wrRangeLbl') + '">' + rangeOpts + '</span>' +
      '</div>';

    var head =
      '<div class="wbk-pageheader"><div class="wbk-ph-main">' +
        '<h2 class="wbk-ph-title">' + t('wrTitle') + '</h2>' +
        '<div class="wbk-ph-sub">' + t('wrSub') +
          (win.back > 0 ? ' · ' + t('wrPast') : '') + '</div>' +
      '</div>' + stepper + '</div>' +
      '<div class="disclaimer">' + WP.ui.icon('bulb', 13) + ' ' + t('wrIntro') + '</div>';

    // EMPTY — "Not enough data" is first-class (sparse window or denied-but-gated).
    if (!rep.enoughData) {
      root.innerHTML = head +
        '<div class="section"><div class="wr-empty">' +
          '<strong>' + WP.ui.icon('clock', 14) + ' ' + t('wrEmpty') + '</strong>' +
          '<div class="wr-empty-note">' + t('wrEmptyNote') + '</div></div></div>';
      wireControls(root); // still let a director step to a populated window
      return;
    }

    // 1) Decision counts by TYPE (each cites its events) — no person anywhere.
    var counts = Object.keys(rep.decisionCounts).sort(function (a, b) {
      return rep.decisionCounts[b].count - rep.decisionCounts[a].count;
    });
    var countsHTML = counts.length ? '<div class="wbk-table-wrap"><table class="wbk-table">' +
      '<thead><tr><th>' + t('wrColType') + '</th><th class="wbk-th-num">' + t('wrColCount') + '</th><th>' + t('wrColEvidence') + '</th></tr></thead>' +
      '<tbody>' + counts.map(function (type) {
        var d = rep.decisionCounts[type];
        return '<tr><td>' + ui.esc(typeLabel(type, t)) + '</td>' +
          '<td class="wbk-td-num">' + d.count + '</td>' +
          '<td>' + cites(d.evidence.length, t) + '</td></tr>';
      }).join('') + '</tbody></table></div>' : '<div class="sub">—</div>';

    // 2) Top focus areas (busiest first) — as labelled bars.
    var maxFocus = rep.topFocusAreas.reduce(function (m, f) { return Math.max(m, f.count); }, 1);
    var focusHTML = rep.topFocusAreas.map(function (f) {
      return '<div class="lr"><div class="nm"><div>' + ui.esc(focusLabel(f.focus, t)) + '</div>' +
          '<div class="ttl">' + cites(f.evidence.length, t) + '</div></div>' +
        '<div class="prog" style="flex:1;margin:0 12px"><i class="pg-prog" style="width:' + Math.round((f.count / maxFocus) * 100) + '%"></i></div>' +
        '<b style="font-variant-numeric:tabular-nums">' + f.count + '</b></div>';
    }).join('');

    // 3) Recurring themes (operational areas, never people).
    var themesHTML = rep.recurringThemes.length ? rep.recurringThemes.map(function (th) {
      return '<div class="wbk-li"><div><div class="wbk-li-t">' + ui.esc(focusLabel(th.theme, t)) + '</div>' +
        '<div class="wbk-li-m">' + ui.esc(th.text) + '</div></div>' + cites(th.evidence.length, t) + '</div>';
    }).join('') : '<div class="sub">' + t('wrNoThemes') + '</div>';

    // 4) AI-acceptance rate — a SLIM horizontal bar (#8: no full-width dead space),
    // grouped at the top of the counts column. "—" when null (honest, not 0%).
    var ai = rep.aiAcceptanceRate;
    var aiHTML = '<div class="wr-aibar">' +
        '<div class="wr-aibar-v">' + (ai ? Math.round(ai.rate * 100) + '%' : '—') + '</div>' +
        '<div class="wr-aibar-main"><div class="wr-aibar-l">' + t('wrAiRate') + '</div>' +
          '<div class="ttl">' + (ai ? t('wrAiOf').replace('{a}', ai.accepted).replace('{n}', ai.of) : t('wrAiNone')) + '</div></div>' +
        (ai ? cites(ai.evidence.length, t) : '') +
      '</div>';

    // 5) Week-over-week shifts (per type) — each cites the period's events.
    var shiftsHTML = rep.shifts.length ? rep.shifts.map(function (s) {
      var up = s.delta > 0;
      return '<div class="wbk-li"><span class="wbk-alert-ic" style="color:' + (up ? 'var(--state-positive)' : 'var(--state-watch)') + '">' +
          WP.ui.icon(up ? 'arrowUp' : 'arrowRight', 16) + '</span>' +
        '<div><div class="wbk-li-t">' + ui.esc(typeLabel(s.type, t)) + '</div>' +
          '<div class="wbk-li-m">' + ui.esc(s.text) + '</div></div>' + cites(s.evidence.length, t) + '</div>';
    }).join('') : '<div class="sub">' + t('wrNoShifts') + '</div>';

    root.innerHTML = head +
      '<div class="grid-2" style="align-items:start">' +
        '<div class="section"><h3>' + t('wrCounts') + '</h3>' + aiHTML + countsHTML + '</div>' +
        '<div class="section"><h3>' + t('wrFocusAreas') + '</h3>' + (focusHTML || '<div class="sub">—</div>') + '</div>' +
      '</div>' +
      '<div class="grid-2" style="align-items:start">' +
        '<div class="section"><h3>' + t('wrThemes') + '</h3>' + themesHTML + '</div>' +
        '<div class="section"><h3>' + t('wrShifts') + '</h3>' + shiftsHTML + '</div>' +
      '</div>' +
      '<div class="disclaimer">' + t('wrHuman') + '</div>';
    wireControls(root);
  }

  // Wire the window stepper + range toggle. Window lives in WP.state.weeklyWin so a
  // re-render keeps the chosen period; changing the range resets to the most recent.
  function wireControls(root) {
    var win = WP.state.weeklyWin || { days: 7, back: 0 };
    var older = root.querySelector('#wr-older'), newer = root.querySelector('#wr-newer');
    if (older) older.onclick = function () { WP.setState({ weeklyWin: { days: win.days, back: win.back + 1 } }); };
    if (newer) newer.onclick = function () { if (win.back > 0) WP.setState({ weeklyWin: { days: win.days, back: win.back - 1 } }); };
    root.querySelectorAll('.wr-range[data-days]').forEach(function (b) {
      b.onclick = function () { WP.setState({ weeklyWin: { days: parseInt(b.dataset.days, 10), back: 0 } }); };
    });
  }

  WP.ui.weeklyReport = { render: render };
})(window.WP = window.WP || {});

/* ============================================================
 * WBK Component Library — every component from the WBK DS, live.
 * Buttons, chips, segmented control, stepper, slider, toggle/checkbox/radio,
 * badges, progress (bar + circle), avatar, tabs, toast, system banner, tooltip,

  'use strict';
  const ui = WP.ui;
  const ic = function (n, s) { return WP.ui.icon(n, s || 16); };

      '<div class="wbk-sec-h"><h3>' + ui.esc(title) + '</h3>' +
        (note ? '<span class="wbk-sec-note">' + ui.esc(note) + '</span>' : '') + '</div>' +
      '<div class="wbk-sec-body">' + body + '</div></section>';

  function MONTH() {
    const d = new Date(WP.state.refDate + 'T00:00:00');
    const y = d.getFullYear(), m = d.getMonth();
    const first = new Date(y, m, 1).getDay();
    const days = new Date(y, m + 1, 0).getDate();
    const today = new Date(); const isThisMonth = today.getFullYear() === y && today.getMonth() === m;
    let cells = '';
    for (let i = 0; i < first; i++) cells += '<span class="wbk-cal-d is-empty"></span>';
    for (let day = 1; day <= days; day++) {
      const t = isThisMonth && today.getDate() === day ? ' is-today' : '';
      cells += '<button class="wbk-cal-d' + t + '" data-day="' + day + '">' + day + '</button>';
    }
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    return '<div class="wbk-cal"><div class="wbk-cal-m">' + months[m] + ' ' + y + '</div>' +
      '<div class="wbk-cal-w"><span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span></div>' +
      '<div class="wbk-cal-g">' + cells + '</div></div>';

  function avatarsOf(ids) {

  function render(root) {
    const t = WP.i18n.t;
    const people = WP.data.PEOPLE.filter(function (p) { return p.photo; }).slice(0, 4).map(function (p) { return p.id; });

    const intents = [['cta', t('btnCta')], ['primary', t('btnPrimary')], ['secondary', t('btnSecondary')], ['tertiary', t('btnTertiary')]];
    const btnRow = function (mod, withState) {
      return '<div class="wbk-row" style="align-items:center;margin-bottom:8px">' +
        intents.map(function (it) {
          return '<button class="wbk-btn wbk-btn--' + it[0] + (mod ? ' wbk-btn--' + mod : '') + '">' + ic('plus', 16) + it[1] + '</button>';
        }).join('') +
        (withState ?
          '<button class="wbk-btn wbk-btn--cta" disabled>' + t('btnDisabled') + '</button>' +
          '<button class="wbk-btn wbk-btn--primary is-animating">' + t('btnAnimating') + '<span class="wbk-btn-spin"></span></button>'
        : '') +
      '</div>';

    const buttons = sec('Button',
      btnRow('xl', false) + btnRow('lg', false) + btnRow('md', false) + btnRow('sm', false) +
      btnRow('lg', true),
      'CTA / Primary / Secondary / Tertiary · xL / L / M / S · normal / hover / active / animating / disabled');

    const btngroup = sec('Button group',
      '<div class="wbk-btngroup">' +
        '<button class="wbk-btn wbk-btn--secondary wbk-btn--md">' + ic('grid', 16) + t('bgDay') + '</button>' +
        '<button class="wbk-btn wbk-btn--secondary wbk-btn--md">' + t('bgWeek') + '</button>' +

      '<div class="wbk-modal" id="wbk-modal" hidden><div class="wbk-modal-bd"></div>' +
        '<div class="wbk-modal-card" role="dialog" aria-modal="true" aria-label="Dialog">' +
          '<div class="wbk-modal-media">' + ic('users', 28) + '</div>' +
          '<h4>Heading</h4><p>This is a WBK dialog. Confirm to continue or cancel to dismiss.</p>' +
          '<div class="wbk-row" style="justify-content:flex-end;margin-top:14px">' +
            '<button class="btn" id="wbk-dialog-cancel">Cancel</button>' +
            '<button class="btn primary" id="wbk-dialog-ok">Confirm</button></div>' +
        '</div></div>';

    wire(root);
  }

  function wire(root) {
    // chips: single-select
    const chips = root.querySelector('#wbk-chips');
    if (chips) chips.querySelectorAll('.wbk-chip').forEach(function (c) {
      c.onclick = function () {
        chips.querySelectorAll('.wbk-chip').forEach(function (x) { x.classList.remove('is-selected'); x.removeAttribute('aria-selected'); });
        c.classList.add('is-selected'); c.setAttribute('aria-selected', 'true');
      };
    });
    // segmented + tabs: single active
    [['#wbk-seg', 'button'], ['#wbk-tabs', 'button']].forEach(function (pair) {
      const el = root.querySelector(pair[0]); if (!el) return;
      el.querySelectorAll(pair[1]).forEach(function (b) {
        b.onclick = function () { el.querySelectorAll(pair[1]).forEach(function (x) { x.classList.remove('active'); }); b.classList.add('active'); };
      });
    });
    // stepper
    const st = root.querySelector('#wbk-stepper');
    if (st) { const v = st.querySelector('.wbk-stepper-v');
      st.querySelectorAll('[data-step]').forEach(function (b) {
        b.onclick = function () { v.textContent = Math.max(0, (parseInt(v.textContent, 10) || 0) + parseInt(b.dataset.step, 10)); };
      });
    }
    // date picker: select a day
    const cal = root.querySelector('.wbk-cal');
    if (cal) cal.querySelectorAll('.wbk-cal-d:not(.is-empty)').forEach(function (d) {
      d.onclick = function () { cal.querySelectorAll('.wbk-cal-d').forEach(function (x) { x.classList.remove('is-sel'); }); d.classList.add('is-sel'); };
    });
    // PIN inputs: digits only, auto-advance forward, backspace steps back
    root.querySelectorAll('.wbk-pin').forEach(function (grp) {
      const boxes = Array.prototype.slice.call(grp.querySelectorAll('input'));
      boxes.forEach(function (box, i) {
        box.oninput = function () {
          box.value = box.value.replace(/[^0-9]/g, '').slice(0, 1);
          if (box.value && boxes[i + 1]) boxes[i + 1].focus();
        };
        box.onkeydown = function (e) {
          if (e.key === 'Backspace' && !box.value && boxes[i - 1]) boxes[i - 1].focus();
        };
      });
    });
    // tiles: single-select (radio-like)
    const tiles = root.querySelector('#wbk-tiles');
    if (tiles) tiles.querySelectorAll('.wbk-tile').forEach(function (b) {
      b.onclick = function () {
        tiles.querySelectorAll('.wbk-tile').forEach(function (x) { x.classList.remove('is-selected'); x.setAttribute('aria-pressed', 'false'); });
        b.classList.add('is-selected'); b.setAttribute('aria-pressed', 'true');
      };
    });
    // ticket selector: quantity stepper, clamped at 0, disables minus at 0
    const tk = root.querySelector('#wbk-tickets');
    if (tk) tk.querySelectorAll('.wbk-ticket').forEach(function (row) {
      const v = row.querySelector('.wbk-qty-v'); const minus = row.querySelector('[data-q="-1"]');
      row.querySelectorAll('[data-q]').forEach(function (btn) {
        btn.onclick = function () {
          const next = Math.max(0, (parseInt(v.textContent, 10) || 0) + parseInt(btn.dataset.q, 10));
          v.textContent = next; if (minus) minus.disabled = next <= 0;
        };
      });
    });
    // toast / banner dismiss
    root.querySelectorAll('.wbk-x').forEach(function (x) { x.onclick = function () { x.closest('.wbk-toast').style.display = 'none'; }; });
    // dialog
    const modal = root.querySelector('#wbk-modal');
    const open = root.querySelector('#wbk-dialog-open');
    const close = function () { if (modal) modal.hidden = true; };
    if (open) open.onclick = function () { modal.hidden = false; };
    ['#wbk-dialog-cancel', '#wbk-dialog-ok'].forEach(function (s) { const b = root.querySelector(s); if (b) b.onclick = close; });
    if (modal) modal.querySelector('.wbk-modal-bd').onclick = close;
    // countdown — ticking to a fixed target
    if (WP._wbkCd) { clearInterval(WP._wbkCd); WP._wbkCd = null; }
    const cd = root.querySelector('#wbk-cd');
    if (cd) {
      const target = Date.now() + (23 * 864e5 + 11 * 36e5 + 15 * 6e4 + 8000);
      const pad = function (n) { return String(n).padStart(2, '0'); };
      const tick = function () {
        // stop ticking once the user leaves Components (or the node is gone)
        if ((WP.state && WP.state.route !== 'library') || !document.body.contains(cd)) {
          clearInterval(WP._wbkCd); WP._wbkCd = null; return;
        }
        let s = Math.max(0, Math.floor((target - Date.now()) / 1000));
        const d = Math.floor(s / 86400); s -= d * 86400;
        const h = Math.floor(s / 3600); s -= h * 3600;
        const m = Math.floor(s / 60); s -= m * 60;
        const set = function (k, val) { const el = cd.querySelector('[data-cd="' + k + '"]'); if (el) el.textContent = pad(val); };
        set('DAYS', d); set('HRS', h); set('MINS', m); set('SECS', s);
      };
      tick(); WP._wbkCd = setInterval(tick, 1000);
    }
  }

  WP.ui = WP.ui || {};
  WP.ui.wbkLibrary = { render: render };
})(window.WP = window.WP || {});

    // reflect remembered open/closed state

    // navigate (on mobile the drawer closes after picking)
    function go(id) {

      WP.setState({ route: id, selectedId: null });
    }
    bar.querySelectorAll('[data-go]').forEach(function (b) { b.onclick = function () { go(b.dataset.go); }; });

      navClosed = !navClosed; persistNav(); applyNav();

  WP.render = function () {
    WP.applyDocAttrs();
    const bar = document.getElementById('topbar');
    const appbar = document.getElementById('appbar');
    const backdrop = document.getElementById('nav-backdrop');
    const root = document.getElementById('view');

    // Not signed in → show the company-email sign-in, hide the app chrome.
    if (!WP.state.authed) {
      document.body.classList.remove('nav-open', 'nav-closed');
      bar.innerHTML = ''; bar.style.display = 'none';
      if (appbar) { appbar.innerHTML = ''; appbar.style.display = 'none'; }
      if (backdrop) backdrop.style.display = 'none';
      const ebx = document.getElementById('eval-banner'); if (ebx) { ebx.innerHTML = ''; ebx.hidden = true; }
      document.getElementById('overlay-host').innerHTML = '';
      renderSignatureBar();   // hidden on the sign-in screen
      WP.ui.login.render(root);
      return;
    }
    bar.style.display = '';
    if (appbar) appbar.style.display = '';
    if (backdrop) backdrop.style.display = '';
    topbar();
    if (WP.state.route === 'dashboard') WP.ui.dashboard.render(root);
    else if (WP.state.route === 'profile') WP.ui.profile.render(root);
    else if (WP.state.route === 'settings') WP.ui.settings.render(root);
    else if (WP.state.route === 'daily') WP.ui.dailyTasks.render(root);
    else if (WP.state.route === 'permissions') WP.ui.permissions.render(root);
    else if (WP.state.route === 'evaluation') WP.ui.evaluation.render(root);
    else if (WP.state.route === 'upward') WP.ui.upward.render(root);
    else if (WP.state.route === 'evaluations') WP.ui.evaluations.render(root);
    else if (WP.state.route === 'wellbeing') WP.ui.wellbeing.render(root);
    else if (WP.state.route === 'fairness') WP.ui.fairness.render(root);
    else if (WP.state.route === 'me') WP.ui.me.render(root);
    else if (WP.state.route === 'weekly') WP.ui.weeklyReport.render(root);
    else if (WP.state.route === 'library') WP.ui.wbkLibrary.render(root);
    else WP.ui.workloadMap.render(root);

    // mandatory evaluation banner — follows a manager across every page until done
    renderEvalBanner();

    // Signature / credits bar — decorative footer, authed app only
    renderSignatureBar();

    // Gentle daily check-in — at most ONCE PER DAY (not every load/session), and
    // only after the dashboard has painted, so it never interrupts orientation
    // (S3 — progressive disclosure / calm UI). Skip stays effortless.
    if (!WP._promptShown) {
      WP._promptShown = true;
      const today = new Date().toISOString().slice(0, 10);
      let last = null;
      try { last = localStorage.getItem('tempo_checkin_prompt'); } catch (e) {}
      const viewer = WP.viewer();
      if (last !== today && viewer && viewer.id !== '__admin__' && WP.state.route === 'dashboard') {
        try { localStorage.setItem('tempo_checkin_prompt', today); } catch (e) {}
        setTimeout(function () { if (WP.ui.dailyPrompt) WP.ui.dailyPrompt.open(); }, 700);
      }
    }
  };

  // Signature / credits bar — a thin decorative footer across the bottom of the authed
  // app (department + the two credit signatures). Credit-only: no data, no logic. Hidden
  // on the sign-in screen. Names are proper nouns, kept verbatim in both languages.
  function renderSignatureBar() {
    const host = document.getElementById('sig-bar');
    if (!host) return;
    if (!WP.state.authed) { host.innerHTML = ''; return; }
    const t = WP.i18n.t;
    host.innerHTML =
      '<div class="sig-bar">' +
        '<div class="sig-dept">' + t('sigDept') + '</div>' +
        '<div class="sig-sep"></div>' +
        '<div class="sig-credit">' +
          '<div class="sig-role">' + t('sigManaged') + '</div>' +
          '<div class="sig-name sig-name--accent">M. Akram</div>' +
        '</div>' +
        '<div class="sig-sep"></div>' +
        '<div class="sig-credit">' +
          '<div class="sig-role">' + t('sigDirected') + '</div>' +
          '<div class="sig-name">Ahmed Othman</div>' +
        '</div>' +
      '</div>';
  }

  // Mandatory evaluation banner — a manager with outstanding reviews for the ACTIVE cycle
  // sees a persistent, non-dismissible bar on every page (red once overdue) that links
  // straight to their pending reviews. Lives in its own host above #view, so navigating
  // and the workload auto-refresh never wipe it.
  function renderEvalBanner() {
    // Host lives INSIDE the content column (above #view), never as a child of the row-flex
    // shell — otherwise it stretches to full height. Created in index.html; create as a
    // fallback inside .view-main if missing.
    let host = document.getElementById('eval-banner');
    if (!host) {
      host = document.createElement('div'); host.id = 'eval-banner';
      const main = document.querySelector('.view-main'); const root = document.getElementById('view');
      if (main && root) main.insertBefore(host, root);
    }
    const t = WP.i18n.t, viewer = WP.viewer();
    const cyc = WP.evaluation && WP.evaluation.activeCycle && WP.evaluation.activeCycle();
    const req = (viewer && WP.evaluation && WP.evaluation.requiredFor) ? WP.evaluation.requiredFor(viewer.id) : null;
    if (!viewer || viewer.id === '__admin__' || !cyc || cyc.status !== 'Active' || !req || req.total === 0 || req.pending === 0) {
      host.innerHTML = ''; host.hidden = true; return;
    }
    const di = WP.evaluation.dueInfo && WP.evaluation.dueInfo();
    const overdue = !!(di && di.overdue);
    let when = '';
    if (di) when = overdue ? t('overdueBy').replace('{d}', Math.abs(di.daysLeft))
      : di.daysLeft === 0 ? t('dueToday') : t('dueInDays').replace('{d}', di.daysLeft);
    host.hidden = false;
    host.className = 'eval-banner' + (overdue ? ' is-overdue' : '');
    host.innerHTML =
      '<div class="eb-in">' + WP.ui.icon(overdue ? 'flame' : 'chart', 16) +
        '<span class="eb-msg"><b>' + WP.ui.esc(cyc.name) + ' ' + t('reviewsDue') + '</b> · ' +
          req.done + '/' + req.total + ' ' + t('done') + (when ? ' · ' + when : '') + '</span>' +
        '<button class="btn primary eb-cta" id="eb-go">' + t('reviewNow') + '</button>' +
      '</div>';
    const go = document.getElementById('eb-go');
    if (go) go.onclick = function () { WP.setState({ route: 'evaluations', selectedId: null }); };
  }

  // Esc closes any open overlay (peek popover / assignment drawer) — user control & freedom.
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') {
      const host = document.getElementById('overlay-host');
      if (host && host.innerHTML) host.innerHTML = '';
    }
  });

  document.addEventListener('DOMContentLoaded', function () {
    if (WP.persist) WP.persist.hydrate();   // restore the user's saved work before first paint
    // Verified sign-in: consume a magic-link token from the URL and restore any
    // persisted Supabase session, so returning from the email link signs the user in.
    if (WP.auth && WP.auth.initSession) WP.auth.initSession();
    WP.render();   // first paint uses the bundled mock directory (graceful fallback — never blank)
    // F1: load the org directory server-side under RLS, then re-render so server
    // rows win when present. On signed-out/offline/error this is a no-op and the
    // mock stays (WP.db.people.list never throws), so the app is never blank.
    if (WP.db && WP.db.people && WP.db.people.list) {
      WP.db.people.list().then(function () { WP.render(); }).catch(function () {});
    }
    // F1 Phase 2: load the SENSITIVE growth records server-side under the stricter
    // can_see_sensitive predicate (self / direct-manager-only / director). Same
    // never-blank contract: mock already painted; this re-renders only on success
    // and never throws. Real growth values live only in public.growth, never the bundle.
    if (WP.db && WP.db.growth && WP.db.growth.list) {
      WP.db.growth.list().then(function () { WP.render(); }).catch(function () {});
    }
  });
  // safety net — also flush on unload in case a mutation didn't go through setState
  window.addEventListener('beforeunload', function () { if (WP.persist) WP.persist.saveData(); });
})(window.WP = window.WP || {});

</script>
</body>
</html>
