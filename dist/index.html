.g-mark { flex: none; }
.g-choose { text-align: start; }
.g-choose-h { font-size: 16px; font-weight: 600; margin: 4px 0 12px; }
.g-choose-sub { font-size: 12px; color: var(--text-muted); font-weight: 400; margin-top: 2px; }
.g-accts { display: grid; gap: 4px; max-height: 280px; overflow-y: auto; }
.g-acct {
  display: flex; align-items: center; gap: 12px; width: 100%; cursor: pointer;
  border: 0; background: transparent; color: var(--text); text-align: start;

}

.g-noaccess { margin-inline-start: auto; font-size: 10px; font-weight: 600; color: var(--state-overloaded);
  background: var(--state-overloaded-bg, rgba(248,40,90,.16)); border-radius: 999px; padding: 2px 8px; white-space: nowrap; }
.g-denied { text-align: center; padding: 8px 4px 4px; }
.g-denied-ic { width: 44px; height: 44px; border-radius: 50%; margin: 0 auto 10px; display: grid; place-items: center;
  color: var(--state-overloaded); background: var(--state-overloaded-bg, rgba(248,40,90,.16)); }
.g-denied-h { font-weight: 600; font-size: 16px; }
.g-denied-sub { font-size: 13px; color: var(--text-muted); margin: 4px 0 14px; }
.login-note .icn { vertical-align: -2px; }
.g-meta { min-width: 0; display: flex; flex-direction: column; line-height: 1.3; }
.g-nm { font-size: 14px; font-weight: 500; }
.g-ml { font-size: 12.5px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.g-back { margin-top: 10px; border: 0; background: transparent; color: var(--brand); cursor: pointer; font-size: 13px; padding: 6px; }

/* ============================================================
 * WBK Component Library page (route: library)
 * ========================================================== */
.wbk-lib-h { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
.wbk-lib-h h2 { font-family: var(--font-display); font-stretch: 125%; font-size: 26px; margin: 0 0 4px; }
.wbk-lib-h p { color: var(--text-muted); font-size: 14px; margin: 0; }
.wbk-lib-logo { height: 22px; opacity: .9; }
.wbk-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.wbk-sec { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.wbk-sec-h { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-bottom: 14px; }
.wbk-sec-h h3 { font-size: 14px; font-weight: 600; margin: 0; }
.wbk-sec-note { font-size: 11px; color: var(--text-muted); }
.wbk-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }

/* Apple Pay button */
/* EXTERNAL-BRAND — Apple Pay button. Black background is mandated by Apple's
   Apple Pay button guidelines; intentionally NOT a design token. Allowlisted. */
.wbk-applepay { background: #000; color: var(--fixed-white); border: 0; border-radius: var(--radius-sm); height: 38px; padding: 0 16px;
  font-family: var(--font-sans); font-weight: 600; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.wbk-applepay::after { content: " Pay"; font-weight: 600; }
.wbk-applepay::before { content: ""; }
.wbk-applepay--book::after { content: " Pay"; }

/* Stepper */
.wbk-stepper { display: inline-flex; align-items: center; gap: 4px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px; padding: 4px; }
.wbk-stepper button { width: 30px; height: 30px; border-radius: 999px; border: 0; background: var(--surface); color: var(--text); cursor: pointer; display: inline-grid; place-items: center; }
.wbk-stepper button:hover { background: var(--brand); color: var(--brand-contrast); }
.wbk-stepper-v { min-width: 28px; text-align: center; font-variant-numeric: tabular-nums; font-weight: 600; }

/* Slider */
.wbk-slider { -webkit-appearance: none; appearance: none; width: 100%; height: 6px; border-radius: 999px; background: var(--surface-2); outline: none; }
.wbk-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--brand); cursor: pointer; border: 2px solid var(--surface); box-shadow: var(--shadow); }
.wbk-slider::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--brand); cursor: pointer; border: 2px solid var(--surface); }

/* Checkbox / Radio / Toggle */
.wbk-choice { gap: 16px; }
.wbk-check, .wbk-radio, .wbk-toggle { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; }
.wbk-check input, .wbk-radio input, .wbk-toggle input { position: absolute; opacity: 0; pointer-events: none; }
.wbk-check span { width: 18px; height: 18px; border: 1.5px solid var(--text-muted); border-radius: 5px; display: inline-grid; place-items: center; }
.wbk-check input:checked + span { background: var(--brand); border-color: var(--brand); }
.wbk-check input:checked + span::after { content: ""; width: 5px; height: 9px; border: 2px solid var(--fixed-white); border-top: 0; border-inline-start: 0; transform: rotate(45deg); margin-bottom: 2px; }
.wbk-radio span { width: 18px; height: 18px; border: 1.5px solid var(--text-muted); border-radius: 50%; display: inline-grid; place-items: center; }
.wbk-radio input:checked + span { border-color: var(--brand); }
.wbk-radio input:checked + span::after { content: ""; width: 9px; height: 9px; border-radius: 50%; background: var(--brand); }
.wbk-toggle span { width: 38px; height: 22px; border-radius: 999px; background: var(--surface-2); border: 1px solid var(--border); position: relative; transition: background .15s; }
.wbk-toggle span::after { content: ""; position: absolute; top: 2px; inset-inline-start: 2px; width: 16px; height: 16px; border-radius: 50%; background: var(--fixed-white); transition: transform .18s cubic-bezier(.22,.61,.36,1); }
.wbk-toggle input:checked + span { background: var(--brand); border-color: transparent; }
.wbk-toggle input:checked + span::after { transform: translateX(16px); }
[dir="rtl"] .wbk-toggle input:checked + span::after { transform: translateX(-16px); }

/* Badges */
.wbk-badge-host { position: relative; display: inline-grid; place-items: center; color: var(--text-muted); }
.wbk-badge { position: absolute; top: -6px; inset-inline-end: -8px; min-width: 16px; height: 16px; padding: 0 4px; border-radius: 999px;
  background: var(--brand); color: var(--brand-contrast); font-size: 10px; font-weight: 700; display: grid; place-items: center; font-variant-numeric: tabular-nums; }
.wbk-badge-dot { min-width: 9px; height: 9px; padding: 0; top: -3px; inset-inline-end: -3px; }

/* Progress */
.wbk-prog { height: 8px; border-radius: 999px; background: var(--surface-2); overflow: hidden; }
.wbk-prog i { display: block; height: 100%; background: var(--brand); border-radius: 999px; }
.wbk-prog-l { font-size: 12px; color: var(--text-muted); margin-top: 6px; font-variant-numeric: tabular-nums; }
.wbk-prog-c .trk { fill: none; stroke: var(--surface-2); stroke-width: 4; }
.wbk-prog-c .val { fill: none; stroke: var(--brand); stroke-width: 4; stroke-linecap: round; transform: rotate(-90deg); transform-origin: center; }
.wbk-prog-c text { fill: var(--text); font-size: 11px; font-weight: 600; }

/* Avatar stack */
.wbk-avstack { display: inline-flex; align-items: center; }
.wbk-avstack .avatar { width: 34px; height: 34px; margin: 0; margin-inline-start: -10px; border: 2px solid var(--surface); }
.wbk-avstack .avatar:first-child { margin-inline-start: 0; }
.wbk-avmore { width: 34px; height: 34px; border-radius: 50%; background: var(--surface-2); color: var(--text-muted); display: grid; place-items: center; font-size: 12px; font-weight: 600; margin-inline-start: -10px; border: 2px solid var(--surface); }

/* Tabs */
.wbk-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); }
.wbk-tabs button { appearance: none; border: 0; background: transparent; color: var(--text-muted); font: inherit; font-size: 14px; font-weight: 600; padding: 8px 12px; cursor: pointer; position: relative; }
.wbk-tabs button.active { color: var(--text); }
.wbk-tabs button.active::after { content: ""; position: absolute; left: 8px; right: 8px; bottom: -1px; height: 2px; background: var(--brand); border-radius: 2px; }

/* Toast / banner extras */
.wbk-toast { margin-bottom: 8px; }
.wbk-x { margin-inline-start: auto; border: 0; background: transparent; color: var(--text-muted); cursor: pointer; display: inline-grid; place-items: center; }
.wbk-banner { margin-bottom: 8px; }
.wbk-banner-msg { display: inline-flex; align-items: center; gap: 8px; }

/* Tooltip */
.wbk-tip-host { position: relative; cursor: default; border-bottom: 1px dashed var(--text-muted); }
.wbk-tip { position: absolute; bottom: calc(100% + 8px); inset-inline-start: 0; background: var(--text); color: var(--bg); font-size: 12px; padding: 6px 9px; border-radius: 6px; white-space: nowrap; opacity: 0; visibility: hidden; transform: translateY(4px); transition: opacity .15s, transform .15s; box-shadow: var(--shadow); }
.wbk-tip-host:hover .wbk-tip { opacity: 1; visibility: visible; transform: translateY(0); }

/* Countdown */
.wbk-cd { display: inline-flex; gap: 8px; }
.wbk-cd-b { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; text-align: center; min-width: 48px; }
.wbk-cd-b b { display: block; font-family: var(--font-display); font-stretch: 125%; font-size: 20px; font-variant-numeric: tabular-nums; }
.wbk-cd-b span { font-size: 9px; letter-spacing: .08em; color: var(--text-muted); }

/* Date picker */
/* Calendar / date picker — WBK PRO V3 (node 5069-41970). Month header (Label-L),
   weekday labels (Body-XS muted), day cells (Body-S, Radius-M 8), with today /
   selected / range / disabled / hover / focus states. RTL-safe: the 7-col grid
   flows by writing direction, so the week start mirrors automatically. */
.wbk-cal { max-width: 280px; }
.wbk-cal-m { font-family: var(--font-display); font-weight: 600; font-size: var(--fs-label-l); line-height: var(--lh-label-l); color: var(--text); margin-bottom: var(--sp-3); }
.wbk-cal-w, .wbk-cal-g { display: grid; grid-template-columns: repeat(7, 1fr); gap: var(--sp-1); }
.wbk-cal-w span { text-align: center; font-size: var(--fs-body-xs); line-height: var(--lh-body-xs); color: var(--text-muted); padding: var(--sp-2) 0; text-transform: uppercase; letter-spacing: .04em; }
.wbk-cal-d { aspect-ratio: 1/1; display: grid; place-items: center; border: 0; background: transparent; color: var(--text); border-radius: var(--radius-md); cursor: pointer; font-size: var(--fs-body-s); line-height: var(--lh-body-s); font-variant-numeric: tabular-nums; transition: background-color .12s ease, color .12s ease, box-shadow .12s ease; }
.wbk-cal-d:hover:not(.is-empty):not(:disabled) { background: var(--surface-2); }
.wbk-cal-d:focus-visible { outline: none; box-shadow: 0 0 0 2px color-mix(in srgb, var(--brand) 45%, transparent); }
.wbk-cal-d.is-today { box-shadow: inset 0 0 0 1px var(--brand); color: var(--brand); font-weight: 600; }
.wbk-cal-d.is-range { background: var(--state-positive-bg); border-radius: 0; color: var(--text); }
.wbk-cal-d.is-sel { background: var(--brand); color: var(--brand-contrast); font-weight: 600; }
.wbk-cal-d.is-sel.is-today { box-shadow: none; }
.wbk-cal-d:disabled, .wbk-cal-d.is-disabled { color: var(--text-disabled); cursor: not-allowed; }
.wbk-cal-d.is-empty { pointer-events: none; }

/* Card / list item */
.wbk-card { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--surface-2); margin-bottom: 12px; }
.wbk-card-media { height: 96px; display: grid; place-items: center; color: var(--text-muted); background: linear-gradient(135deg, var(--surface-2), var(--surface)); }
.wbk-card-b { padding: 12px; }
.wbk-card-t { font-weight: 600; font-size: 14px; }
.wbk-card-m { color: var(--text-muted); font-size: 12px; margin: 2px 0 10px; }
.wbk-card-f { display: flex; align-items: center; justify-content: space-between; }
.wbk-list { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.wbk-li { display: flex; align-items: center; gap: 10px; padding: 12px; border-bottom: 1px solid var(--border); color: var(--text-muted); }
.wbk-li:last-child { border-bottom: 0; }
.wbk-li div { flex: 1; min-width: 0; }
.wbk-li-t { color: var(--text); font-weight: 600; font-size: 13.5px; }
.wbk-li-m { font-size: 12px; }

/* Modal / dialog */
.wbk-modal { position: fixed; inset: 0; z-index: 200; display: grid; place-items: center; }
.wbk-modal[hidden] { display: none; }
.wbk-modal-bd { position: absolute; inset: 0; background: rgba(0,0,0,.55); backdrop-filter: blur(4px); }
.wbk-modal-card { position: relative; width: min(420px, 90vw); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; box-shadow: 0 24px 60px rgba(0,0,0,.4); }
.wbk-modal-media { height: 120px; border-radius: var(--radius-sm); background: var(--surface-2); display: grid; place-items: center; color: var(--text-muted); margin-bottom: 14px; }
.wbk-modal-card h4 { margin: 0 0 6px; font-size: 16px; }
.wbk-modal-card p { margin: 0; color: var(--text-muted); font-size: 14px; }
@media (prefers-reduced-motion: reduce) { .wbk-tip, .wbk-toggle span::after { transition: none; } }

/* ── Signature / credits bar — a quiet authed-app footer (Wave 3 supporting drop, v2).
   Credit-only; no data, no logic. Renders at the END of the scrolling content column
   (inside .view-main, after #view) in normal flow — NOT fixed/sticky — and carries no
   positive z-index, so the overlay host, drawers and modals (z-index 40+) always sit
   ABOVE it. Slim + low-key: it reads as a signature, never a banner. Gold is darkened in
   light theme to keep the small role labels readable (WCAG AA). RTL reverses the row. */
#sig-bar { position: relative; z-index: 0; }
.sig-bar { display: flex; align-items: center; gap: var(--sp-5); padding: var(--sp-3) var(--sp-7); margin-top: var(--sp-5);
  border-top: 1px solid var(--border, rgba(255,255,255,.12));
  background: var(--bg);
  font-family: var(--font-sans, system-ui, sans-serif); }
.sig-dept { flex: 1.5; display: flex; align-items: center; gap: var(--sp-2); font-size: 11px; letter-spacing: .16em;
  text-transform: uppercase; color: var(--text-muted); font-weight: 500; line-height: 1; }
.sig-sep { flex: none; width: 1px; height: 22px; align-self: center;
  background: var(--border, rgba(255,255,255,.12)); }
.sig-credit { flex: none; display: inline-flex; align-items: baseline; gap: var(--sp-2); padding: 0; }
.sig-role { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--sig-gold);
  font-weight: 600; margin: 0; }
.sig-name { font-size: 13px; font-weight: 600; color: var(--text-muted); line-height: 1; }
.sig-name--accent { position: relative; display: inline-block; }
.sig-name--accent::after { content: ""; position: absolute; left: 50%; transform: translateX(-50%);
  bottom: -4px; width: 20px; height: 2px; border-radius: 2px; background: var(--brand); }
[dir="rtl"] .sig-bar { flex-direction: row-reverse; }
@media (max-width: 640px) {
  .sig-bar { flex-direction: column; gap: var(--sp-3); align-items: center; text-align: center; margin-top: var(--sp-5); }
  .sig-dept { flex: none; justify-content: center; }
  .sig-sep { display: none; }
}

/* ── Evaluation prep · evidence (Wave 3.002, P2). PREP ONLY — sourced lines + gaps,
   never a score/verdict. Manager-gated; rendered above the scoring criteria. */
.eval-prep { border-left: 3px solid var(--brand); }
.eval-prep .ttl { line-height: 1.5; }
.ep-cat { margin: 12px 0; }
.ep-cat .mini-label { display: flex; align-items: center; gap: 6px; }
.ep-count { color: var(--text-muted); font-weight: 400; }
.ep-list { list-style: none; margin: 6px 0 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
.ep-line { display: flex; flex-direction: column; gap: 2px; padding: 8px 10px;
  background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); }
.ep-text { color: var(--text); font-size: 14px; line-height: 1.45; }
.ep-src { display: inline-flex; align-items: center; gap: 5px; color: var(--text-muted); font-size: 12px; }
.ep-highlights .ep-line { border-color: color-mix(in srgb, var(--brand) 35%, var(--border)); }
.ep-empty { padding: 12px; border: 1px dashed var(--border); border-radius: var(--radius-sm);
  background: var(--surface-2); margin-top: 8px; }
.ep-gaps { margin-top: 14px; }
.ep-gap { color: var(--text-muted); font-size: 13px; padding: 4px 0; }
[dir="rtl"] .eval-prep { border-left: 0; border-right: 3px solid var(--brand); }

/* ── Suggested-range SUPPORT panel (P3, WP.evalIntel.suggestedRange). A calm aid
   BESIDE the manager's own rating — never replaces it. Shows a RANGE band on /5
   (never a single number to copy), confidence, cited reasoning, and risks framed
   "weigh these". Sensitive-gated. Tokens only; both themes; RTL via logical props. */
.wbk-band { border-inline-start: 3px solid var(--brand); }
.wbk-band .ttl { line-height: 1.5; }
.wbk-band-head { display: flex; align-items: center; gap: var(--sp-2); flex-wrap: wrap; }
.wbk-band-sub { color: var(--text-muted); font-size: var(--fs-body-s); line-height: var(--lh-body-s); margin-top: 2px; }
.wbk-band-conf { display: inline-flex; align-items: center; gap: var(--sp-1); margin-inline-start: auto;
  font-size: var(--fs-label-xs); line-height: var(--lh-label-xs); text-transform: uppercase; letter-spacing: .06em;
  color: var(--text-muted); }
/* the /5 range track — a highlighted band [low–high], not a point */
.wbk-band-track { position: relative; block-size: 8px; border-radius: 999px; background: var(--surface-3);
  margin: var(--sp-5) 0 var(--sp-3); }
/* 1–5 gridlines: thin marks at 0/25/50/75/100% so the span reads against the scale (#4). */
.wbk-band-grid { position: absolute; inset: 0; pointer-events: none; border-radius: inherit;
  background-image: repeating-linear-gradient(to right,
    var(--border) 0, var(--border) 1px, transparent 1px, transparent 25%);
  border-inline-end: 1px solid var(--border); /* the 5/right-edge tick */
  opacity: .9; }
.wbk-band-span { position: absolute; block-size: 100%; border-radius: 999px;
  background: color-mix(in srgb, var(--brand) 55%, transparent); border: 1px solid var(--brand); }
.wbk-band-scale { display: flex; justify-content: space-between; font-variant-numeric: tabular-nums;
  color: var(--text-tertiary); font-size: var(--fs-body-xs); }
.wbk-band-val { font-family: var(--font-display); font-weight: 600; color: var(--text);
  font-size: var(--fs-h5); line-height: var(--lh-h5); font-variant-numeric: tabular-nums; }
.wbk-band-val span { color: var(--text-muted); font-size: var(--fs-body-m); font-weight: 400; }
.wbk-band-reason { list-style: none; margin: var(--sp-3) 0 0; padding: 0; display: flex; flex-direction: column; gap: var(--sp-2); }
.wbk-band-reason li { display: flex; flex-direction: column; gap: 2px; padding: var(--sp-3);
  background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: var(--fs-body-m); color: var(--text); }
/* "cites N" is a real control opening the cited-evidence drawer (#1) — reset the button
   chrome, keep it quiet, but give it a clear hover + keyboard focus ring. */
.wbk-band-ev { display: inline-flex; align-items: center; gap: var(--sp-1); align-self: flex-start;
  color: var(--text-muted); font-size: var(--fs-body-s); font-family: inherit;
  background: none; border: 1px solid transparent; border-radius: var(--radius-sm);
  padding: 2px 6px; margin-block-start: 2px; cursor: pointer; text-decoration: underline;
  text-decoration-style: dotted; text-underline-offset: 2px; }
.wbk-band-ev:hover { color: var(--text); background: var(--surface-2); border-color: var(--border); }
.wbk-band-ev:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }
/* Collapsed (anchoring guard): only the title + note + reveal button show. */
.wbk-band--collapsed .wbk-band-head, .wbk-band--collapsed .wbk-band-track,
.wbk-band--collapsed .wbk-band-scale, .wbk-band--collapsed .wbk-band-val,
.wbk-band--collapsed .wbk-band-reason, .wbk-band--collapsed .ep-gaps { display: none; }
#sb-reveal { margin-block-start: var(--sp-3); }
#sb-reveal[disabled] { opacity: .6; cursor: progress; }
.wbk-band-risk { border-color: var(--state-notice-border); }
.wbk-band-risk .wbk-band-ev { color: var(--state-notice); }
.wbk-band-empty { padding: var(--sp-4); border: 1px dashed var(--border); border-radius: var(--radius-sm);
  background: var(--surface-2); color: var(--text-muted); }

/* ── Consistency / bias AWARENESS cards (P3, WP.evalIntel.consistencyCheck). Neutral
   "worth a second look" — never blocking, never a rank/score of anyone. */
.wbk-consist { display: flex; flex-direction: column; gap: var(--sp-3); }
.wbk-consist-card { display: flex; align-items: flex-start; gap: var(--sp-3); padding: var(--sp-4);
  border: 1px solid var(--state-notice-border); background: var(--state-notice-bg); border-radius: var(--radius); }
.wbk-consist-ic { flex: none; color: var(--state-notice); margin-block-start: 1px; }
.wbk-consist-t { font-weight: 600; font-size: var(--fs-label-m); line-height: var(--lh-label-m); color: var(--text); }
.wbk-consist-x { font-size: var(--fs-body-s); line-height: var(--lh-body-s); color: var(--text-muted); margin-top: 2px; }
/* Quiet "calibration looks consistent" line (#6) — confirms the check ran; never an alarm. */
.wbk-consist-ok { display: flex; align-items: center; gap: var(--sp-2); color: var(--text-muted);
  font-size: var(--fs-body-s); line-height: var(--lh-body-s); }
.wbk-consist-ok-ic { display: inline-flex; color: var(--state-positive); }

</style>

/* ============================================================
 * Tempo — Slack Daily Check-in ingest (F-034 v1)  ·  PURE, no DOM/network
 * ------------------------------------------------------------
 * Turns a daily check-in posted in #daily-checkin into Evidence Timeline
 * events. Self-reported, structured, opt-in — we record WHAT THE WORK IS,
 * never how a person behaves (see docs/SPEC-slack-real-data.md + INTELLIGENCE-ETHICS).
 *
 * Template the team posts (form-generated or hand-typed):
 *   Daily Check-in — <name> — <date>
 *   Done today:
 *   - <thing> (counts captured, e.g. "issued 40 tickets")
 *   Blockers / need help:
 *   - <thing>  | or "none"
 *   Tomorrow:
 *   - <focus>
 *
 * Contract:
 *   parseCheckin(text) -> { isCheckin, name, date, done[], blockers[], tomorrow[] }
 *                         | { isCheckin:false, unparseable:true }
 *   toEvents(parsed, ctx) -> [event,...]   (event shape = the existing events store)
 *   extractCounts(line)   -> [{ n, unit }]
 *   dedupeKey(ts, category, i) -> string
 *
 * Hard rule: never fabricate. A line we can't read is dropped + flagged by the
 * caller, not guessed. Template hint lines (the parenthesised examples) are skipped.
 * ========================================================== */
(function (WP) {
  'use strict';

  // ---- header + section labels (EN primary; AR so Arabic posts parse too) ----
  var HEADER_RE = /^\s*(?:[*_~`>\s]*)daily\s*check-?in\b/i;
  var HEADER_AR = /(?:تشيك|التحديث|متابعة|المتابعة)\s*اليوم/;

  // Each section: the label patterns that switch the current bucket.
  var SECTIONS = [
    { key: 'done',     res: [/^done(\s+today)?\b/i, /^today\b/i, /^أنجزت/, /^ما\s*تم/, /^المنجز/] },
    { key: 'blockers', res: [/^blockers?\b/i, /^need\s*help\b/i, /^blocked\b/i, /^عوائق/, /^معوقات/, /^مساعدة/, /^عالق/] },
    { key: 'tomorrow', res: [/^tomorrow\b/i, /^next\b/i, /^غد[اً]?/, /^الغد/, /^خطة\s*الغد/] }
  ];

  var BULLET_RE = /^\s*(?:[-•*–—]|\d+[.)])\s+/;       // -, •, *, –, —, "1." "2)"
  var NONE_RE   = /^(none|n\/a|na|nothing|no blockers|لا|لا\s*شيء|لا\s*يوجد|ولا\s*شيء)\.?$/i;

  // A line that is ONLY a parenthesised template hint, or contains the template's
  // example wording — never becomes an event.
  var HINT_RE = /^\(.*\)$/;
  var HINT_WORDS = /(what you completed|add counts where|anything stuck|your main focus|e\.g\.)/i;

  function stripBullet(line) { return line.replace(BULLET_RE, '').trim(); }

  function sectionFor(line) {
    var bare = stripBullet(line).replace(/^[*_~`]+/, '').trim();
    for (var s = 0; s < SECTIONS.length; s++) {
      for (var r = 0; r < SECTIONS[s].res.length; r++) {
        if (SECTIONS[s].res[r].test(bare)) {
          // capture any inline content after a ":" on the label line (e.g. "Tomorrow: ship X")
          var colon = bare.indexOf(':');
          var inline = colon >= 0 ? bare.slice(colon + 1).trim() : '';
          return { key: SECTIONS[s].key, inline: inline };
        }
      }
    }
    return null;
  }

  function isHint(item) {
    return !item || HINT_RE.test(item) || HINT_WORDS.test(item);
  }

  // Extract count signals from a delivery line: "issued 40 tickets" -> {n:40, unit:"tickets"}.
  // Verbatim line is always the source of truth; counts are a convenience for totals.
  function extractCounts(line) {
    var out = [];
    var re = /(\d{1,6})\s+([A-Za-z؀-ۿ][A-Za-z؀-ۿ-]*)/g, m;
    while ((m = re.exec(line)) !== null) {
      out.push({ n: parseInt(m[1], 10), unit: m[2].toLowerCase() });
    }
    return out;
  }

  function parseHeader(line) {
    // "Daily Check-in — Name — Date"  → split on — / - / :  (after the label)
    var rest = line.replace(HEADER_RE, '').replace(HEADER_AR, '').replace(/^[\s:—\-]+/, '');
    // Split on field separators only — em-dash, pipe, colon, or a SPACED hyphen —
    // so an internal date like "2026-06-27" is not broken apart.
    var parts = rest.split(/\s*[—|:]\s*|\s+-\s+/).map(function (p) { return p.trim(); }).filter(Boolean);
    return { name: parts[0] || '', date: parts[1] || '' };
  }

  function parseCheckin(text) {
    var empty = { isCheckin: false, unparseable: true };
    if (!text || typeof text !== 'string') return empty;
    var lines = text.replace(/\r/g, '').split('\n').map(function (l) { return l.trim(); });

    var hasHeader = lines.some(function (l) { return HEADER_RE.test(l) || HEADER_AR.test(l); });
    var hasSection = lines.some(function (l) { return !!sectionFor(l); });
    if (!hasHeader && !hasSection) return empty;   // not a check-in → caller flags "couldn't read"

    var res = { isCheckin: true, name: '', date: '', done: [], blockers: [], tomorrow: [] };
    var cur = null;

    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      if (!line) continue;

      if (HEADER_RE.test(line) || HEADER_AR.test(line)) {
        var h = parseHeader(line); res.name = h.name; res.date = h.date; cur = null; continue;
      }
      var sec = sectionFor(line);
      if (sec) {
        cur = sec.key;
        if (sec.inline && !isHint(sec.inline)) res[cur].push(sec.inline);
        continue;
      }
      if (!cur) continue;                          // content before any section → ignore
      var item = stripBullet(line);
      if (isHint(item)) continue;                  // skip the parenthesised template hints
      if (cur === 'blockers' && NONE_RE.test(item)) continue;  // "none" → no risk
      if (item) res[cur].push(item);
    }
    return res;
  }

  var CATEGORY = { done: 'delivery', blockers: 'risk', tomorrow: 'plan' };

  function dedupeKey(ts, category, i) { return String(ts) + ':' + category + ':' + i; }

  // parsed + ctx{ subjectId, permalink, ts, checkinId, confidence } -> events[]
  // One check-in line = one event; all share permalink + checkinId so the timeline
  // can group them. subjectId MUST be resolved by the caller (Slack user -> directory
  // person) BEFORE calling; if it couldn't resolve, the caller drops the whole post.
  function toEvents(parsed, ctx) {
    if (!parsed || !parsed.isCheckin || !ctx || !ctx.subjectId) return [];
    var conf = ctx.confidence || 'med';
    var out = [];
    ['done', 'blockers', 'tomorrow'].forEach(function (bucket) {
      var category = CATEGORY[bucket];
      parsed[bucket].forEach(function (line, i) {
        var ev = {
          type: 'evidence',
          ts: ctx.ts,
          actor: 'system:slack-ingest',
          subjectId: ctx.subjectId,
          category: category,
          description: line,
          source: 'slack:#daily-checkin',
          evidenceRefs: ctx.permalink ? [ctx.permalink] : [],
          confidence: conf,
          checkinId: ctx.checkinId || ctx.ts,
          dedupeKey: dedupeKey(ctx.ts, category, i)
        };
        if (category === 'delivery') {
          var counts = extractCounts(line);
          if (counts.length) ev.metrics = counts;
        }
        out.push(ev);
      });
    });
    return out;
  }

  WP.slackIngest = { parseCheckin: parseCheckin, toEvents: toEvents, extractCounts: extractCounts, dedupeKey: dedupeKey };
})(window.WP = window.WP || {});

      subject_id: id,
      author_id: rec.evaluatorId || '',
      cycle: rec.period || '',
      scores: rec.scores || {},
      feedback: rec.feedback || {},
      status: rec.status || 'Not started',
      updated_at: rec.updated_at || new Date().toISOString()
      // author_email intentionally omitted — DB default auth.email() stamps it
      // on insert so RLS (author_email = auth.email()) passes.
    };
  }
  function rowToRec(row) {
    row = row || {};
    return {
      period: row.cycle || '',
      status: row.status || 'Not started',
      evaluatorId: row.author_id || null,
      scores: row.scores || {},
      feedback: row.feedback || {},
      updated_at: row.updated_at || null

  function localStore() {
    return (WP.data && WP.data.EVALUATIONS) ? WP.data.EVALUATIONS : (WP.data ? (WP.data.EVALUATIONS = {}) : {});
  }
  function persistLocal() { try { if (WP.persist) WP.persist.saveData(); } catch (e) {} }

  function newer(a, b) {
    // true if record a is strictly newer than b (by updated_at). Missing = oldest.
    var ta = a && a.updated_at ? Date.parse(a.updated_at) : 0;
    var tb = b && b.updated_at ? Date.parse(b.updated_at) : 0;

  var importDone = false;
  function importLocalUp(serverById) {
    if (importDone) return Promise.resolve();
    importDone = true;
    var c = client(); if (!c) return Promise.resolve();
    var local = localStore();
    var pending = [];
    Object.keys(local).forEach(function (id) {
      var lrec = local[id];
      var srec = serverById[id];

      if (!srec || newer(lrec, srec)) pending.push(recToRow(id, lrec));

      .then(function (res) { if (res && res.error) throw res.error; })
      .catch(function (e) { status.lastError = e; /* keep local; non-fatal */ });

  var evaluations = {

     * and (first signed-in load only) import local-only rows up. Falls back to
     * the local store on any error. Returns the merged map. */

      var c = client();
      if (!c) { status.offline = false; return Promise.resolve(localStore()); }
      status.loading = true; status.lastError = null;
      return Promise.resolve(c.from(TABLE).select('*'))
        .then(function (res) {
          if (res && res.error) throw res.error;
          var rows = (res && res.data) || [];
          var serverById = {};
          rows.forEach(function (row) { serverById[row.id] = rowToRec(row); });
          // merge server rows into the local store (server wins when newer)
          var store = localStore();
          Object.keys(serverById).forEach(function (id) {
            if (!store[id] || newer(serverById[id], store[id])) store[id] = serverById[id];

          return importLocalUp(serverById).then(function () { persistLocal(); return store; });
        })
        .catch(function (e) {
          status.offline = true; status.lastError = e;
          return localStore();               // graceful fallback — no throw
        })
        .then(function (store) { status.loading = false; return store; });
    },

    /* Write a record (already mutated into WP.data.EVALUATIONS by callers, or
     * passed here). Always persists locally first (never lose work), then tries

     * { ok:false, offline:true } rather than rejecting. */

      if (!c) { status.offline = false; return Promise.resolve({ ok: true, offline: false, local: true }); }
      return Promise.resolve(c.from(TABLE).upsert(recToRow(id, rec), { onConflict: 'id' }))
        .then(function (res) {

      if (!c) return Promise.resolve({ ok: true, offline: false, local: true });

        .then(function (res) {

          status.offline = false;

    }
  };

  /* --- events: append-only evidence/decision store (Intelligence Layer) ------
   * Append-only by contract — there is intentionally NO edit/remove (an evidence
   * trail you can rewrite is worthless). Supabase 'events' when signed in; a
   * separate localStorage key as fallback. Persisted events are *appended*
   * decisions/evidence; derived-from-signal events are recomputed in events.js. */

    /* List persisted events (optionally for one subject). Backend when available,

      if (!c) return Promise.resolve(filt(localEvents()));

      if (subjectId && q.eq) q = q.eq('subject_id', subjectId);
      return Promise.resolve(q)
        .then(function (res) {
          if (res && res.error) throw res.error;
          status.offline = false;
          return ((res && res.data) || []).map(rowToEvent);
        })
        .catch(function (e) { status.offline = true; status.lastError = e; return filt(localEvents()); });
    },
    /* Append one event. Append-only: always persisted locally; pushed to backend
     * when available. Returns {ok, offline}. */
    append: function (evt) {

      if (arr.some(function (e) { return e.id === evt.id; })) return Promise.resolve({ ok: true, dedup: true }); // idempotent
      arr.push(evt); saveLocalEvents(arr);
      var c = client();
      if (!c) return Promise.resolve({ ok: true, offline: false, local: true });
      return Promise.resolve(c.from('events').insert(eventToRow(evt)))
        .then(function (res) { if (res && res.error) throw res.error; status.offline = false; return { ok: true, offline: false }; })
        .catch(function (e) { status.offline = true; status.lastError = e; return { ok: false, offline: true, error: e }; });
    },
    _localKey: eventsKey   // F7: now a function returning the per-user namespaced key
  };

  function eventToRow(e) {
    return { id: e.id, ts: e.ts, type: e.type, actor: e.actor || null, subject_id: e.subjectId,
      category: e.category, before: e.before || null, after: e.after || null, description: e.description,
      source: e.source, related: e.related || null, confidence: e.confidence || null,
      evidence_refs: e.evidenceRefs || [], visibility: e.visibility || 'managers' };
  }
  function rowToEvent(r) {
    return { id: r.id, ts: r.ts, type: r.type, actor: r.actor, subjectId: r.subject_id,
      category: r.category, before: r.before, after: r.after, description: r.description,
      source: r.source, related: r.related, confidence: r.confidence,
      evidenceRefs: r.evidence_refs || [], visibility: r.visibility || 'managers' };
  }

  /* --- people: the org directory, server-backed under RLS (F1, Phase 1) -------
   * Reads the NON-sensitive directory (public.people, migration 0004) under the
   * same can_read_person() policy as evaluations/events, and MERGES the directory
   * fields into the in-memory WP.data.PEOPLE the UI already reads — so views don't
   * change. Server wins for the fields it carries; the rich operational fields the
   * server doesn't hold (photo, dailyCheckin, assignedEvents, tenure, slackId,
   * email) are preserved from the bundled mock. Read-only: there is intentionally
   * no client write (the directory is service-role / admin-tooling maintained).
   * Signed out / offline / error -> the bundled mock stays as the graceful
   * fallback (never blanks, fully reversible). Never throws. */
  var PEOPLE_TABLE = 'people';
  // Only these directory fields are server-authoritative in Phase 1. Everything
  // else on a person record stays from the mock seed.
  function personRowToFields(row) {
    row = row || {};
    return {
      id: row.person_id,
      name: row.name,
      nameAr: row.name_ar,
      title: row.title,
      titleAr: row.title_ar,
      level: row.level,
      managerId: (row.manager_id === undefined ? null : row.manager_id),
      employment: row.employment || 'fulltime',

  }

    return (WP.data && Array.isArray(WP.data.PEOPLE)) ? WP.data.PEOPLE : [];
  }

  // directory fields (server wins), or append a new minimal person if unseen.

    var f = personRowToFields(row);
    if (!f.id) return;
    var list = peopleStore();
    var existing = list.filter(function (p) { return p.id === f.id; })[0];
    if (existing) {
      // server-authoritative directory fields only — leave operational fields intact
      existing.name = f.name; existing.nameAr = f.nameAr;
      existing.title = f.title; existing.titleAr = f.titleAr;
      existing.level = f.level; existing.managerId = f.managerId;
      existing.employment = f.employment; existing.initials = f.initials;
      if (f.tbc) existing.tbc = true; else delete existing.tbc;
    } else {
      list.push({ id: f.id, name: f.name, nameAr: f.nameAr, title: f.title, titleAr: f.titleAr,
        level: f.level, managerId: f.managerId, employment: f.employment, initials: f.initials,
        tbc: f.tbc, assignedEvents: [], dailyCheckin: null });
    }
  }

  var people = {
    /* Fetch the directory the user may read and merge into WP.data.PEOPLE.
     * Falls back to the bundled mock on signed-out/offline/error. Never throws.
     * Returns WP.data.PEOPLE (the same array reference the UI reads). */
    list: function () {
      var c = client();
      if (!c) { status.offline = false; return Promise.resolve(peopleStore()); }
      status.loading = true; status.lastError = null;
      return Promise.resolve(c.from(PEOPLE_TABLE).select('*'))
        .then(function (res) {

          status.offline = false; status.synced = true;
          return peopleStore();
        })
        .catch(function (e) {
          status.offline = true; status.lastError = e;
          return peopleStore();               // graceful fallback to mock — no throw
        })
        .then(function (store) { status.loading = false; return store; });
    }
  };

  /* --- growth: the SENSITIVE development record, server-backed under the STRICTER
   * predicate (F1, Phase 2). Reads public.growth (migration 0005) under
   * can_see_sensitive(person_id) = self OR DIRECT-manager-only OR director/admin
   * (NOT skip-level, NOT peers). Merges the per-person record into WP.data.GROWTH
   * — the same map the profile/growth views already read — so views don't change.
   * The whole growth record is server-authoritative (it IS the sensitive data), so
   * a present server row REPLACES the person's record wholesale. Signed out /
   * offline / error / not-permitted -> the bundled SYNTHETIC mock stays as the
   * graceful fallback (never blanks, fully reversible). Read-only: no client write

      eq: row.eq || {},
      managerNote: (row.manager_note === undefined ? null : row.manager_note),
      directorNote: (row.director_note === undefined ? null : row.director_note),

    if (!row || !row.person_id) return;
    growthStore()[row.person_id] = growthRowToRec(row);   // server-authoritative: full replace
  }

    /* Fetch every growth record the viewer may see (server-side RLS does the
     * gating) and merge into WP.data.GROWTH. Falls back to the bundled mock on
     * signed-out/offline/error. Never throws. Returns WP.data.GROWTH. */
    list: function () {
      var c = client();
      if (!c) { status.offline = false; return Promise.resolve(growthStore()); }
      status.loading = true; status.lastError = null;
      return Promise.resolve(c.from(GROWTH_TABLE).select('*'))
        .then(function (res) {
          if (res && res.error) throw res.error;
          ((res && res.data) || []).forEach(mergeGrowth);
          status.offline = false; status.synced = true;
          return growthStore();
        })
        .catch(function (e) {
          status.offline = true; status.lastError = e;
          return growthStore();               // graceful fallback to mock — no throw
        })
        .then(function (store) { status.loading = false; return store; });
    },

    /* One person's growth record. Server (RLS-scoped) when available, else the
     * bundled mock for that person. A row the viewer may NOT see simply isn't
     * returned by RLS -> we fall back to whatever is already in the local store
     * (mock), never throwing and never fabricating. */
    get: function (personId) {
      var c = client();
      if (!c) return Promise.resolve(growthStore()[personId] || null);
      var q = c.from(GROWTH_TABLE).select('*');
      if (q.eq) q = q.eq('person_id', personId);
      return Promise.resolve(q)
        .then(function (res) {
          if (res && res.error) throw res.error;
          var row = ((res && res.data) || [])[0];
          if (row) { mergeGrowth(row); status.offline = false; }

        .catch(function (e) { status.offline = true; status.lastError = e; return growthStore()[personId] || null; });

    status: status,
    usingBackend: usingBackend,
    evaluations: evaluations,
    events: events,
    people: people,
    growth: growth,
    _recToRow: recToRow,        // exposed for tests
    _rowToRec: rowToRec,
    _eventToRow: eventToRow,
    _personRowToFields: personRowToFields,  // tests
    _growthRowToRec: growthRowToRec,        // tests
    _resetImport: function () { importDone = false; }  // tests

  <script>
/* ============================================================
 * Tempo — Wellbeing Early-Warning (core)   ·  SPEC: docs/SPEC-burnout-early-warning.md
 * ------------------------------------------------------------
 * A SUPPORT tool, not a score and NOT surveillance (Constitution Article II).
 * Pure functions. No DOM. Rule-based and fully explainable (Article V): every
 * flag lists the exact factors that triggered it and a suggested relief action.
 *
 * Decision it serves (Article IV): "Who is heading toward burnout, so a manager
 * can give relief BEFORE it happens?" — redistribute work / check in / approve leave.
 *
 * Hard rules baked in:
 *  - Inputs are WORKLOAD signals already in the system (capacity, schedule,
 *    voluntary check-ins). NEVER clocked hours or activity tracking.
 *  - If a signal's data doesn't exist, the factor is OMITTED and said so —
 *    never fabricated.
 *  - Audience gating lives in atRisk()/canView() via the existing access model;
 *    risk is never peer-visible.
 * ========================================================== */
(function (WP) {
  'use strict';

  /* Tunable, auditable config — ONE place so weights/thresholds are explainable
   * and Phase-2 calibration is a config change, not a code change. */
  var CONFIG = {
    lookbackWeeks: 4,        // how many weeks of capacity history we read
    overloadPct: 100,        // a week at/above this is "over capacity"
    overloadMinWeeks: 2,     // need at least this many overloaded weeks to flag
    risingDeltaPts: 15,      // recent-vs-earlier load jump that counts as a rising trend
    checkinRatio: 0.6,       // weekDone/weekGoal below this = check-ins dropping
    points: {
      sustainedOverload: 2,  // per overloaded week, capped at 3 weeks' worth
      risingTrend: 2,
      scheduleClash: 2,      // overlapping / back-to-back events (capacity.burnoutSignal)
      missedCheckins: 2
    },
    // bands evaluated high → low; a person below the lowest is NOT flagged (good!)
    bands: [
      { key: 'critical', min: 7 },
      { key: 'atRisk',   min: 4 },
      { key: 'watch',    min: 2 }
    ]
  };

  function bandFor(score) {
    for (var i = 0; i < CONFIG.bands.length; i++) if (score >= CONFIG.bands[i].min) return CONFIG.bands[i].key;
    return null;
  }

  function actionFor(band) {
    if (band === 'critical') return { en: 'Rebalance their workload now and discuss time off / relief.', ar: 'أعد توزيع أعماله الآن وناقش إجازة أو تخفيفاً عاجلاً.' };
    if (band === 'atRisk')   return { en: 'Redistribute one project and schedule a 1:1 this week.', ar: 'انقل أحد المشاريع وحدد جلسة فردية هذا الأسبوع.' };
    if (band === 'watch')    return { en: 'Keep an eye on their load; check in at your next 1:1.', ar: 'تابع حمله؛ اطمئن عليه في جلستكما القادمة.' };
    return null;
  }

  function toISO(ref) {
    if (!ref) ref = (WP.state && WP.state.refDate) || new Date().toISOString().slice(0, 10);
    if (ref instanceof Date) return ref.toISOString().slice(0, 10);
    return String(ref).slice(0, 10);
  }
  function shiftISO(refISO, days) {
    var d = new Date(refISO + 'T00:00:00Z');
    d.setUTCDate(d.getUTCDate() + days);
    return d.toISOString().slice(0, 10);
  }
  function avg(arr) { return arr.length ? arr.reduce(function (a, b) { return a + b; }, 0) / arr.length : 0; }

  function weeklyLoads(person, refISO) {
    var loads = [];
    for (var i = 0; i < CONFIG.lookbackWeeks; i++) {
      loads.push(WP.capacity.loadForPerson(person, 'week', shiftISO(refISO, -7 * i)));
    }
    return loads; // [0] = current week … older as index grows
  }

  /* Score a person object directly (testable without registering them). */
  function scoreForPerson(person, ref) {
    var factors = [], omitted = [], score = 0;
    if (!person) return { id: null, band: null, score: 0, factors: factors, omitted: omitted, suggestedAction: null };
    var refISO = toISO(ref);

    // 1) Sustained overload (from the capacity engine — capacity, never hours)
    var loads = weeklyLoads(person, refISO);
    var overWeeks = loads.filter(function (l) { return l >= CONFIG.overloadPct; }).length;
    if (overWeeks >= CONFIG.overloadMinWeeks) {
      var pts = Math.min(overWeeks, 3) * CONFIG.points.sustainedOverload;
      score += pts;
      factors.push({ key: 'sustainedOverload', points: pts,
        en: 'Over capacity ' + overWeeks + ' of the last ' + CONFIG.lookbackWeeks + ' weeks',
        ar: 'فوق الطاقة ' + overWeeks + ' من آخر ' + CONFIG.lookbackWeeks + ' أسابيع' });
    }

    // 2) Rising trend (recent weeks heavier than earlier weeks)
    var half = Math.floor(loads.length / 2);
    if (half >= 1) {
      var newer = avg(loads.slice(0, half)), older = avg(loads.slice(half));
      if (newer - older >= CONFIG.risingDeltaPts) {
        score += CONFIG.points.risingTrend;
        factors.push({ key: 'risingTrend', points: CONFIG.points.risingTrend,
          en: 'Workload trending up (' + Math.round(older) + '% → ' + Math.round(newer) + '%)',
          ar: 'الحِمل في ارتفاع (' + Math.round(older) + '٪ ← ' + Math.round(newer) + '٪)' });
      }
    }

    // 3) Schedule clash (overlapping / back-to-back events — existing signal)
    if (WP.capacity.burnoutSignal(person)) {
      score += CONFIG.points.scheduleClash;
      factors.push({ key: 'scheduleClash', points: CONFIG.points.scheduleClash,
        en: 'Back-to-back / overlapping events with no recovery gap',
        ar: 'فعاليات متتالية أو متداخلة دون فترة تعافٍ' });
    }

    // 4) Check-in decline — ONLY when real voluntary check-in data exists (no fabrication)
    var eng = (WP.engage && WP.engage.snapshot) ? WP.engage.snapshot()[person.id] : null;
    if (eng && eng.weekGoal) {
      if ((eng.weekDone || 0) / eng.weekGoal < CONFIG.checkinRatio) {
        score += CONFIG.points.missedCheckins;
        factors.push({ key: 'missedCheckins', points: CONFIG.points.missedCheckins,
          en: 'Daily check-ins dropping (' + (eng.weekDone || 0) + '/' + eng.weekGoal + ' this week)',
          ar: 'تراجع التحديثات اليومية (' + (eng.weekDone || 0) + '/' + eng.weekGoal + ' هذا الأسبوع)' });
      }
    } else {
      omitted.push({ key: 'checkins', en: 'No check-in history yet — factor skipped', ar: 'لا يوجد سجل تحديثات بعد — تم تخطّي العامل' });
    }

    // 5) Recovery / leave — not tracked yet. Omit transparently (Article V); never invent it.
    omitted.push({ key: 'recovery', en: 'Leave / time-off not tracked yet — factor skipped', ar: 'الإجازات غير مسجّلة بعد — تم تخطّي العامل' });

    var band = bandFor(score);
    return { id: person.id, band: band, score: score, factors: factors, omitted: omitted, suggestedAction: actionFor(band) };
  }

  function scoreFor(personId, ref) { return scoreForPerson(WP.access.byId(personId), ref); }

  /* The people a viewer may see wellbeing for: their DIRECT reports (or, for a
   * director/admin, everyone) — enforced by the existing canSeeSensitive gate,
   * which returns true only for self / direct-manager / director. Peers => none.
   * Self is excluded (this is a manager's relief view, not a self-check). */
  function candidatesFor(viewer) {
    if (!viewer) return [];
    return WP.access.visiblePeople(viewer).filter(function (p) {
      return p.id !== viewer.id && !p.tbc && WP.access.canSeeSensitive(viewer, p.id);
    });
  }

  function canView(viewer) { return candidatesFor(viewer).length > 0; }

  /* Flagged people in the viewer's scope, highest risk first. NEVER peer-visible. */
  function atRisk(viewerId, ref) {
    var viewer = WP.access.byId(viewerId);
    if (!canView(viewer)) return [];
    return candidatesFor(viewer)
      .map(function (p) { return scoreForPerson(p, ref); })
      .filter(function (r) { return r.band; })
      .sort(function (a, b) { return b.score - a.score; });
  }

  WP.wellbeing = {
    CONFIG: CONFIG,
    bandFor: bandFor,
    scoreFor: scoreFor,
    scoreForPerson: scoreForPerson,
    canView: canView,
    atRisk: atRisk
  };
})(window.WP = window.WP || {});

</script>

/* ============================================================
 * Tempo — Fairness / Overload Radar (core)  ·  SPEC: docs/SPEC-fairness-radar.md
 * ------------------------------------------------------------
 * A TEAM-BALANCE support tool, NOT a "bad manager" scoreboard and NOT employee
 * surveillance (Constitution Article II). Pure functions. No DOM. Rule-based and

    return members.some(function (p) { return memberLoad(p, refISO) >= CONFIG.overloadPct; });
  }

    if (band === 'unbalanced' && pattern === 'wholeTeam') {
      return {
        en: nums.over + ' of ' + nums.n + ' over capacity — the whole team is stretched. Consider load relief or a hire.',
        ar: nums.over + ' من ' + nums.n + ' فوق الطاقة — الفريق كله مضغوط. فكّر بتخفيف الحمل أو بتوظيف.'
      };

        en: nums.over + ' over 100% while ' + nums.light + ' under ' + CONFIG.lightPct + '% — rebalance work across the team.',

    if (over.length >= 1 && light.length >= 1) {
      factors.push({ key: 'unevenSplit', en: light.length + ' under ' + CONFIG.lightPct + '% while ' + over.length + ' over capacity',
        ar: light.length + ' تحت ' + CONFIG.lightPct + '٪ بينما ' + over.length + ' فوق الطاقة' });
    }
    if (band !== 'balanced' && sustainedWeeks >= 1) {
      factors.push({ key: 'sustained', en: 'Pattern seen ' + sustainedWeeks + ' of the last ' + CONFIG.lookbackWeeks + ' weeks',
        ar: 'النمط ظهر ' + sustainedWeeks + ' من آخر ' + CONFIG.lookbackWeeks + ' أسابيع' });

      band: band,
      size: n,
      noData: false,

  function teamsInScope(viewer) {

      return WP.data.PEOPLE.filter(function (p) { return !p.tbc && isManagerOf(p.id); }).map(function (p) { return p.id; });

/* ============================================================
 * Tempo — Evidence/Decision events (Intelligence Layer P1, core)
 * SPEC: docs/SPEC-evidence-timeline.md · GATE: ai-os/00-governance/INTELLIGENCE-ETHICS.md
 * ------------------------------------------------------------
 * Pure derivation + query over the append-only event store. Every event is
 * derived from a REAL existing signal and carries its `source` — nothing is
 * fabricated (Ethics #2). Risk entries are framed as early support, not
 * punishment (Ethics #5). No DOM, no business logic in views.
 *
 * P1 timeline = events DERIVED from signals we already have (capacity, wellbeing,
 * completed evaluations, check-ins/kudos) + DECISION events from WP.activityLog,
 * merged with any explicitly appended events from WP.db.events.
 * ========================================================== */
(function (WP) {
  'use strict';

  // delivery/risk/plan are the Slack daily check-in categories (F-034) — appended
  // events from WP.db.events flow through the same timeline + filter as derived ones.
  var CATEGORIES = ['workload', 'wellbeing', 'evaluation', 'recognition', 'decision', 'delivery', 'risk', 'plan'];

  function iso(d) { return (d instanceof Date ? d : new Date(d)).toISOString(); }
  function quarterOf(ts) {

    return 'Q' + (Math.floor(d.getUTCMonth() / 3) + 1) + '-' + d.getUTCFullYear();

    if (!o.source) throw new Error('event without a source is not allowed (Ethics #2): ' + o.description);

      id: o.id, ts: o.ts, type: o.type || 'evidence', actor: o.actor || null, subjectId: o.subjectId,
      category: o.category, description: o.description, source: o.source,
      confidence: o.confidence || 'observed', growth: !!o.growth, evidenceRefs: o.evidenceRefs || []

   * wrapped in try/catch so one thrown signal can't blank the whole timeline — but a
   * silent catch makes a wiring regression look identical to a genuine absence. So in
   * dev we LOG the branch + error (production stays silent). User-facing behaviour is
   * unchanged: still no fabricated events, still graceful — the failure is just now

      if (WP.config && WP.config.debug != null) return !!WP.config.debug;
      var h = (typeof location !== 'undefined' && location.hostname) ? location.hostname : '';

    var out = [];

    // 1) Workload (capacity engine) — only if the person actually has load
    try {
      var snap = WP.capacity.snapshot(p, 'month', (refDate || (WP.state && WP.state.refDate)));
      if (snap && snap.load > 0) {
        out.push(ev({ id: 'der_workload_' + subjectId + '_' + refISO, ts: refISO, type: 'evidence', subjectId: subjectId,
          category: 'workload', confidence: 'observed', source: 'Capacity engine',
          description: 'Workload at ' + snap.load + '% (' + WP.i18n.stateLabel(snap.state) + ') this period' }));
      }
    } catch (e) { warnDerive('workload', subjectId, e); }

    // 2) Wellbeing — early SUPPORT signal, never punishment (Ethics #5)
    try {
      if (WP.wellbeing && WP.wellbeing.scoreFor) {
        var w = WP.wellbeing.scoreFor(subjectId, refDate);
        if (w && w.band) {
          out.push(ev({ id: 'der_wellbeing_' + subjectId + '_' + refISO, ts: refISO, type: 'evidence', subjectId: subjectId,

            description: 'Early support signal (' + w.band + '): ' + w.factors.map(function (f) { return f.en; }).join('; ') }));
        }

          description: 'Evaluation completed (' + (rec.period || '') + ')' + (overall != null ? ' — overall ' + overall + '/5' : '') }));
      }
    } catch (e) { warnDerive('evaluation', subjectId, e); }

    try {
      var eng = (WP.engage && WP.engage.snapshot) ? WP.engage.snapshot()[subjectId] : null;
      if (eng) {

          out.push(ev({ id: 'der_kudos_' + subjectId + '_' + i, ts: refISO, type: 'evidence', subjectId: subjectId,
            category: 'recognition', confidence: 'recorded', source: 'Check-in / kudos', growth: true,
            description: 'Recognition: “' + k.text + '”' + (k.from ? ' — ' + WP.i18n.name(WP.access.byId(k.from) || { name: k.from }) : '') }));
        });
        if (eng.weekGoal && eng.weekDone >= eng.weekGoal) {
          out.push(ev({ id: 'der_checkin_' + subjectId + '_' + refISO, ts: refISO, type: 'evidence', subjectId: subjectId,
            category: 'recognition', confidence: 'observed', source: 'Daily check-ins', growth: true,
            description: 'Consistent check-ins (' + eng.weekDone + '/' + eng.weekGoal + ' this week)' }));
        }

    } catch (e) { warnDerive('recognition', subjectId, e); }

    // 5) Decision events from the existing activity log (role changes, access, eval edits)
    try {
      (WP.activityLog || []).forEach(function (a, i) {
        if (a.target !== subjectId) return;
        out.push(ev({ id: 'der_act_' + subjectId + '_' + (a.at || i) + '_' + i, ts: iso(a.at || refISO),

          source: 'Activity log', description: (a.type || 'decision') + (a.reason ? ' · ' + a.reason : '') }));

    return events.slice().sort(function (a, b) { return new Date(b.ts) - new Date(a.ts); });
  }

  /* Full timeline: derived (from live signals) ∪ appended (persisted), de-duped
   * by id, filtered, newest first. Async because persisted events come from WP.db. */
  function query(subjectId, opts, refDate) {

    return Object.keys(seen).sort().reverse();

  WP.events = {
    CATEGORIES: CATEGORIES,
    derive: derive,
    filter: filter,
    sortDesc: sortDesc,
    query: query,
    quarterOf: quarterOf,
    quarters: quarters
  };
})(window.WP = window.WP || {});

/* ============================================================
 * Tempo — AI Evaluation Preparation (Intelligence Layer P2, core)
 * SPEC: docs/SPEC-eval-prep.md · GATE: ai-os/00-governance/INTELLIGENCE-ETHICS.md
 * ------------------------------------------------------------
 * PREP ONLY. This assembles the evidence a manager ALREADY has (the Wave 3.001
 * append-only event store) into a grouped, sourced, gap-honest summary so they
 * walk into an evaluation prepared instead of relying on memory.
 *
 * Hard guardrails (enforced here, not just by convention):
 *  - NO score, NO rating, NO verdict, NO recommendation. Scoring/bias is P3.
 *    summarize() returns NOTHING that ranks or judges — only sourced lines + gaps.
 *  - NO fabrication: a line with no `source` is DROPPED, never invented (Ethics #2).
 *  - Gaps are LISTED, not filled: an empty category becomes a stated gap.
 *  - "Not enough evidence" is a first-class result when the store is sparse.
 *  - Access gating + framing ("you decide") live in the UI layer.
 * ========================================================== */

  var CONFIG = {

    // categories we expect to find evidence across (mirrors the event store)

  function categories() {
    return (WP.events && WP.events.CATEGORIES) ? WP.events.CATEGORIES.slice() : CONFIG.categories.slice();

   * the caller can drop it (anti-fabrication guard at the boundary). */

      ts: e.ts || null,
      confidence: e.confidence || 'observed',
      category: e.category || 'decision',
      growth: !!e.growth
