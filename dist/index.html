/* ============================================================
 * Tempo — DESIGN TOKENS  ·  WBK PRO library V3  (single source of truth)
 * ------------------------------------------------------------
 * Re-baselined from Figma "🧱 WBK PRO library V3" (file pzAVvF8ygDHNwdNUsdwik2)
 * via get_variable_defs on the figma_dev@webook.com seat. V3's canonical
 * base is LIGHT: navy Content-Primary #071437 on pure white #FFFFFF.
 * Every value carries its V3 variable name in a comment. To re-sync later,
 * keep the variable NAMES, swap the values.
 *
 * RECONCILE NOTES (Wave 1):
 *  · Radius re-mapped by VALUE, not name. V3 radius-lg=8 / radius-xl=12.
 *    Our historic --radius-lg(12px) consumers keep 12px (they now equal V3
 *    radius-xl) so nothing silently shrinks; new --radius-md(6px) added.
 *  · V3 has no 18px type step — historic --fs-l(18) kept only as a
 *    deprecated alias; V3 components use the Label / Body / Heading scales.
 *  · Semantic states are now EXACT V3: Positive=Success #17C653,
 *    Negative=Danger #f8285a (active #d81a48, bg #ffeef3). Notice has no
 *    dedicated V3 token yet — #fcc800 retained as a documented carry-over.
 * ========================================================== */

/* Mona Sans — kept as a display fallback only (V3 UI/display font is Gellix). */
@font-face {
  font-family: "Mona Sans";
  src: url("https://cdn.jsdelivr.net/gh/github/mona-sans@2.0.27/fonts/webfonts/Mona-Sans.woff2") format("woff2-variations");
  font-weight: 200 900;
  font-stretch: 75% 125%;
  font-style: normal;
  font-display: swap;
}

:root,
[data-theme="light"] {
  /* surfaces / backgrounds — V3 light base */
  --bg:            #F1F1F4; /* Bg-Secondary */
  --surface:       #FFFFFF; /* Bg-Primary / Surface-Base */
  --surface-1:     #F9F9F9; /* Surface-L1 */
  --surface-2:     #F1F1F4; /* Surface-L2 */
  --surface-3:     #DBDFE9; /* Surface-L3 */
  --border:        #DBDFE9; /* Border-Tertiary (default hairline) */
  --border-secondary:#99A1B7; /* Border-Secondary (stronger) */
  --border-primary: #18181B; /* Border-Primary (strongest) */

  /* text / content */
  --text:          #071437; /* Content-Primary (navy) */
  --text-muted:    #78829D; /* Content-Secondary */
  --text-tertiary: #99A1B7; /* Content-Tertiary */
  --text-disabled: rgba(7,20,55,.30); /* Content-Disabled (#0714374D) */

  /* brand (Webook magenta) */
  --brand:         #FF2C79; /* Bg-Brand / Content-Brand / Border-Brand */
  --brand-contrast:#F9F9F9; /* CTA text · Content-Primary-Inverse */
  --link:          #FF2C79; /* Content-Link */
  --brand-disabled-bg: #FFD4E4; /* Bg-Brand-Disabled */

  /* inverse — Primary button (navy) + on-dark content */
  --inverse-bg:    #071437; /* Bg-Primary-Inverse / Surface-Base-Inverse */
  --inverse-text:  #F9F9F9; /* Content-Primary-Inverse */
  --inverse-text-2:#C4CADA; /* Content-Secondary-Inverse */

  /* capacity states — Tempo workload semantics (kept; available aligns to Success) */
  --state-available:  #17C653; /* Success (green = room to grow) */
  --state-balanced:   #F6B100; /* Warning (yellow = healthy zone) */
  --state-near:       #FF7F29; /* Orange (pre-warning) */
  --state-overloaded: #F8285A; /* Danger (red = soft-locked) */
  --state-available-bg:  rgba(23,198,83,.16);
  --state-near-bg:       rgba(255,127,41,.16);
  --state-overloaded-bg: rgba(248,40,90,.16);

  /* semantic status — EXACT WBK PRO V3 values (Content/States) */
  --state-positive:        #17C653; /* Success */
  --state-negative:        #F8285A; /* Content-Danger */
  --state-negative-active: #D81A48; /* Content-Danger-Active */
  --state-notice:          #FCC800; /* Content-Notice — confirmed from 🎨 WBK DS Foundation (the library V3 binds Notice from); no longer a carry-over */
  --state-positive-bg: color-mix(in srgb, var(--state-positive) 14%, transparent);
  --state-negative-bg: #FFEEF3; /* Bg-Danger (exact) */
  --state-notice-bg:   color-mix(in srgb, var(--state-notice) 16%, transparent);
  --state-notice-border: color-mix(in srgb, var(--state-notice) 30%, transparent);

  /* additional semantic + categorical tokens (V3 States collection / Tempo domain),
     added in the finish pass so NO raw colour lives outside this file */
  --state-info:    #2563EB; /* informational (toast/banner info) */
  --state-info-bg: color-mix(in srgb, var(--state-info) 14%, transparent);
  --state-over:    #C0392B; /* critical / over (wellbeing · fairness) */
  --state-over-bg: color-mix(in srgb, var(--state-over) 13%, transparent);
  --state-watch:   #D2691E; /* at-risk amber-orange (wellbeing) */
  --state-watch-bg: color-mix(in srgb, var(--state-watch) 14%, transparent);
  --cat-freelance:    #7C5CFF; /* employment category: Freelance (violet) */
  --cat-freelance-bg: color-mix(in srgb, var(--cat-freelance) 14%, transparent);
  --cat-joining:      #9A6B00; /* employment category: Joining soon — AA gold text on light */
  --cat-joining-bg:   var(--state-balanced-bg);
  --state-balanced-bg: color-mix(in srgb, var(--state-balanced) 16%, transparent);
  --sig-gold:      #6E5410; /* signature accent — AA-readable gold on light */
  --fixed-white:   #FFFFFF; /* fixed white for a mark on a brand/dark fill (check tick, toggle knob) */
  --tree-line:     #B7BBC7; /* org-tree connector */

  --shadow: 0 4px 12px rgba(0,0,0,.07); /* DropShadow Light */

  /* radius — V3 scale (re-mapped by value, see header note) */
  --radius-sm: 4px;  /* radius-sm */
  --radius-md: 6px;  /* radius-md */
  --radius:    8px;  /* radius-lg (default) */
  --radius-lg: 12px; /* V3 radius-xl — historic name kept at 12 (no shrink) */
  --radius-xl: 16px; /* Tempo extension (V3 container radius tops at 12) */

  /* spacing — V3 UI Paddings/Gaps (2/4/8/12/16/20) + Container/Section (24) */
  --sp-1: 2px;  --sp-2: 4px;  --sp-3: 8px;  --sp-4: 12px;  --sp-5: 16px;
  --sp-6: 20px; /* Padding-2xl */  --sp-7: 24px; /* Container-H / Gap-3xl / Section-H */

  /* type — V3 Gellix scale. Label/Body/Heading named steps. */
  --fs-label-xl: 20px; --lh-label-xl: 24px; /* button label */
  --fs-label-l:  16px; --lh-label-l:  20px;
  --fs-label-m:  14px; --lh-label-m:  20px;
  --fs-label-s:  12px; --lh-label-s:  16px;
  --fs-label-xs: 10px; --lh-label-xs: 12px;
  --fs-body-l:   16px; --lh-body-l:   24px;
  --fs-body-m:   14px; --lh-body-m:   20px;
  --fs-body-s:   12px; --lh-body-s:   16px;
  --fs-body-xs:  10px; --lh-body-xs:  12px;
  --fs-h1: 40px; --lh-h1: 48px;
  --fs-h2: 32px; --lh-h2: 40px;
  --fs-h3: 28px; --lh-h3: 36px;
  --fs-h4: 24px; --lh-h4: 32px;
  --fs-h5: 20px; --lh-h5: 28px;
  --fw-medium: 450; /* Font Weights/Medium */
  /* legacy aliases — kept for back-compat; V3 components use the scale above */
  --fs-s: 14px; --fs-m: 16px; --fs-l: 18px; /* deprecated (no 18px step in V3) */

  /* custom scrollbar (slim, floating, theme-aware) */
  --scrollbar-thumb:       rgba(16,24,40,.20);
  --scrollbar-thumb-hover: rgba(16,24,40,.38);

  /* typography — V3 UI/display = Gellix; Figtree + IBM Plex Arabic fall back so
     nothing shifts on the EN⇄AR toggle. AR keeps IBM Plex Sans Arabic. */
  --font-sans:    "Gellix", "Figtree", "IBM Plex Sans Arabic", -apple-system, "Segoe UI", system-ui, sans-serif;
  --font-ar:      "IBM Plex Sans Arabic", "Gellix", "Figtree", -apple-system, system-ui, sans-serif;
  --font-display: "Gellix", "Mona Sans", "Figtree", "IBM Plex Sans Arabic", system-ui, sans-serif;
}

[data-theme="dark"] {
  /* dark theme — Tempo mapping of the V3 light system */
  --bg:            #09090B; /* Surface-Base */
  --surface:       #18181B; /* Surface-L1 */
  --surface-1:     #1F1F23;
  --surface-2:     #27272A; /* Surface-L2 / Bg-Secondary */
  --surface-3:     #3F3F46;
  --border:        #FFFFFF1A; /* Border-Tertiary (white 10%) */
  --border-secondary:#FFFFFF2E;
  --border-primary: #FFFFFF;

  --text:          #E4E4E7; /* Content-Primary */
  --text-muted:    #A1A1AA; /* Content-Secondary */
  --text-tertiary: #71717A; /* Content-Tertiary */
  --text-disabled: rgba(255,255,255,.32);

  --brand:         #FF2C79;
  --brand-contrast:#F9F9F9;
  --link:          #FF2C79;
  --brand-disabled-bg: #4A1428;

  --inverse-bg:    #F9F9F9; /* inverse flips on dark */
  --inverse-text:  #071437;
  --inverse-text-2:#3F3F46;

  --state-available:  #17C653;
  --state-balanced:   #F6B100;
  --state-near:       #FF7F29;
  --state-overloaded: #F8285A;
  --state-available-bg:  rgba(23,198,83,.20);
  --state-near-bg:       rgba(255,127,41,.20);
  --state-overloaded-bg: rgba(248,40,90,.20);

  --state-positive:        #17C653;
  --state-negative:        #F8285A;
  --state-negative-active: #D81A48;
  --state-notice:          #FCC800;
  --state-positive-bg: color-mix(in srgb, var(--state-positive) 22%, transparent);
  --state-negative-bg: color-mix(in srgb, var(--state-negative) 22%, transparent);
  --state-notice-bg:   color-mix(in srgb, var(--state-notice) 22%, transparent);
  --state-notice-border: color-mix(in srgb, var(--state-notice) 38%, transparent);

  --state-info:    #5B8DEF; /* lifted for legibility on dark */
  --state-info-bg: color-mix(in srgb, var(--state-info) 22%, transparent);
  --state-over:    #E05A4A;
  --state-over-bg: color-mix(in srgb, var(--state-over) 22%, transparent);
  --state-watch:   #E8843C;
  --state-watch-bg: color-mix(in srgb, var(--state-watch) 22%, transparent);
  --cat-freelance:    #9A7DFF;
  --cat-freelance-bg: color-mix(in srgb, var(--cat-freelance) 22%, transparent);
  --cat-joining:      #E0B341; /* brighter gold reads on dark */
  --cat-joining-bg:   var(--state-balanced-bg);
  --state-balanced-bg: color-mix(in srgb, var(--state-balanced) 24%, transparent);
  --sig-gold:      #C8A24A; /* brighter gold reads better on dark */
  --fixed-white:   #FFFFFF;
  --tree-line:     #4A4A52;

  --shadow: 0 4px 12px rgba(0,0,0,.5);

  --scrollbar-thumb:       rgba(255,255,255,.16);

  display: inline-flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--sp-3);
  inline-size: 104px; block-size: 104px; padding: var(--sp-4); cursor: pointer; text-align: center;
  background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-lg);
  color: var(--text); font-size: var(--fs-s); font-weight: 500; transition: border-color .15s ease, background-color .15s ease;
}
.wbk-tile:hover { border-color: var(--text-muted); }
.wbk-tile[aria-pressed="true"], .wbk-tile.is-selected { border-color: var(--brand); background: color-mix(in srgb, var(--brand) 8%, transparent); }
.wbk-tile:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; }

/* Price / wallet amount (node 2060-15446) — tabular figures, currency + value. */
.wbk-price { display: inline-flex; align-items: baseline; gap: var(--sp-2); font-variant-numeric: tabular-nums; color: var(--text); }
.wbk-price .wbk-price-v { font-family: var(--font-display); font-weight: 700; font-size: 28px; line-height: 36px; }
.wbk-price .wbk-price-c { font-size: var(--fs-s); font-weight: 600; color: var(--text-muted); }
.wbk-price.is-sm .wbk-price-v { font-size: var(--fs-m); line-height: 24px; }
.wbk-price del { color: var(--text-muted); font-size: var(--fs-s); font-weight: 400; }

/* Media (node 2053-20120) — fixed aspect ratio with a graceful placeholder. */
.wbk-media { position: relative; inline-size: 100%; aspect-ratio: 16 / 9; border-radius: var(--radius-lg); overflow: hidden;
  background: var(--surface-2); display: flex; align-items: center; justify-content: center; color: var(--text-muted); }
.wbk-media img { inline-size: 100%; block-size: 100%; object-fit: cover; display: block; }
.wbk-media.is-square { aspect-ratio: 1 / 1; }

/* Chat message bubble (node 4326-2854) — sent (brand, end) vs received (start). */
.wbk-bubble { max-inline-size: 80%; padding: var(--sp-3) var(--sp-4); border-radius: var(--radius-lg); font-size: var(--fs-s); line-height: 20px;
  inline-size: fit-content; word-break: break-word; }
.wbk-bubble--recv { background: var(--surface-2); color: var(--text); border-end-start-radius: var(--radius-sm); margin-inline-end: auto; }
.wbk-bubble--sent { background: var(--brand); color: var(--brand-contrast); border-end-end-radius: var(--radius-sm); margin-inline-start: auto; }
.wbk-bubble-time { display: block; margin-block-start: var(--sp-1); font-size: 11px; opacity: .7; }

/* Map pin (nodes 6817-34991 / 6816-34234) — restaurant / hotel markers.
   Named .wbk-mappin to avoid clashing with the PIN-code .wbk-pin atom. */
.wbk-mappin { display: inline-flex; align-items: center; gap: var(--sp-2); padding: var(--sp-2) var(--sp-3); border-radius: 999px;
  background: var(--surface); color: var(--text); border: 1px solid var(--border); box-shadow: var(--shadow);
  font-size: 12px; font-weight: 600; white-space: nowrap; }
.wbk-mappin svg { color: var(--brand); flex: none; }
.wbk-mappin.is-active { background: var(--brand); color: var(--brand-contrast); border-color: transparent; }
.wbk-mappin.is-active svg { color: var(--brand-contrast); }

/* Ticket selector (node 2061-36975) — name + price with a quantity stepper. */
.wbk-ticket { display: flex; align-items: center; gap: var(--sp-4); padding: var(--sp-4) 0; border-block-end: 1px solid var(--border); }
.wbk-ticket:last-child { border-block-end: 0; }
.wbk-ticket-m { flex: 1; min-inline-size: 0; }
.wbk-ticket-m .nm { font-weight: 600; font-size: var(--fs-s); color: var(--text); }
.wbk-ticket-m .px { font-size: 12px; color: var(--text-muted); font-variant-numeric: tabular-nums; }
.wbk-qty { display: inline-flex; align-items: center; gap: var(--sp-3); }
.wbk-qty button { inline-size: 28px; block-size: 28px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface);
  color: var(--text); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
.wbk-qty button:hover:not(:disabled) { border-color: var(--brand); color: var(--brand); }
.wbk-qty button:disabled { opacity: .4; cursor: not-allowed; }
.wbk-qty .wbk-qty-v { min-inline-size: 18px; text-align: center; font-variant-numeric: tabular-nums; font-weight: 600; }

/* Actions bar / button dock (nodes 2061-24126 / 4398-34377) — footer action row;
   dock pairs a running total with the primary CTA (mobile checkout pattern). */
.wbk-actions { display: flex; align-items: center; gap: var(--sp-3); padding: var(--sp-4); border-radius: var(--radius-lg);
  background: var(--surface); border: 1px solid var(--border); }
.wbk-actions .wbk-actions-end { margin-inline-start: auto; display: inline-flex; gap: var(--sp-3); }
.wbk-dock { display: flex; align-items: center; gap: var(--sp-4); padding: var(--sp-4); border-radius: var(--radius-lg);
  background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow); }
.wbk-dock .btn.primary, .wbk-dock .wbk-btn--primary { margin-inline-start: auto; }

/* status palette for toasts / system banners (pair with an icon, never color alone) */
.wbk-toast, .wbk-banner {
  display: flex; align-items: center; gap: 8px; font-family: var(--font-sans); font-size: 14px; color: var(--text);
  border: 1px solid var(--border);
}
.wbk-toast  { padding: 12px 14px; border-radius: var(--radius); background: var(--surface); box-shadow: var(--shadow); }
.wbk-banner { padding: 10px 16px; width: 100%; justify-content: space-between; }
.wbk-is-info    { --wbk-status: var(--state-info); }
.wbk-is-success { --wbk-status: var(--state-positive); }
.wbk-is-warning { --wbk-status: var(--state-notice); }
.wbk-is-error   { --wbk-status: var(--state-negative); }
.wbk-toast[class*="wbk-is-"], .wbk-banner[class*="wbk-is-"] { border-inline-start: 3px solid var(--wbk-status); }
.wbk-status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--wbk-status); flex: none; }

/* --- Custom scrollbars: slim, floating, theme-aware (replaces the chunky native bar) --- */
* { scrollbar-width: thin; scrollbar-color: var(--scrollbar-thumb) transparent; }   /* Firefox */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }                              /* no blocky column */
::-webkit-scrollbar-thumb {
  background: var(--scrollbar-thumb);
  border-radius: 999px;
  border: 3px solid transparent;          /* inset padding → thumb looks slim and floats */
  background-clip: padding-box;
}
::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); background-clip: padding-box; }
::-webkit-scrollbar-corner { background: transparent; }

button { font-family: inherit; cursor: pointer; transition: background-color .2s ease, border-color .2s ease, color .2s ease, transform .12s ease; }

/* --- UI/UX pre-delivery polish (from the ui-ux-pro-max checklist) --- */
.btn, select, input, textarea, a, [data-id], [data-caret], .row, .dt-card, .ev-row, .task-row {
  transition: background-color .2s ease, border-color .2s ease, color .2s ease, box-shadow .2s ease;
}
[data-id], .dt-card, .ev-row, .task-row, .row { cursor: pointer; }
:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; border-radius: 6px; }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; scroll-behavior: auto !important; }
}

/* CSS-drawn arrows (no font glyphs → always render crisply in any font) */
.ar { display: inline-block; vertical-align: middle; }
.ar-up   { width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-bottom: 7px solid currentColor; }
.ar-dn   { width: 0; height: 0; border-left: 4px solid transparent; border-right: 4px solid transparent; border-top: 7px solid currentColor; }
.ar-left { width: 7px; height: 7px; border-left: 2px solid currentColor; border-bottom: 2px solid currentColor; transform: rotate(45deg); }
.ar-right{ width: 7px; height: 7px; border-right: 2px solid currentColor; border-top: 2px solid currentColor; transform: rotate(45deg); }

/* shared subtitle / muted text — sized for readability */
.ttl { font-size: 13px; color: var(--text-muted); line-height: 1.4; }
.sub { font-size: 14px; color: var(--text-muted); line-height: 1.5; }
.nm { line-height: 1.35; }

/* Titles + numbers → Mona Sans Expanded; body stays Figtree (--font-sans).
   font-stretch:125% sets the WIDTH axis and still composes with font-weight. */
h1, h2, h3, h4,
.brand b, .nm, .role-name, .crit-num,
.card .value, .value, .pct, .load-pill, .dt-load, .promo .ring,
.eval-num, .scale-btn, .kid-count {
  font-family: var(--font-display);
  font-stretch: 125%;            /* Expanded */
}
.card .value, .pct, .load-pill, .dt-load, .eval-num, .scale-btn { font-variant-numeric: tabular-nums; }

/* ---- top bar ---- */
.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 22px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 20;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-logo { height: 30px; width: auto; display: block; flex: none; }
.brand-txt { display: flex; flex-direction: column; line-height: 1.1; }
.brand b { font-size: 16px; }
.brand span { font-size: 11px; color: var(--text-muted); }
.spacer { flex: 1; }

.control { display: inline-flex; align-items: center; gap: 6px; }
.seg { display: inline-flex; align-items: center; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 3px; height: 38px; box-sizing: border-box; }
.seg button {
  appearance: none; -webkit-appearance: none; border: 0; background: transparent; color: var(--text-muted);
  height: 30px; padding: 0 12px; border-radius: 7px; font: inherit; font-size: 13px; font-weight: 500;
  display: inline-flex; align-items: center; gap: 6px; cursor: pointer; white-space: nowrap;
}
.seg button:hover:not(.active) { color: var(--text); }
.seg button.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,.16); }
.seg .icn { flex: none; }
/* .btn IS the WBK button (secondary by default): Figtree, 14/600, radius-S (4), gap 4 */
.btn {
  appearance: none; -webkit-appearance: none; cursor: pointer;
  font-family: var(--font-sans); font-size: 14px; font-weight: 600;
  border: 1px solid var(--border); background: var(--surface-2); color: var(--text);
  height: 38px; padding: 0 12px; border-radius: var(--radius-sm); box-sizing: border-box;
  display: inline-flex; align-items: center; justify-content: center; gap: 4px; line-height: 1;
}
.btn:hover { border-color: var(--text-muted); }
.icn { vertical-align: middle; flex: none; }
.icon-btn { width: 38px; padding: 0; }
.btn.primary { background: var(--brand); color: var(--brand-contrast); border-color: transparent; position: relative; overflow: hidden; }
.btn.primary:hover { filter: brightness(1.05); }
/* premium light "sheen" sweep on the PRIMARY action only — on hover, not a constant loop */
.btn.primary::after {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(110deg, transparent 36%, rgba(255,255,255,.5) 50%, transparent 64%);
  transform: translateX(-160%);
}
.btn.primary:hover::after { transform: translateX(160%); transition: transform .6s cubic-bezier(.22,.61,.36,1); }
@media (prefers-reduced-motion: reduce) { .btn.primary::after { display: none; } }

main { padding: 22px; max-width: 1180px; margin: 0 auto; }

/* ---- app shell: top bar + collapsible drawer ---- */
.appbar {
  position: sticky; top: 0; z-index: 30; display: flex; align-items: center; gap: 12px;
  height: 54px; padding: 0 16px; background: var(--surface); border-bottom: 1px solid var(--border);
}
.appbar-toggle { flex: none; }
.appbar-toggle[aria-expanded="true"] { color: var(--brand); }
.appbar-brand {
  display: flex; flex-direction: column; align-items: flex-start; gap: 3px; line-height: 1;
  border: 0; background: transparent; cursor: pointer; padding: 4px 6px; border-radius: var(--radius-sm);
}
.appbar-brand:hover { background: var(--surface-2); }
.appbar-brand .brand-logo { height: 22px; width: auto; display: block; }
.brand-sub {
  font-family: var(--font-display, 'Mona Sans', sans-serif); font-stretch: 125%;
  font-size: 11px; font-weight: 500; letter-spacing: .16em; text-transform: uppercase;
  color: var(--text-muted);
}
.shell { display: flex; align-items: stretch; min-height: calc(100vh - 54px); position: relative; }
.shell main { flex: 1; min-width: 0; }
/* content column is a flex column so the signature footer is PINNED to the bottom:
   #view grows to fill, the footer lands after it. On a short page (e.g. My progress)
   this stops the bar floating mid-page — no dead space below it. */
.view-main { display: flex; flex-direction: column; }
.view-main > #view { flex: 1 0 auto; }
.view-main > #sig-bar { flex: none; margin-top: auto; }
.sidebar { background: var(--surface); overflow: hidden; }
.sb-wrap { display: flex; flex-direction: column; gap: 3px; padding: 16px 12px; overflow-y: auto; box-sizing: border-box; height: 100%; }
.sb-new { width: 100%; justify-content: center; margin-bottom: 12px; }
.sb-nav { display: flex; flex-direction: column; gap: 2px; }
.sb-nav .nav-item { width: 100%; justify-content: flex-start; }
.sb-nav .nav-item span { display: inline; }
.nav-backdrop { display: none; }

/* Desktop: the sidebar PUSHES the content (Claude-style), animating its width.
   Isolated app layout — the page itself doesn't scroll; the sidebar stays fixed
   and ONLY the main content scrolls independently. */
@media (min-width: 821px) {
  html, body { height: 100%; overflow: hidden; }
  .shell { height: calc(100vh - 54px); min-height: 0; }
  .shell main { height: 100%; overflow-y: auto; }
  .sidebar { flex: none; width: 264px; height: 100%; border-inline-end: 1px solid var(--border);
    transition: width .22s ease; will-change: width; }
  .sb-wrap { width: 264px; }
  body.nav-closed .sidebar { width: 0; border-inline-end-color: transparent; }
}

/* Mobile: the sidebar is an overlay drawer with a backdrop. */
@media (max-width: 820px) {
  .sidebar { position: fixed; top: 54px; bottom: 0; inset-inline-start: 0; width: 284px; max-width: 86vw;
    z-index: 25; border-inline-end: 1px solid var(--border);
    transform: translateX(-105%); transition: transform .22s ease; will-change: transform; }
  [dir="rtl"] .sidebar { transform: translateX(105%); }
  body:not(.nav-closed) .sidebar { transform: translateX(0); box-shadow: 0 0 40px rgba(0,0,0,.35); }
  .sb-wrap { width: 284px; max-width: 86vw; }
  .nav-backdrop { display: block; position: fixed; inset: 54px 0 0 0; background: rgba(0,0,0,.4);
    z-index: 20; opacity: 0; visibility: hidden; transition: opacity .2s ease; }
  body:not(.nav-closed) .nav-backdrop { opacity: 1; visibility: visible; }
}
@media (prefers-reduced-motion: reduce) { .sidebar, .nav-backdrop { transition: none; } }
@media (max-width: 560px) { .appbar-brand .brand-sub { display: none; } }

/* ---- metric cards ---- */
.metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow);
}
.card .label { font-size: 12px; color: var(--text-muted); }
.card .value { font-size: 30px; font-weight: 700; margin-top: 4px; }
.card .sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* ---- org chart ---- */
.org { display: flex; flex-direction: column; align-items: center; gap: 30px; }
.org-row { display: flex; justify-content: center; gap: 18px; flex-wrap: wrap; }
.node {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px 14px;
  width: 190px; text-align: center; box-shadow: var(--shadow);
  position: relative; cursor: pointer; transition: transform .12s ease;
}
.node:hover { transform: translateY(-2px); }
.node::before {
  content: ""; position: absolute; inset-inline-start: 0; top: 10px; bottom: 10px;
  width: 4px; border-radius: 4px; background: var(--node-accent, var(--border));
}
.avatar {
  width: 54px; height: 54px; border-radius: 50%; margin: 0 auto 8px;
  display: grid; place-items: center; font-weight: 700; color: var(--brand-contrast);
  background: var(--brand);
  box-shadow: 0 0 0 3px var(--node-accent, var(--border));
  overflow: hidden;
  flex: none; aspect-ratio: 1 / 1;   /* never squish in a flex column → always a circle */
}
.avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
.node .nm { font-weight: 600; font-size: 14px; }
.node .ttl { font-size: 11px; color: var(--text-muted); margin-top: 2px; min-height: 26px; }
.node .load-pill {
  display: inline-flex; align-items: center; gap: 6px; margin-top: 8px;
  font-size: 12px; padding: 3px 9px; border-radius: 999px;
  background: var(--surface-2); color: var(--text);
}
.dot { width: 9px; height: 9px; border-radius: 50%; background: var(--node-accent); }
.flame { position: absolute; top: 8px; inset-inline-end: 10px; line-height: 0; color: var(--state-overloaded); }

/* Employment / status chip — clear, scannable Full-time vs Freelance (+ open/joining) */
.emp {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 600; line-height: 1;
  padding: 3px 8px; border-radius: 999px; letter-spacing: .02em;
  border: 1px solid transparent; white-space: nowrap;
}
.tree .node .emp { margin: 2px auto 0; }              /* centered chip in tree cards */
.emp-ft   { background: var(--surface-2); color: var(--text-muted); }          /* Full-time: quiet/neutral */
.emp-free { background: var(--cat-freelance-bg); color: var(--cat-freelance); border-color: color-mix(in srgb, var(--cat-freelance) 30%, transparent); } /* Freelance: violet, stands out */
.emp-open { background: var(--surface-2); color: var(--text-muted); border-style: dashed; border-color: var(--border); } /* TBC open role */
.emp-join { background: var(--state-balanced-bg); color: var(--cat-joining); border-color: color-mix(in srgb, var(--state-balanced) 35%, transparent); } /* Joining soon */
[data-theme="dark"] .emp-join { color: var(--state-balanced); }
/* TBC node reads as a placeholder, not a person */
.node.is-tbc { border-style: dashed; opacity: .92; }
.node.is-tbc .avatar { background: var(--surface-2); color: var(--text-muted); box-shadow: 0 0 0 3px var(--border); font-size: 12px; }
.legend-sep { width: 1px; align-self: stretch; background: var(--border); margin: 0 2px; }

/* Account handled — which event/account this person owns (primary + "+N", full list on hover) */
.acctline {
  display: inline-flex; align-items: center; gap: 5px; max-width: 100%;
  margin: 6px auto 0; padding: 3px 9px; border-radius: 999px;
  background: var(--surface-2); font-size: 11px; color: var(--text);
}
.acctline-dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
.acctline-nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }
.acctline-more { color: var(--text-muted); font-weight: 600; flex: none; }
.acctline-none { background: transparent; color: var(--text-muted); font-style: italic; padding-inline: 0; }
.lr-acctline { min-width: 150px; }
.lr-acctline .acctline { margin: 0; }

/* Segmented load bar — load % split into the accounts that fill it (hover = full breakdown) */
.loadbar { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: default; }
.loadbar-track {
  width: 100%; height: 7px; border-radius: 999px; overflow: hidden;
  background: var(--surface-2); display: flex; gap: 1px;
}
.loadbar-track i { height: 100%; display: block; min-width: 2px; }
.loadbar-pct {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12.5px; font-weight: 600; font-variant-numeric: tabular-nums;
}
.loadbar-pct .dot { width: 8px; height: 8px; background: currentColor; }
.row .loadbar { width: 120px; }            /* compact in list rows */

/* ---- map toolbar ---- */
/* unified command bar — one zone: view+time+date (left) · search+team (right) */
.controlbar { display: flex; flex-wrap: wrap; align-items: center; gap: 12px 16px; margin-bottom: 16px; }
.controlbar .toolbar, .controlbar .map-filters { margin: 0; }
.toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 16px; }
/* workload search + team focus — side-by-side; wraps as a unit when cramped (never crush the input) */
.map-filters { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; margin-bottom: 14px; }
.search { position: relative; display: inline-flex; align-items: center; flex: 1 1 200px; min-width: 170px; max-width: 280px; }
.map-filters .scope { flex: none; }
.search > .icn { position: absolute; inset-inline-start: 11px; color: var(--text-muted); pointer-events: none; }
.search input { width: 100%; height: 38px; box-sizing: border-box; padding: 0 12px; padding-inline-start: 34px; font-size: 14px;
  border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface-2); color: var(--text); }
.search input:focus-visible { outline: 2px solid var(--brand); outline-offset: 1px; }
.search-clear { position: absolute; inset-inline-end: 6px; border: 0; background: transparent; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 6px; }
.search-clear:hover { background: var(--surface); color: var(--text); }
/* team-focus control — custom themed listbox (matches the app, unlike native select popups) */
.scope { position: relative; display: inline-flex; }
.scope-btn { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font: inherit; font-size: 13px;
  border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); color: var(--text);
  height: 38px; box-sizing: border-box; padding: 0 10px 0 12px; transition: border-color .15s ease, color .15s ease; }
.scope-btn:hover { border-color: var(--text-muted); }
.scope-btn .icn { flex: none; color: var(--text-muted); }
.scope-label { min-width: 92px; text-align: start; }
.scope-caret { color: var(--text-muted); display: inline-flex; transition: transform .18s ease; }
.scope.open .scope-caret { transform: rotate(180deg); }
.scope.active .scope-btn { border-color: var(--brand); color: var(--brand); }
.scope.active .scope-btn .icn, .scope.active .scope-caret { color: var(--brand); }

.scope-menu { position: absolute; top: calc(100% + 6px); inset-inline-start: 0; min-width: 230px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: 0 14px 34px rgba(0,0,0,.2); padding: 6px; z-index: 40; max-height: 320px; overflow-y: auto;
  opacity: 0; visibility: hidden; transform: translateY(-6px) scale(.98); transform-origin: top;
  transition: opacity .16s ease, transform .16s cubic-bezier(.22,.61,.36,1), visibility .16s; }
.scope.open .scope-menu { opacity: 1; visibility: visible; transform: none; }
.scope-opt { display: flex; align-items: center; gap: 10px; padding: 7px 9px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 13.5px; }
.scope-opt:hover, .scope-opt:focus { background: var(--surface-2); outline: none; }
.scope-opt.selected { font-weight: 600; }
.scope-opt .avatar { width: 26px; height: 26px; margin: 0; }
.scope-allicon { width: 26px; height: 26px; border-radius: 50%; background: var(--surface-2); display: grid; place-items: center; color: var(--text-muted); flex: none; }
.scope-opt-nm { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.scope-check { color: var(--brand); display: inline-flex; flex: none; }
.scope-group { font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase;
  color: var(--text-muted); padding: 9px 10px 4px; }
.scope-group:first-child { padding-top: 4px; }

/* ============================================================
 * Quiet command bar (Linear/Vercel style) — calm, borderless,
 * soft-surface control groups; one cohesive 36px row.
 * ============================================================ */
.controlbar { gap: 10px 14px; }
/* segmented controls — soft track, no hard border, subtle active pill */
.controlbar .seg { height: 36px; border: 0; background: var(--surface-2); padding: 4px; gap: 2px; }
.controlbar .seg button { height: 28px; padding: 0 13px; color: var(--text-muted); font-weight: 500; }
.controlbar .seg button:hover:not(.active) { color: var(--text); background: transparent; }
.controlbar .seg button.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 2px rgba(0,0,0,.18); }
/* live indicator — shows the board auto-refreshes (every 10s) */
.live-ind { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
.live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--state-positive); flex: none; animation: livepulse 2.4s ease-out infinite; }
@keyframes livepulse {
  0%   { box-shadow: 0 0 0 0 rgba(22,163,74,.5); }
  70%  { box-shadow: 0 0 0 6px rgba(22,163,74,0); }
  100% { box-shadow: 0 0 0 0 rgba(22,163,74,0); }
}
@media (prefers-reduced-motion: reduce) { .live-dot { animation: none; } }
/* date navigator — one tidy pill: Today · ‹ · label · › */
.datenav { height: 36px; gap: 2px; padding: 4px; background: var(--surface-2); border-radius: var(--radius-sm); box-sizing: border-box; }
.datenav .btn { height: 28px; border: 0; background: transparent; padding: 0 10px; color: var(--text-muted); }
.datenav .btn:hover { background: var(--surface); color: var(--text); border-color: transparent; }
.datenav .icon-btn { width: 28px; }
.datenav-label { min-width: 92px; padding: 0 6px; font-size: 14px; font-weight: 600; color: var(--text); display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
.datenav-label.is-today { color: var(--brand); }
.today-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--brand); flex: none; }
/* State A — anchored on now: Today is passive (muted, no fill, not interactive) */
.datenav-today.is-current { color: var(--text-muted); opacity: .65; background: transparent; cursor: default; }
.datenav-today.is-current:hover { background: transparent; }
/* State B — navigated away: Today is an actionable "jump back" command (text + arrow, no fill) */
.datenav-today.is-away { color: var(--brand); background: transparent; font-weight: 600; gap: 4px; padding: 0 8px; }
.datenav-today.is-away .icn { color: var(--brand); }
.datenav-today.is-away:hover { background: var(--brand-soft, rgba(255,44,121,.12)); }
/* search + team — soft filled, border appears only on hover/focus */
.search input { height: 36px; background: var(--surface-2); border-color: transparent; }
.search input:hover { border-color: var(--border); }
.search input:focus-visible { background: var(--surface); outline: 2px solid var(--brand); outline-offset: 1px; }
.scope-btn { height: 36px; background: var(--surface-2); border-color: transparent; }
.scope-btn:hover { background: var(--surface); border-color: var(--border); }
.scope.active .scope-btn { background: var(--brand-soft, rgba(255,44,121,.12)); border-color: transparent; }
@media (prefers-reduced-motion: reduce) { .scope-menu, .scope-caret { transition: none; } }
.map-empty { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 40px; color: var(--text-muted); }

/* provenance — honest "sample data" label so mock KPIs never read as live truth */
.provenance-note { display: inline-flex; align-items: center; gap: 6px; margin: 0 0 10px;
  font-size: 11.5px; font-weight: 600; color: var(--state-near);
  background: var(--state-near-bg); border: 1px solid rgba(246,177,0,.3);
  border-radius: 999px; padding: 4px 10px; }
.provenance-note .icn { flex: none; }

/* ---- WP.db sync status (loading / offline-fallback / subtle success) ---- */
.sync-note { display: inline-flex; align-items: center; gap: 6px; margin: 0 0 12px;
  font-size: 11.5px; font-weight: 600; border-radius: 999px; padding: 4px 10px;
  border: 1px solid transparent; }
.sync-note .icn { flex: none; }
.sync-note.loading { color: var(--text-muted); background: var(--surface-2, rgba(127,127,127,.10));
  border-color: rgba(127,127,127,.25); }
.sync-note.offline { color: var(--state-near);
  background: var(--state-near-bg); border-color: rgba(246,177,0,.3); }
.sync-note.synced { color: var(--state-available);
  background: var(--state-available-bg, rgba(26,143,90,.12)); border-color: rgba(26,143,90,.25); }

/* ---- mandatory evaluation banner (persists across pages until reviews are done) ---- */
#eval-banner:empty { display: none; }
.eval-banner[hidden] { display: none; }
/* static (not sticky) + OPAQUE background so scrolling content never bleeds through it */
.eval-banner { margin: 0 0 14px; border-radius: var(--radius-sm); border: 1px solid rgba(255,44,121,.35);
  background: rgb(252,231,239);
  background: color-mix(in srgb, var(--brand) 12%, var(--surface)); }
.eval-banner.is-overdue { border-color: var(--state-overloaded);
  background: rgb(253,232,236);
  background: color-mix(in srgb, var(--state-overloaded) 14%, var(--surface)); }
.eval-banner .eb-in { display: flex; align-items: center; gap: 10px; padding: 10px 14px; }
.eval-banner .icn { flex: none; color: var(--brand); }
.eval-banner.is-overdue .icn { color: var(--state-overloaded); }
.eval-banner .eb-msg { flex: 1; min-width: 0; font-size: 13.5px; color: var(--text); }
.eval-banner .eb-msg b { font-weight: 600; }
.eval-banner .eb-cta { flex: none; height: 32px; padding: 0 14px; }
.eval-banner.is-overdue .eb-cta { background: var(--state-overloaded); border-color: transparent; }
@media (max-width: 600px) { .eval-banner .eb-msg { font-size: 12.5px; } .eval-banner .eb-cta { padding: 0 10px; } }

/* predictive search (typeahead) — functional, accessible, animated */
.search input:placeholder-shown ~ .search-clear { display: none; }
.predict {
  position: absolute; top: calc(100% + 6px); inset-inline-start: 0; width: 100%; min-width: 240px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: 0 14px 34px rgba(0,0,0,.20); padding: 6px; z-index: 40;
  opacity: 0; visibility: hidden; transform: translateY(-6px) scale(.98); transform-origin: top center;
  transition: opacity .18s ease, transform .18s cubic-bezier(.22,.61,.36,1), visibility .18s;
}
.predict.open { opacity: 1; visibility: visible; transform: translateY(0) scale(1); }
.predict-row {
  display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: var(--radius-sm); cursor: pointer;
  opacity: 0; animation: predIn .26s cubic-bezier(.22,.61,.36,1) forwards; animation-delay: calc(var(--i, 0) * 34ms);
}
.predict-row .avatar { width: 30px; height: 30px; margin: 0; }
.predict-meta { flex: 1; min-width: 0; display: flex; flex-direction: column; line-height: 1.25; }
.predict-meta .nm { font-size: 13.5px; font-weight: 600; }
.predict-meta .ttl { font-size: 12px; color: var(--text-muted); }
.predict-row mark { background: var(--brand-soft, rgba(255,44,121,.18)); color: inherit; border-radius: 3px; padding: 0 1px; }
.predict-load { font-family: var(--font-display, sans-serif); font-stretch: 125%; font-size: 13px; font-variant-numeric: tabular-nums; }
.predict-row.active, .predict-row:hover { background: var(--surface-2); }
.predict-row.active { box-shadow: inset 0 0 0 1px var(--border); }
.predict-empty { padding: 14px; text-align: center; color: var(--text-muted); font-size: 13px; }
@keyframes predIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@media (prefers-reduced-motion: reduce) {
  .predict, .predict-row { transition: none; animation: none; opacity: 1; transform: none; }
}

/* ---- compact toolbar dropdowns (View · Period) ---- */
.dd { position: relative; display: inline-flex; }
.dd-btn { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font: inherit; font-size: 13px;
  height: 36px; box-sizing: border-box; padding: 0 10px 0 12px; border: 1px solid transparent; border-radius: var(--radius-sm);
  background: var(--surface-2); color: var(--text); transition: background .15s ease, border-color .15s ease; }
.dd-btn:hover { background: var(--surface); border-color: var(--border); }
.dd-btn .icn { flex: none; color: var(--text-muted); }
.dd-label { min-width: 48px; text-align: start; font-weight: 500; }
.dd-caret { color: var(--text-muted); display: inline-flex; transition: transform .18s ease; }
.dd.open .dd-caret { transform: rotate(180deg); }
.dd.open .dd-btn { background: var(--surface); border-color: var(--border); }
.dd-menu { position: absolute; top: calc(100% + 6px); inset-inline-start: 0; min-width: 180px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: 0 14px 34px rgba(0,0,0,.2); padding: 6px; z-index: 40;
  opacity: 0; visibility: hidden; transform: translateY(-6px) scale(.98); transform-origin: top;
  transition: opacity .16s ease, transform .16s cubic-bezier(.22,.61,.36,1), visibility .16s; }
.dd.open .dd-menu { opacity: 1; visibility: visible; transform: none; }
.dd-opt { display: flex; align-items: center; gap: 10px; padding: 8px 9px; border-radius: var(--radius-sm); cursor: pointer; font-size: 13.5px; }
.dd-opt:hover, .dd-opt:focus { background: var(--surface-2); outline: none; }
.dd-opt.selected { font-weight: 600; }
.dd-opt .icn { color: var(--text-muted); flex: none; }
.dd-opt-nm { flex: 1; }
.dd-check { color: var(--brand); display: inline-flex; flex: none; }
@media (prefers-reduced-motion: reduce) { .dd-menu, .dd-caret { transition: none; } }

/* ---- unified Find (people + teams in one control) ---- */
.finder { position: relative; display: inline-flex; align-items: center; gap: 8px; flex: 1 1 240px; min-width: 200px; max-width: 380px; }
.finder .finder-input { flex: 1 1 auto; max-width: none; min-width: 0; }
.scope-chip { display: inline-flex; align-items: center; gap: 6px; flex: none; cursor: pointer; font: inherit; font-size: 12.5px; font-weight: 600;
  height: 36px; box-sizing: border-box; padding: 0 8px 0 10px; border: 1px solid transparent; border-radius: 999px;
  background: var(--brand-soft, rgba(255,44,121,.12)); color: var(--brand); transition: background .15s ease; }
.scope-chip .icn { flex: none; }
.scope-chip:hover { background: var(--brand-soft, rgba(255,44,121,.22)); }
.scope-chip span { max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
/* result rows: group labels, team rows, and the per-person team chip */
.predict-group { font-size: 11px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: var(--text-muted); padding: 9px 10px 4px; }
.predict-group:first-child { padding-top: 4px; }
.pr-ico { width: 30px; height: 30px; border-radius: 50%; background: var(--surface-2); display: grid; place-items: center; color: var(--text-muted); flex: none; }
.pr-go { font-size: 11px; font-weight: 600; color: var(--brand); flex: none; opacity: 0; transition: opacity .12s ease; }
.predict-row.pr-team:hover .pr-go, .predict-row.pr-team.active .pr-go { opacity: 1; }
.pr-teamchip { display: inline-flex; align-items: center; gap: 3px; border: 1px solid var(--border); background: var(--surface-2); color: var(--text-muted);
  border-radius: 999px; padding: 1px 7px; font: inherit; font-size: 11px; font-weight: 600; cursor: pointer; vertical-align: -1px; }
.pr-teamchip:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-soft, rgba(255,44,121,.10)); }
.pr-teamchip .icn { flex: none; }
.pr-teamself { font-size: 11px; font-weight: 600; color: var(--text-muted); }

.period { display: inline-flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.seg-label { font-size: 12px; color: var(--text-muted); }
.datenav { display: inline-flex; align-items: center; gap: 4px; }
@media (max-width: 760px) { .toolbar .datenav { width: 100%; justify-content: flex-start; } }
.datenav-today { font-size: 13px; }
.datenav-label { min-width: 150px; text-align: center; font-weight: 600; font-size: 14px; font-variant-numeric: tabular-nums; }
[dir="rtl"] .datenav .icon-btn .icn { transform: scaleX(-1); } /* flip only prev/next; Today arrow is chosen explicitly */

/* ---- legend (capacity states) ---- */
.legend { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 16px; padding: 8px 0; }
.legend-item { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
.legend-item .dot { width: 10px; height: 10px; }
.legend-item em { font-style: normal; opacity: .7; }

/* ---- org TREE (top-down node-link, fits-to-width) ---- */
/* fill the canvas: a small/collapsed chart centers in the viewport instead of
   stranding in the corner; a large chart grows and scrolls from the start */
.tree-scroll {
  overflow-x: auto; text-align: center; padding: 4px 0 12px; cursor: grab;
  min-height: max(380px, calc(100vh - 270px));
  display: flex; align-items: center; justify-content: safe center;
}
.tree-scroll.panning { cursor: grabbing; }                       /* active pan = closed fist */
.tree-scroll.panning, .tree-scroll.panning * { cursor: grabbing !important; user-select: none; }

/* team section labels — name + separate each branch under the Operations Director */
.team-branch { text-align: center; padding-inline: 8px; }        /* tighter gap between teams = less wasted space */
.team-tag {
  display: inline-block; margin: 0 auto 12px; padding: 5px 14px;
  font-family: var(--font-display, sans-serif); font-stretch: 125%;
  font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
  color: var(--text); background: var(--surface-2);
  border: 1px solid var(--border); border-radius: 999px; white-space: nowrap;
  box-shadow: var(--shadow);
}
.tree-fit { display: inline-block; transform-origin: top center; transition: transform .15s ease; }
.tree, .tree ul { position: relative; white-space: nowrap; margin: 0; padding: 0; list-style: none; }
.tree ul { padding-top: 20px; }
.tree li {
  display: inline-block; vertical-align: top; position: relative;
  padding: 20px 3px 0 3px;
}
/* every card has the same width; height grows to fit content with even rhythm.
   Compact: smaller footprint so a multi-team view fits with less wasted space. */
.tree .node {
  white-space: normal; text-align: center; box-sizing: border-box;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  width: 150px; padding: 11px 11px 15px; margin: 0 auto;
}
.tree .node .avatar { width: 42px; height: 42px; margin: 0 0 1px; }
/* manager cards expand on click → make that obvious */
.tree .node.has-kids { cursor: pointer; }
.tree .node.has-kids:hover { border-color: var(--brand); }
/* avatar is the dedicated "open profile" target */
.node-ava { display: inline-block; border-radius: 50%; line-height: 0; }
.tree .node.has-kids .node-ava { cursor: pointer; }
.tree .node.has-kids .node-ava:hover .avatar { box-shadow: 0 0 0 3px var(--brand); }
.node-ava:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; border-radius: 50%; }
/* corner tag (freelance / open / joining) — marks only the exception, full-time is unmarked */
.node-corner {
  position: absolute; top: 8px; inset-inline-start: 12px;
  font-size: 9px; font-weight: 700; letter-spacing: .02em; line-height: 1;
  padding: 3px 7px; border-radius: 999px; border: 1px solid transparent; white-space: nowrap;
}
.nc-free { background: var(--cat-freelance-bg); color: var(--cat-freelance); border-color: color-mix(in srgb, var(--cat-freelance) 32%, transparent); }
.nc-open { background: var(--surface-2); color: var(--text-muted); border-style: dashed; border-color: var(--border); }
.nc-join { background: var(--state-balanced-bg); color: var(--cat-joining); border-color: color-mix(in srgb, var(--state-balanced) 35%, transparent); }
[data-theme="dark"] .nc-join { color: var(--state-balanced); }
/* status line — clean Full-time vs Freelance signal: colored dot + quiet label, one line */
.statusline {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10.5px; font-weight: 600; line-height: 1; color: var(--text-muted); white-space: nowrap;
}
.statusline .sl-dot { width: 7px; height: 7px; border-radius: 50%; flex: none; background: currentColor; }
.sl-ft   .sl-dot { background: var(--state-positive); }                 /* Full-time → on the team (green) */
.sl-free { color: var(--cat-freelance); }                              /* Freelance → violet label + dot */
.sl-open { color: var(--text-muted); }
.sl-open .sl-dot { background: var(--text-muted); }
.sl-join { color: var(--cat-joining); }
.sl-join .sl-dot { background: var(--state-balanced); }
[data-theme="dark"] .sl-join { color: var(--state-balanced); }
.tree .node .nm {
  font-size: 13.5px; width: 100%; margin: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tree .node .ttl {
  font-size: 10.5px; width: 100%; min-height: 26px; line-height: 13px; overflow: hidden; margin: 0;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.tree .node .emp { margin: 0; }
.tree .node .acctline { margin: 0; }
.tree .node .loadbar { margin-top: 2px; }
.node-caret {
  position: absolute; bottom: -14px; inset-inline-start: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  font-size: 12px; font-weight: 600; border-radius: 999px; padding: 4px 12px; line-height: 1;
  z-index: 5; cursor: pointer; display: inline-flex; align-items: center; gap: 4px;
  min-width: 40px; justify-content: center; box-shadow: var(--shadow); white-space: nowrap;
}
[dir="rtl"] .node-caret { transform: translateX(50%); }
/* crisp CSS chevron (no font glyph) — points up when expanded, down when collapsed */
.node-caret .chev {
  width: 6px; height: 6px; display: inline-block; margin-top: 3px;
  border-right: 2px solid var(--brand); border-bottom: 2px solid var(--brand);
  transform: rotate(-135deg);
}
.node-caret.is-col .chev { transform: rotate(45deg); margin-top: -1px; }
.node-caret:hover { border-color: var(--brand); background: var(--surface-2); }
.node-caret:active { transform: translateX(-50%) scale(.94); }
[dir="rtl"] .node-caret:active { transform: translateX(50%) scale(.94); }
/* connector lines — the visible link between a card and its reports */
.tree { --node-line: var(--tree-line); }
.tree li::before, .tree li::after {
  content: ''; position: absolute; top: 0; right: 50%;
  border-top: 2px solid var(--node-line); width: 50%; height: 20px;
}
.tree li::after { right: auto; left: 50%; border-left: 2px solid var(--node-line); }
/* single child: drop the horizontal half-bus but keep a SHORT vertical link
   (shows the relationship without a long dangling line) */
.tree li:only-child::before { display: none; }
.tree li:only-child::after { display: block; left: 50%; right: auto; height: 20px; }
.tree li:only-child { padding-top: 20px; }
.tree > li:only-child { padding-top: 0; }
.tree > li:only-child::after { display: none; }   /* the root has nothing above it */
.tree li:first-child::before, .tree li:last-child::after { border: 0 none; }
.tree li:last-child::before { border-inline-end: 2px solid var(--node-line); }
.tree ul ul::before {
  content: ''; position: absolute; top: 0; left: 50%;
  border-inline-start: 2px solid var(--node-line); width: 0; height: 20px;
}
.tree > li::before, .tree > li::after { display: none; }

/* ---- list view ---- */
.list { display: flex; flex-direction: column; gap: 8px; }
.row {
  display: flex; align-items: center; gap: 12px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 14px; cursor: pointer;
}
.row .bar { flex: 1; height: 8px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
.row .bar > i { display: block; height: 100%; background: var(--node-accent); }

/* ---- role dashboard ---- */
.dash-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
.dash-row:last-child { border-bottom: 0; }
.dash-row:hover { background: var(--surface-2); }
.dash-row .avatar { width: 36px; height: 36px; margin: 0; }
.dash-meta { flex: 1; min-width: 0; }
.dash-meta .nm { font-weight: 600; font-size: 14px; }
.dash-meta .ttl { font-size: 12px; color: var(--text-muted); }
.dash-pct { font-family: var(--font-display); font-stretch: 125%; font-variant-numeric: tabular-nums; font-size: 14px; flex: none; }
.lr { display: flex; align-items: center; gap: 11px; padding: 8px 0; }
.lr .nm { width: 130px; flex: none; font-size: 13px; }
.lr .nm .ttl { color: var(--text-muted); }
.lr .bar { flex: 1; min-width: 0; height: 8px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
.lr .bar > i { display: block; height: 100%; }
.row .pct { width: 46px; text-align: end; font-variant-numeric: tabular-nums; font-weight: 600; }

/* ---- popover / drawer ---- */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 40; display: grid; place-items: center; }
.popover { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; width: 340px; box-shadow: var(--shadow); position: relative; }
.popover-close { position: absolute; top: 10px; inset-inline-end: 10px; border: 0; background: var(--surface-2); color: var(--text-muted); width: 26px; height: 26px; border-radius: 50%; font-size: 13px; }
.popover-close:hover { color: var(--text); }
.drawer { position: fixed; top: 0; inset-inline-end: 0; height: 100%; width: 380px; background: var(--surface); border-inline-start: 1px solid var(--border); padding: 20px; overflow:auto; box-shadow: var(--shadow); }
.req-l { display: block; font-size: 12px; color: var(--text-muted); margin: 12px 0 4px; }
.req-i { width: 100%; box-sizing: border-box; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 9px 10px; font-family: inherit; font-size: 14px; }

/* ---- profile ---- */
.profile-head { display: flex; align-items: center; gap: 16px; margin-bottom: 18px; }
.profile-head .avatar { margin: 0; width: 64px; height: 64px; }
.section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; box-shadow: var(--shadow); }
/* two-column profile on wide screens → far less scrolling */
.profile-body { column-count: 2; column-gap: 14px; }
.profile-body > .section { break-inside: avoid; }
@media (max-width: 760px) { .profile-body { column-count: 1; } }
.section h3 { margin: 0 0 10px; font-size: 14px; }
.proj { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); }
.proj:last-child { border-bottom: 0; }
.tier-chip { font-size: 11px; padding: 2px 8px; border-radius: 999px; color: var(--brand-contrast); }
.kv { display: grid; grid-template-columns: 90px 1fr; gap: 4px 10px; font-size: 13px; }
.kv .k { color: var(--text-muted); }
.tag { display:inline-block; background: var(--surface-2); border-radius: 999px; padding: 3px 10px; font-size: 12px; margin: 0 4px 4px 0; }
.provenance { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--text-muted); background: var(--surface-2); border-radius: var(--radius-sm); padding: 8px 12px; margin-bottom: 14px; }
.provenance em { font-style: normal; color: var(--state-near); }

.warn-banner { background: var(--state-near-bg); border: 1px solid var(--state-near); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13px; margin-bottom: 14px; }

/* ---- growth / skills / reviews ---- */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.disclaimer { font-size: 11px; color: var(--text-muted); margin-top: 8px; font-style: italic; }
.mini-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; }

.promo { display: flex; align-items: center; gap: 14px; }
.promo .ring { width: 64px; height: 64px; border-radius: 50%; display: grid; place-items: center; font-weight: 700; font-size: 18px; }

.skill { display: grid; grid-template-columns: 130px 1fr 44px; gap: 10px; align-items: center; padding: 6px 0; }
.skill .nm2 { font-size: 13px; }
.skill .track { position: relative; height: 8px; background: var(--surface-2); border-radius: 999px; }
.skill .track > i { position: absolute; inset-inline-start: 0; top: 0; height: 100%; border-radius: 999px; background: var(--brand); }
.skill .req { position: absolute; top: -3px; width: 2px; height: 14px; background: var(--text-muted); }
.skill .trend { font-size: 12px; text-align: end; font-variant-numeric: tabular-nums; }
.trend-up { color: var(--state-available); }
.trend-down { color: var(--state-overloaded); }
.chip-type { font-size: 10px; padding: 1px 6px; border-radius: 999px; background: var(--surface-2); color: var(--text-muted); margin-inline-start: 6px; }

.eq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
.eq-grid .eq-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.eq-grid .eq-bar { flex: 1; height: 6px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
.eq-grid .eq-bar > i { display: block; height: 100%; background: var(--brand); }

.rating { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 999px; font-weight: 600; }
.rating.Exceeds { background: var(--state-available-bg); color: var(--state-available); }
.rating.Meets { background: var(--surface-2); color: var(--text-muted); }
.rating.Developing { background: var(--state-near-bg); color: var(--state-near); }

/* ---- daily tasks ---- */
.dt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.dt-card { background: var(--surface); border: 1px solid var(--border); border-inline-start: 4px solid var(--node-accent); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); cursor: pointer; }
.dt-card:hover { background: var(--surface-2); }
.dt-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.dt-head .avatar { width: 38px; height: 38px; }
.dt-load { font-weight: 700; font-variant-numeric: tabular-nums; }
.dt-row { display: grid; grid-template-columns: 88px 1fr; gap: 8px; font-size: 13px; padding: 3px 0; }
.dt-k { color: var(--text-muted); }
.dt-flag { margin-top: 8px; font-size: 12px; padding: 5px 8px; border-radius: var(--radius-sm); }
.dt-flag.risk { background: var(--state-overloaded-bg); color: var(--state-overloaded); }
.dt-flag.ok { background: var(--state-available-bg); color: var(--state-available); }

/* compact "smart cards" + overview summary (reduced cognitive load) */
.dt-grid { grid-template-columns: repeat(auto-fill, minmax(228px, 1fr)); }
.dt-card { padding: 12px 13px; }
.dt-top { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; }
.dt-top .avatar { width: 34px; height: 34px; }
.dt-id { flex: 1; min-width: 0; }
.dt-id .nm { font-weight: 600; font-size: 13.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dt-id .ttl { font-size: 11.5px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dt-done { display: flex; gap: 6px; align-items: flex-start; font-size: 13px; line-height: 1.45; }
.dt-done .icn { color: var(--state-available); flex: none; margin-top: 2px; }
.dt-done span { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.dt-done.none { color: var(--text-muted); font-style: italic; }
.dt-chips { display: flex; gap: 6px; margin-top: 10px; }
.dt-chip { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 7px; }
.dt-chip.risk { background: var(--state-overloaded-bg); color: var(--state-overloaded); }
.dt-chip.ok { background: var(--state-available-bg); color: var(--state-available); }
.dt-chip.mut { background: var(--surface-2); color: var(--text-muted); }
.dt-summary { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
.dt-stat { display: inline-flex; align-items: center; gap: 7px; background: var(--surface-2); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 13px; color: var(--text-muted); }
.dt-stat b { font-family: var(--font-display, sans-serif); font-stretch: 125%; font-size: 16px; color: var(--text); }
.dt-stat.risk .icn { color: var(--state-overloaded); }
.dt-stat.ok .icn { color: var(--state-available); }

.set-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.set-row:last-child { border-bottom: 0; }
.set-row label { flex: 1; }
.set-row input { width: 70px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 6px 8px; font-family: inherit; }
.role-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; }
.role-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; }
.role-name { font-weight: 700; font-size: 15px; }
.role-list { margin: 4px 0 0; padding-inline-start: 16px; font-size: 12.5px; line-height: 1.5; }
.role-list li { margin-bottom: 3px; }
.role-only { margin-top: 10px; font-size: 12px; color: var(--state-near); border-top: 1px solid var(--border); padding-top: 8px; }

/* permissions management */
.perm-list { display: flex; flex-direction: column; }
.perm-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.perm-row:last-child { border-bottom: 0; }
.perm-row .avatar { width: 34px; height: 34px; }
.perm-meta { flex: 1; min-width: 0; }
.perm-sees { flex: 1; text-align: end; }
.perm-row select { min-width: 130px; }
@media (max-width: 640px) { .perm-sees { display: none; } }

/* performance evaluation */
.eval-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
.eval-score { text-align: end; }
.eval-num { font-family: var(--font-display); font-stretch: 125%; font-size: 34px; font-weight: 700; line-height: 1; }
.eval-num span { font-size: 16px; color: var(--text-muted); }
.crit-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 9px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.crit-row:last-child { border-bottom: 0; }
.crit-name { font-size: 14px; flex: 1; min-width: 180px; }
.crit-num { color: var(--text-muted); font-variant-numeric: tabular-nums; }
.crit-w { color: var(--text-muted); font-size: 12px; margin-inline-start: 8px; }
.scale { display: inline-flex; gap: 6px; }
.scale-btn { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-weight: 600; }
.scale-btn:hover { border-color: var(--brand); }
.scale-btn.on { background: var(--brand); color: var(--brand-contrast); border-color: transparent; }
.eval-q { margin-bottom: 14px; }
.eval-ta { width: 100%; box-sizing: border-box; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 8px 10px; font-family: inherit; font-size: 13px; resize: vertical; }
.self-badge { margin-inline-start: 8px; font-size: 12px; background: var(--surface-2); color: var(--text-muted); border-radius: 999px; padding: 1px 8px; }

/* My Progress (employee home) */
.me-hi { font-family: var(--font-display); font-stretch: 125%; font-size: 26px; font-weight: 700; }
.me-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 4px; }
.me-tile { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
.me-big { font-family: var(--font-display); font-stretch: 125%; font-size: 30px; font-weight: 700; line-height: 1.1; }
.me-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; }
.done-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.done-item:last-child { border-bottom: 0; }
.done-tick { color: var(--state-available); font-weight: 700; }
.kudo { background: var(--surface-2); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; font-size: 14px; }
.kudo-from { font-weight: 600; font-size: 12px; color: var(--brand); margin-bottom: 2px; }

/* evaluations hub */
.task-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 14px; }
.task-row:last-child { border-bottom: 0; }
.task-row:hover { color: var(--brand); }
.ev-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
.ev-row:last-child { border-bottom: 0; }
.ev-row:hover { background: var(--surface-2); }
.ev-row .avatar { width: 34px; height: 34px; }
.ev-meta { flex: 1; min-width: 0; }
.ev-status { flex: none; }

/* ---- Evidence Timeline (Intelligence Layer P1) ---- */
.tl-filters { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin: 10px 0 12px; }
.tl-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }
.tl-chip { font-size: 11.5px; font-weight: 600; border-radius: 999px; padding: 3px 10px;
  border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; }
.tl-chip.on { background: var(--brand); color: var(--brand-contrast); border-color: var(--brand); }
.tl-row { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.tl-row:last-child { border-bottom: 0; }
.tl-row.tl-growth { border-inline-start: 3px solid var(--state-available); padding-inline-start: 9px; }
.tl-cat { flex: none; align-self: flex-start; display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700; border-radius: 999px; padding: 3px 8px;
  background: var(--surface-2, rgba(127,127,127,.10)); color: var(--text-muted); border: 1px solid var(--border); }
.tl-cat .icn { flex: none; }
.tl-body { min-width: 0; }
.tl-desc { font-size: 13.5px; color: var(--text); line-height: 1.5; }
.tl-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

/* ---- Wellbeing Early-Warning (support view, manager-scoped) ---- */
.wb-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
.wb-row:last-child { border-bottom: 0; }
.wb-person { display: flex; align-items: center; gap: 10px; }
.wb-person .avatar { width: 34px; height: 34px; flex: none; }
.wb-meta { flex: 1; min-width: 0; }
.wb-factors { margin: 8px 0 6px; padding-inline-start: 20px; color: var(--text); font-size: 13px; line-height: 1.6; }
.wb-action { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
.wb-action .icn { flex: none; color: var(--state-available); }
/* band chip = icon + label + colour together (never colour as the only cue — WCAG 2.2) */
.wb-chip { flex: none; display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 700;
  border-radius: 999px; padding: 3px 9px; border: 1px solid transparent; }
.wb-chip .icn { flex: none; }
.wb-watch    { color: var(--state-near); background: var(--state-near-bg); border-color: color-mix(in srgb, var(--state-near) 32%, transparent); }
.wb-atrisk   { color: var(--state-watch); background: var(--state-watch-bg); border-color: color-mix(in srgb, var(--state-watch) 34%, transparent); }
.wb-critical { color: var(--state-over); background: var(--state-over-bg); border-color: color-mix(in srgb, var(--state-over) 34%, transparent); }

/* ===== Fairness / Overload Radar (Builder B) — reuses the wb-chip pattern ===== */
.fr-team { padding: 14px 0; border-bottom: 1px solid var(--border); }
.fr-team:last-child { border-bottom: 0; }
.fr-team-head { display: flex; align-items: center; gap: 10px; }
.fr-team-head .avatar { width: 34px; height: 34px; flex: none; }
.fr-team-meta { flex: 1; min-width: 0; }
.fr-team-meta .nm { font-weight: 600; font-size: 14px; }
.fr-factors { margin: 8px 0 6px; padding-inline-start: 20px; color: var(--text); font-size: 13px; line-height: 1.6; }
.fr-action { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
.fr-action .icn { flex: none; color: var(--state-available); }
.fr-nodata { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
.fr-nodata .icn { flex: none; }
.fr-flagged-n { font-weight: 400; color: var(--text-muted); font-size: 12px; }
/* band chip = icon + label + colour together (never colour as the only cue — WCAG 2.2) */
.fr-chip { flex: none; display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 700;
  border-radius: 999px; padding: 3px 9px; border: 1px solid transparent; }
.fr-chip .icn { flex: none; }
.fr-balanced   { color: var(--state-available); background: var(--state-available-bg); border-color: color-mix(in srgb, var(--state-available) 30%, transparent); }
.fr-watch      { color: var(--state-near); background: var(--state-near-bg); border-color: color-mix(in srgb, var(--state-near) 32%, transparent); }
.fr-unbalanced { color: var(--state-over); background: var(--state-over-bg); border-color: color-mix(in srgb, var(--state-over) 34%, transparent); }
.prog { display: flex; height: 12px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
.prog .pg-done { background: var(--state-available); height: 100%; }
.prog .pg-prog { background: var(--brand); height: 100%; }
.prog-legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 10px; font-size: 12.5px; color: var(--text-muted); }

.banner-risk { background: var(--state-overloaded-bg); border: 1px solid var(--state-overloaded); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13px; margin-bottom: 14px; }
.banner-info { background: var(--state-available-bg); border: 1px solid var(--state-available); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13px; margin-bottom: 14px; }

@media (max-width: 720px) {
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .drawer { width: 100%; }
  .grid-2 { grid-template-columns: 1fr; }
  .skill { grid-template-columns: 110px 1fr 40px; }
}

/* ============================================================
 * Top-bar navigation + account menu
 * ========================================================== */
.topnav { display: inline-flex; align-items: center; gap: 4px; }
.nav-item {
  display: inline-flex; align-items: center; gap: var(--sp-2);
  border: 0; background: transparent; color: var(--text-muted);
  padding: var(--sp-3) var(--sp-4); border-radius: var(--radius-sm);
  font-family: var(--font-sans); font-size: var(--fs-label-m); line-height: var(--lh-label-m); font-weight: 500;
  cursor: pointer; transition: background .18s ease, color .18s ease;
}
.nav-item:hover { background: var(--surface-2); color: var(--text); }
.nav-item.active { background: var(--surface-2); color: var(--brand); font-weight: 600; }
.nav-item.active .icn { color: var(--brand); }
.nav-item:focus-visible { outline: none; box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand) 35%, transparent); }
.nav-item .icn { flex: none; }

/* account button + dropdown */
.account { position: relative; }
.account-btn {
  display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
  border: 1px solid var(--border); background: var(--surface); color: var(--text);
  padding: 4px 10px 4px 4px; border-radius: 999px; transition: border-color .18s ease, box-shadow .18s ease;
}
.account-btn:hover { border-color: var(--brand); }
.account-btn .avatar { width: 30px; height: 30px; margin: 0; box-shadow: 0 0 0 2px var(--border); }
.account-nm { font-size: 13px; font-weight: 600; max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.account-btn .ar-dn { opacity: .6; }

.account-menu {
  position: absolute; inset-inline-end: 0; top: calc(100% + 8px);
  width: 270px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: 0 12px 32px rgba(0,0,0,.18); padding: 6px;
  z-index: 40; opacity: 0; visibility: hidden; transform: translateY(-6px);
  transition: opacity .18s ease, transform .18s ease, visibility .18s;
}
.account.open .account-menu { opacity: 1; visibility: visible; transform: translateY(0); }
.acct-head { display: flex; align-items: center; gap: 10px; padding: 8px 8px 10px; border-bottom: 1px solid var(--border); margin-bottom: 6px; }
.acct-head .avatar { width: 40px; height: 40px; margin: 0; }
.acct-id { min-width: 0; }
.acct-nm { font-weight: 600; font-size: 14px; }
.acct-ml { font-size: 12px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.acct-item {
  display: flex; align-items: center; gap: 9px; width: 100%;
  border: 0; background: transparent; color: var(--text); cursor: pointer;
  padding: 9px 10px; border-radius: var(--radius-sm); font-size: 13.5px; text-align: start;
  transition: background .15s ease;
}
.acct-item:hover { background: var(--surface-2); }
.acct-item .acct-k { flex: 1; }
.acct-item .acct-v { color: var(--text-muted); display: inline-flex; align-items: center; }
.acct-item.danger { color: var(--state-overloaded); }
.acct-sep { height: 1px; background: var(--border); margin: 6px 4px; }
.acct-section { padding: 4px 8px 8px; }
.acct-mini { font-size: 11px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }

@media (max-width: 860px) {
  .nav-item span { display: none; }     /* icon-only nav on small screens */
  .account-nm { display: none; }
}

/* ============================================================
 * Sign-in screen
 * ========================================================== */
.login-wrap {
  min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 18px; padding: 24px;
}
.login-card {
  width: 100%; max-width: 420px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 30px 28px; text-align: center;
}
.login-logo { height: 38px; margin: 0 auto 18px; display: block; }
.login-title { font-family: var(--font-display); font-stretch: 125%; font-size: 22px; margin: 0 0 6px; }
.login-sub { color: var(--text-muted); font-size: 14px; margin: 0 0 22px; }
.login-lbl { display: block; text-align: start; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
.login-row { display: flex; gap: 8px; }
.login-input {
  flex: 1; min-width: 0; padding: 11px 13px; font-size: 14px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface-2); color: var(--text);
}
.login-input:focus-visible { outline: 2px solid var(--brand); outline-offset: 1px; }
.login-row .btn.primary { padding-inline: 18px; }
.login-err { color: var(--state-overloaded); font-size: 13px; min-height: 18px; margin-top: 8px; text-align: start; }
.login-note { font-size: 12px; color: var(--text-muted); background: var(--surface-2); border-radius: var(--radius-sm); padding: 10px 12px; margin-top: 6px; text-align: start; }
.login-divider { display: flex; align-items: center; gap: 10px; color: var(--text-muted); font-size: 12px; margin: 22px 0 14px; }
.login-divider::before, .login-divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
.login-accts { display: grid; gap: 6px; max-height: 230px; overflow-y: auto; text-align: start; }
.login-acct {
  display: flex; align-items: center; gap: 10px; width: 100%;
  border: 1px solid var(--border); background: var(--surface); cursor: pointer;
  padding: 7px 10px; border-radius: var(--radius-sm); transition: border-color .15s ease, background .15s ease;
}
.login-acct:hover { border-color: var(--brand); background: var(--surface-2); }
.login-acct .avatar { width: 32px; height: 32px; margin: 0; }
.la-meta { min-width: 0; display: flex; flex-direction: column; line-height: 1.25; }
.la-nm { font-size: 13.5px; font-weight: 600; }
.la-ml { font-size: 12px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.login-controls { display: flex; gap: 8px; }
#g-btn-host { display: flex; justify-content: center; margin-top: 6px; min-height: 40px; }
.login-codeto { font-size: 14px; color: var(--text-muted); margin: 2px 0 12px; line-height: 1.5; }

.login-actions { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 13px; }
.login-dot { color: var(--text-tertiary); }
.linkbtn { background: none; border: 0; padding: 0; cursor: pointer; color: var(--brand); font: inherit; font-size: 13px; }
.linkbtn:hover { text-decoration: underline; }
.linkbtn:disabled { color: var(--text-tertiary); cursor: default; text-decoration: none; }

/* Sign in with Google */
/* EXTERNAL-BRAND — Google "Sign in with Google" button. These exact colours
   (#fff / #1f1f1f / #dadce0 / #f8faff) are MANDATED by Google's brand guidelines
   and are intentionally NOT design tokens. Allowlisted in the token-purity test. */
.g-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; margin-top: 6px; padding: 12px 16px; cursor: pointer;

}
