.skill .nm2 { font-size: 13px; }
.skill .track { position: relative; height: 8px; background: var(--surface-2); border-radius: 999px; }
.skill .track > i { position: absolute; inset-inline-start: 0; top: 0; height: 100%; border-radius: 999px; background: var(--brand); }
.skill .req { position: absolute; top: -3px; width: 2px; height: 14px; background: var(--text-muted); }
.skill .trend { font-size: 12px; text-align: end; font-variant-numeric: tabular-nums; }
.trend-up { color: var(--state-available); }
.trend-down { color: var(--state-overloaded); }
.chip-type { font-size: 10px; padding: 1px 6px; border-radius: 999px; background: var(--surface-2); color: var(--text-muted); margin-inline-start: 6px; }

.eq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; }
.eq-grid .eq-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.eq-grid .eq-bar { flex: 1; height: 6px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
.eq-grid .eq-bar > i { display: block; height: 100%; background: var(--brand); }

.rating { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 999px; font-weight: 600; }
.rating.Exceeds { background: var(--state-available-bg); color: var(--state-available); }
.rating.Meets { background: var(--surface-2); color: var(--text-muted); }
.rating.Developing { background: var(--state-near-bg); color: var(--state-near); }

/* ---- daily tasks ---- */
.dt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
.dt-card { background: var(--surface); border: 1px solid var(--border); border-inline-start: 4px solid var(--node-accent); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow); cursor: pointer; }
.dt-card:hover { background: var(--surface-2); }
.dt-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.dt-head .avatar { width: 38px; height: 38px; }
.dt-load { font-weight: 700; font-variant-numeric: tabular-nums; }
.dt-row { display: grid; grid-template-columns: 88px 1fr; gap: 8px; font-size: 13px; padding: 3px 0; }
.dt-k { color: var(--text-muted); }
.dt-flag { margin-top: 8px; font-size: 12px; padding: 5px 8px; border-radius: var(--radius-sm); }
.dt-flag.risk { background: var(--state-overloaded-bg); color: var(--state-overloaded); }
.dt-flag.ok { background: var(--state-available-bg); color: var(--state-available); }

/* compact "smart cards" + overview summary (reduced cognitive load) */
.dt-grid { grid-template-columns: repeat(auto-fill, minmax(228px, 1fr)); }
.dt-card { padding: 12px 13px; }
.dt-top { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; }
.dt-top .avatar { width: 34px; height: 34px; }
.dt-id { flex: 1; min-width: 0; }
.dt-id .nm { font-weight: 600; font-size: 13.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dt-id .ttl { font-size: 11.5px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.dt-done { display: flex; gap: 6px; align-items: flex-start; font-size: 13px; line-height: 1.45; }
.dt-done .icn { color: var(--state-available); flex: none; margin-top: 2px; }
.dt-done span { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.dt-done.none { color: var(--text-muted); font-style: italic; }
.dt-chips { display: flex; gap: 6px; margin-top: 10px; }
.dt-chip { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 7px; }
.dt-chip.risk { background: var(--state-overloaded-bg); color: var(--state-overloaded); }
.dt-chip.ok { background: var(--state-available-bg); color: var(--state-available); }
.dt-chip.mut { background: var(--surface-2); color: var(--text-muted); }
.dt-summary { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
.dt-stat { display: inline-flex; align-items: center; gap: 7px; background: var(--surface-2); border-radius: var(--radius-sm); padding: 8px 12px; font-size: 13px; color: var(--text-muted); }
.dt-stat b { font-family: var(--font-display, sans-serif); font-stretch: 125%; font-size: 16px; color: var(--text); }
.dt-stat.risk .icn { color: var(--state-overloaded); }
.dt-stat.ok .icn { color: var(--state-available); }

.set-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.set-row:last-child { border-bottom: 0; }
.set-row label { flex: 1; }
.set-row input { width: 70px; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 6px 8px; font-family: inherit; }
.role-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; }
.role-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; }
.role-name { font-weight: 700; font-size: 15px; }
.role-list { margin: 4px 0 0; padding-inline-start: 16px; font-size: 12.5px; line-height: 1.5; }
.role-list li { margin-bottom: 3px; }
.role-only { margin-top: 10px; font-size: 12px; color: var(--state-near); border-top: 1px solid var(--border); padding-top: 8px; }

/* permissions management */
.perm-list { display: flex; flex-direction: column; }
.perm-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.perm-row:last-child { border-bottom: 0; }
.perm-row .avatar { width: 34px; height: 34px; }
.perm-meta { flex: 1; min-width: 0; }
.perm-sees { flex: 1; text-align: end; }
.perm-row select { min-width: 130px; }
@media (max-width: 640px) { .perm-sees { display: none; } }

/* performance evaluation */
.eval-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
.eval-score { text-align: end; }
.eval-num { font-family: var(--font-display); font-stretch: 125%; font-size: 34px; font-weight: 700; line-height: 1; }
.eval-num span { font-size: 16px; color: var(--text-muted); }
.crit-row { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 9px 0; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.crit-row:last-child { border-bottom: 0; }
.crit-name { font-size: 14px; flex: 1; min-width: 180px; }
.crit-num { color: var(--text-muted); font-variant-numeric: tabular-nums; }
.crit-w { color: var(--text-muted); font-size: 12px; margin-inline-start: 8px; }
.scale { display: inline-flex; gap: 6px; }
.scale-btn { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-weight: 600; }
.scale-btn:hover { border-color: var(--brand); }
.scale-btn.on { background: var(--brand); color: var(--brand-contrast); border-color: transparent; }
.eval-q { margin-bottom: 14px; }
.eval-ta { width: 100%; box-sizing: border-box; background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 8px 10px; font-family: inherit; font-size: 13px; resize: vertical; }
.self-badge { margin-inline-start: 8px; font-size: 12px; background: var(--surface-2); color: var(--text-muted); border-radius: 999px; padding: 1px 8px; }

/* My Progress (employee home) */
.me-hi { font-family: var(--font-display); font-stretch: 125%; font-size: 26px; font-weight: 700; }
.me-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 4px; }
.me-tile { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
.me-big { font-family: var(--font-display); font-stretch: 125%; font-size: 30px; font-weight: 700; line-height: 1.1; }
.me-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; }
.done-item { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.done-item:last-child { border-bottom: 0; }
.done-tick { color: var(--state-available); font-weight: 700; }
.kudo { background: var(--surface-2); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 8px; font-size: 14px; }
.kudo-from { font-weight: 600; font-size: 12px; color: var(--brand); margin-bottom: 2px; }

/* evaluations hub */
.task-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 14px; }
.task-row:last-child { border-bottom: 0; }
.task-row:hover { color: var(--brand); }
.ev-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
.ev-row:last-child { border-bottom: 0; }
.ev-row:hover { background: var(--surface-2); }
.ev-row .avatar { width: 34px; height: 34px; }
.ev-meta { flex: 1; min-width: 0; }
.ev-status { flex: none; }

/* ---- Evidence Timeline (Intelligence Layer P1) ---- */
.tl-filters { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin: 10px 0 12px; }
.tl-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }
.tl-chip { font-size: 11.5px; font-weight: 600; border-radius: 999px; padding: 3px 10px;
  border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); cursor: pointer; }
.tl-chip.on { background: var(--brand); color: var(--brand-contrast); border-color: var(--brand); }
.tl-row { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
.tl-row:last-child { border-bottom: 0; }
.tl-row.tl-growth { border-inline-start: 3px solid var(--state-available); padding-inline-start: 9px; }
.tl-cat { flex: none; align-self: flex-start; display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700; border-radius: 999px; padding: 3px 8px;
  background: var(--surface-2, rgba(127,127,127,.10)); color: var(--text-muted); border: 1px solid var(--border); }
.tl-cat .icn { flex: none; }
.tl-body { min-width: 0; }
.tl-desc { font-size: 13.5px; color: var(--text); line-height: 1.5; }
.tl-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

/* ---- Wellbeing Early-Warning (support view, manager-scoped) ---- */
.wb-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
.wb-row:last-child { border-bottom: 0; }
.wb-person { display: flex; align-items: center; gap: 10px; }
.wb-person .avatar { width: 34px; height: 34px; flex: none; }
.wb-meta { flex: 1; min-width: 0; }
.wb-factors { margin: 8px 0 6px; padding-inline-start: 20px; color: var(--text); font-size: 13px; line-height: 1.6; }
.wb-action { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
.wb-action .icn { flex: none; color: var(--state-available); }
/* band chip = icon + label + colour together (never colour as the only cue — WCAG 2.2) */
.wb-chip { flex: none; display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 700;
  border-radius: 999px; padding: 3px 9px; border: 1px solid transparent; }
.wb-chip .icn { flex: none; }
.wb-watch    { color: var(--state-near); background: var(--state-near-bg); border-color: color-mix(in srgb, var(--state-near) 32%, transparent); }
.wb-atrisk   { color: var(--state-watch); background: var(--state-watch-bg); border-color: color-mix(in srgb, var(--state-watch) 34%, transparent); }
.wb-critical { color: var(--state-over); background: var(--state-over-bg); border-color: color-mix(in srgb, var(--state-over) 34%, transparent); }

/* ===== Fairness / Overload Radar (Builder B) — reuses the wb-chip pattern ===== */
.fr-team { padding: 14px 0; border-bottom: 1px solid var(--border); }
.fr-team:last-child { border-bottom: 0; }
.fr-team-head { display: flex; align-items: center; gap: 10px; }
.fr-team-head .avatar { width: 34px; height: 34px; flex: none; }
.fr-team-meta { flex: 1; min-width: 0; }
.fr-team-meta .nm { font-weight: 600; font-size: 14px; }
.fr-factors { margin: 8px 0 6px; padding-inline-start: 20px; color: var(--text); font-size: 13px; line-height: 1.6; }
.fr-action { font-size: 13px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
.fr-action .icn { flex: none; color: var(--state-available); }
.fr-nodata { display: flex; align-items: center; gap: 6px; margin-top: 8px; }
.fr-nodata .icn { flex: none; }
.fr-flagged-n { font-weight: 400; color: var(--text-muted); font-size: 12px; }
/* band chip = icon + label + colour together (never colour as the only cue — WCAG 2.2) */
.fr-chip { flex: none; display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 700;
  border-radius: 999px; padding: 3px 9px; border: 1px solid transparent; }
.fr-chip .icn { flex: none; }
.fr-balanced   { color: var(--state-available); background: var(--state-available-bg); border-color: color-mix(in srgb, var(--state-available) 30%, transparent); }
.fr-watch      { color: var(--state-near); background: var(--state-near-bg); border-color: color-mix(in srgb, var(--state-near) 32%, transparent); }
.fr-unbalanced { color: var(--state-over); background: var(--state-over-bg); border-color: color-mix(in srgb, var(--state-over) 34%, transparent); }
.prog { display: flex; height: 12px; background: var(--surface-2); border-radius: 999px; overflow: hidden; }
.prog .pg-done { background: var(--state-available); height: 100%; }
.prog .pg-prog { background: var(--brand); height: 100%; }
.prog-legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 10px; font-size: 12.5px; color: var(--text-muted); }

.banner-risk { background: var(--state-overloaded-bg); border: 1px solid var(--state-overloaded); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13px; margin-bottom: 14px; }
.banner-info { background: var(--state-available-bg); border: 1px solid var(--state-available); border-radius: var(--radius-sm); padding: 10px 12px; font-size: 13px; margin-bottom: 14px; }

@media (max-width: 720px) {
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .drawer { width: 100%; }
  .grid-2 { grid-template-columns: 1fr; }
  .skill { grid-template-columns: 110px 1fr 40px; }
}

/* ============================================================
 * Top-bar navigation + account menu
 * ========================================================== */
.topnav { display: inline-flex; align-items: center; gap: 4px; }
.nav-item {
  display: inline-flex; align-items: center; gap: var(--sp-2);
  border: 0; background: transparent; color: var(--text-muted);
  padding: var(--sp-3) var(--sp-4); border-radius: var(--radius-sm);
  font-family: var(--font-sans); font-size: var(--fs-label-m); line-height: var(--lh-label-m); font-weight: 500;
  cursor: pointer; transition: background .18s ease, color .18s ease;
}
.nav-item:hover { background: var(--surface-2); color: var(--text); }
.nav-item.active { background: var(--surface-2); color: var(--brand); font-weight: 600; }
.nav-item.active .icn { color: var(--brand); }
.nav-item:focus-visible { outline: none; box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand) 35%, transparent); }
.nav-item .icn { flex: none; }

/* account button + dropdown */
.account { position: relative; }
.account-btn {
  display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
  border: 1px solid var(--border); background: var(--surface); color: var(--text);
  padding: 4px 10px 4px 4px; border-radius: 999px; transition: border-color .18s ease, box-shadow .18s ease;
}
.account-btn:hover { border-color: var(--brand); }
.account-btn .avatar { width: 30px; height: 30px; margin: 0; box-shadow: 0 0 0 2px var(--border); }
.account-nm { font-size: 13px; font-weight: 600; max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.account-btn .ar-dn { opacity: .6; }

.account-menu {
  position: absolute; inset-inline-end: 0; top: calc(100% + 8px);
  width: 270px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); box-shadow: 0 12px 32px rgba(0,0,0,.18); padding: 6px;
  z-index: 40; opacity: 0; visibility: hidden; transform: translateY(-6px);
  transition: opacity .18s ease, transform .18s ease, visibility .18s;
}
.account.open .account-menu { opacity: 1; visibility: visible; transform: translateY(0); }
.acct-head { display: flex; align-items: center; gap: 10px; padding: 8px 8px 10px; border-bottom: 1px solid var(--border); margin-bottom: 6px; }
.acct-head .avatar { width: 40px; height: 40px; margin: 0; }
.acct-id { min-width: 0; }
.acct-nm { font-weight: 600; font-size: 14px; }
.acct-ml { font-size: 12px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.acct-item {
  display: flex; align-items: center; gap: 9px; width: 100%;
  border: 0; background: transparent; color: var(--text); cursor: pointer;
  padding: 9px 10px; border-radius: var(--radius-sm); font-size: 13.5px; text-align: start;
  transition: background .15s ease;
}
.acct-item:hover { background: var(--surface-2); }
.acct-item .acct-k { flex: 1; }
.acct-item .acct-v { color: var(--text-muted); display: inline-flex; align-items: center; }
.acct-item.danger { color: var(--state-overloaded); }
.acct-sep { height: 1px; background: var(--border); margin: 6px 4px; }
.acct-section { padding: 4px 8px 8px; }
.acct-mini { font-size: 11px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }

@media (max-width: 860px) {
  .nav-item span { display: none; }     /* icon-only nav on small screens */
  .account-nm { display: none; }
}

/* ============================================================
 * Sign-in screen
 * ========================================================== */
.login-wrap {
  min-height: 80vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 18px; padding: 24px;
}
.login-card {
  width: 100%; max-width: 420px; background: var(--surface);
  border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 30px 28px; text-align: center;
}
.login-logo { height: 38px; margin: 0 auto 18px; display: block; }
.login-title { font-family: var(--font-display); font-stretch: 125%; font-size: 22px; margin: 0 0 6px; }
.login-sub { color: var(--text-muted); font-size: 14px; margin: 0 0 22px; }
.login-lbl { display: block; text-align: start; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
.login-row { display: flex; gap: 8px; }
.login-input {
  flex: 1; min-width: 0; padding: 11px 13px; font-size: 14px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--surface-2); color: var(--text);
}
.login-input:focus-visible { outline: 2px solid var(--brand); outline-offset: 1px; }
.login-row .btn.primary { padding-inline: 18px; }
.login-err { color: var(--state-overloaded); font-size: 13px; min-height: 18px; margin-top: 8px; text-align: start; }
.login-note { font-size: 12px; color: var(--text-muted); background: var(--surface-2); border-radius: var(--radius-sm); padding: 10px 12px; margin-top: 6px; text-align: start; }
.login-divider { display: flex; align-items: center; gap: 10px; color: var(--text-muted); font-size: 12px; margin: 22px 0 14px; }
.login-divider::before, .login-divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
.login-accts { display: grid; gap: 6px; max-height: 230px; overflow-y: auto; text-align: start; }
.login-acct {
  display: flex; align-items: center; gap: 10px; width: 100%;
  border: 1px solid var(--border); background: var(--surface); cursor: pointer;
  padding: 7px 10px; border-radius: var(--radius-sm); transition: border-color .15s ease, background .15s ease;
}
.login-acct:hover { border-color: var(--brand); background: var(--surface-2); }
.login-acct .avatar { width: 32px; height: 32px; margin: 0; }
.la-meta { min-width: 0; display: flex; flex-direction: column; line-height: 1.25; }
.la-nm { font-size: 13.5px; font-weight: 600; }
.la-ml { font-size: 12px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.login-controls { display: flex; gap: 8px; }
#g-btn-host { display: flex; justify-content: center; margin-top: 6px; min-height: 40px; }
.login-codeto { font-size: 14px; color: var(--text-muted); margin: 2px 0 12px; line-height: 1.5; }

.login-actions { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 13px; }
.login-dot { color: var(--text-tertiary); }
.linkbtn { background: none; border: 0; padding: 0; cursor: pointer; color: var(--brand); font: inherit; font-size: 13px; }
.linkbtn:hover { text-decoration: underline; }
.linkbtn:disabled { color: var(--text-tertiary); cursor: default; text-decoration: none; }

/* Sign in with Google */
/* EXTERNAL-BRAND — Google "Sign in with Google" button. These exact colours
   (#fff / #1f1f1f / #dadce0 / #f8faff) are MANDATED by Google's brand guidelines
   and are intentionally NOT design tokens. Allowlisted in the token-purity test. */
.g-btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; margin-top: 6px; padding: 12px 16px; cursor: pointer;

}

.g-mark { flex: none; }
.g-choose { text-align: start; }
.g-choose-h { font-size: 16px; font-weight: 600; margin: 4px 0 12px; }
.g-choose-sub { font-size: 12px; color: var(--text-muted); font-weight: 400; margin-top: 2px; }
.g-accts { display: grid; gap: 4px; max-height: 280px; overflow-y: auto; }
.g-acct {
  display: flex; align-items: center; gap: 12px; width: 100%; cursor: pointer;
  border: 0; background: transparent; color: var(--text); text-align: start;

}

.g-noaccess { margin-inline-start: auto; font-size: 10px; font-weight: 600; color: var(--state-overloaded);
  background: var(--state-overloaded-bg, rgba(248,40,90,.16)); border-radius: 999px; padding: 2px 8px; white-space: nowrap; }
.g-denied { text-align: center; padding: 8px 4px 4px; }
.g-denied-ic { width: 44px; height: 44px; border-radius: 50%; margin: 0 auto 10px; display: grid; place-items: center;
  color: var(--state-overloaded); background: var(--state-overloaded-bg, rgba(248,40,90,.16)); }
.g-denied-h { font-weight: 600; font-size: 16px; }
.g-denied-sub { font-size: 13px; color: var(--text-muted); margin: 4px 0 14px; }
.login-note .icn { vertical-align: -2px; }
.g-meta { min-width: 0; display: flex; flex-direction: column; line-height: 1.3; }
.g-nm { font-size: 14px; font-weight: 500; }
.g-ml { font-size: 12.5px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.g-back { margin-top: 10px; border: 0; background: transparent; color: var(--brand); cursor: pointer; font-size: 13px; padding: 6px; }

/* ============================================================
 * WBK Component Library page (route: library)
 * ========================================================== */
.wbk-lib-h { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
.wbk-lib-h h2 { font-family: var(--font-display); font-stretch: 125%; font-size: 26px; margin: 0 0 4px; }
.wbk-lib-h p { color: var(--text-muted); font-size: 14px; margin: 0; }
.wbk-lib-logo { height: 22px; opacity: .9; }
.wbk-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.wbk-sec { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.wbk-sec-h { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; margin-bottom: 14px; }
.wbk-sec-h h3 { font-size: 14px; font-weight: 600; margin: 0; }
.wbk-sec-note { font-size: 11px; color: var(--text-muted); }
.wbk-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }

/* Apple Pay button */
/* EXTERNAL-BRAND — Apple Pay button. Black background is mandated by Apple's
   Apple Pay button guidelines; intentionally NOT a design token. Allowlisted. */
.wbk-applepay { background: #000; color: var(--fixed-white); border: 0; border-radius: var(--radius-sm); height: 38px; padding: 0 16px;
  font-family: var(--font-sans); font-weight: 600; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.wbk-applepay::after { content: " Pay"; font-weight: 600; }
.wbk-applepay::before { content: ""; }
.wbk-applepay--book::after { content: " Pay"; }

/* Stepper */
.wbk-stepper { display: inline-flex; align-items: center; gap: 4px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px; padding: 4px; }
.wbk-stepper button { width: 30px; height: 30px; border-radius: 999px; border: 0; background: var(--surface); color: var(--text); cursor: pointer; display: inline-grid; place-items: center; }
.wbk-stepper button:hover { background: var(--brand); color: var(--brand-contrast); }
.wbk-stepper-v { min-width: 28px; text-align: center; font-variant-numeric: tabular-nums; font-weight: 600; }

/* Slider */
.wbk-slider { -webkit-appearance: none; appearance: none; width: 100%; height: 6px; border-radius: 999px; background: var(--surface-2); outline: none; }
.wbk-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--brand); cursor: pointer; border: 2px solid var(--surface); box-shadow: var(--shadow); }
.wbk-slider::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--brand); cursor: pointer; border: 2px solid var(--surface); }

/* Checkbox / Radio / Toggle */
.wbk-choice { gap: 16px; }
.wbk-check, .wbk-radio, .wbk-toggle { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; }
.wbk-check input, .wbk-radio input, .wbk-toggle input { position: absolute; opacity: 0; pointer-events: none; }
.wbk-check span { width: 18px; height: 18px; border: 1.5px solid var(--text-muted); border-radius: 5px; display: inline-grid; place-items: center; }
.wbk-check input:checked + span { background: var(--brand); border-color: var(--brand); }
.wbk-check input:checked + span::after { content: ""; width: 5px; height: 9px; border: 2px solid var(--fixed-white); border-top: 0; border-inline-start: 0; transform: rotate(45deg); margin-bottom: 2px; }
.wbk-radio span { width: 18px; height: 18px; border: 1.5px solid var(--text-muted); border-radius: 50%; display: inline-grid; place-items: center; }
.wbk-radio input:checked + span { border-color: var(--brand); }
.wbk-radio input:checked + span::after { content: ""; width: 9px; height: 9px; border-radius: 50%; background: var(--brand); }
.wbk-toggle span { width: 38px; height: 22px; border-radius: 999px; background: var(--surface-2); border: 1px solid var(--border); position: relative; transition: background .15s; }
.wbk-toggle span::after { content: ""; position: absolute; top: 2px; inset-inline-start: 2px; width: 16px; height: 16px; border-radius: 50%; background: var(--fixed-white); transition: transform .18s cubic-bezier(.22,.61,.36,1); }
.wbk-toggle input:checked + span { background: var(--brand); border-color: transparent; }
.wbk-toggle input:checked + span::after { transform: translateX(16px); }
[dir="rtl"] .wbk-toggle input:checked + span::after { transform: translateX(-16px); }

/* Badges */
.wbk-badge-host { position: relative; display: inline-grid; place-items: center; color: var(--text-muted); }
.wbk-badge { position: absolute; top: -6px; inset-inline-end: -8px; min-width: 16px; height: 16px; padding: 0 4px; border-radius: 999px;
  background: var(--brand); color: var(--brand-contrast); font-size: 10px; font-weight: 700; display: grid; place-items: center; font-variant-numeric: tabular-nums; }
.wbk-badge-dot { min-width: 9px; height: 9px; padding: 0; top: -3px; inset-inline-end: -3px; }

/* Progress */
.wbk-prog { height: 8px; border-radius: 999px; background: var(--surface-2); overflow: hidden; }
.wbk-prog i { display: block; height: 100%; background: var(--brand); border-radius: 999px; }
.wbk-prog-l { font-size: 12px; color: var(--text-muted); margin-top: 6px; font-variant-numeric: tabular-nums; }
.wbk-prog-c .trk { fill: none; stroke: var(--surface-2); stroke-width: 4; }
.wbk-prog-c .val { fill: none; stroke: var(--brand); stroke-width: 4; stroke-linecap: round; transform: rotate(-90deg); transform-origin: center; }
.wbk-prog-c text { fill: var(--text); font-size: 11px; font-weight: 600; }

/* Avatar stack */
.wbk-avstack { display: inline-flex; align-items: center; }
.wbk-avstack .avatar { width: 34px; height: 34px; margin: 0; margin-inline-start: -10px; border: 2px solid var(--surface); }
.wbk-avstack .avatar:first-child { margin-inline-start: 0; }
.wbk-avmore { width: 34px; height: 34px; border-radius: 50%; background: var(--surface-2); color: var(--text-muted); display: grid; place-items: center; font-size: 12px; font-weight: 600; margin-inline-start: -10px; border: 2px solid var(--surface); }

/* Tabs */
.wbk-tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); }
.wbk-tabs button { appearance: none; border: 0; background: transparent; color: var(--text-muted); font: inherit; font-size: 14px; font-weight: 600; padding: 8px 12px; cursor: pointer; position: relative; }
.wbk-tabs button.active { color: var(--text); }
.wbk-tabs button.active::after { content: ""; position: absolute; left: 8px; right: 8px; bottom: -1px; height: 2px; background: var(--brand); border-radius: 2px; }

/* Toast / banner extras */
.wbk-toast { margin-bottom: 8px; }
.wbk-x { margin-inline-start: auto; border: 0; background: transparent; color: var(--text-muted); cursor: pointer; display: inline-grid; place-items: center; }
.wbk-banner { margin-bottom: 8px; }
.wbk-banner-msg { display: inline-flex; align-items: center; gap: 8px; }

/* Tooltip */
.wbk-tip-host { position: relative; cursor: default; border-bottom: 1px dashed var(--text-muted); }
.wbk-tip { position: absolute; bottom: calc(100% + 8px); inset-inline-start: 0; background: var(--text); color: var(--bg); font-size: 12px; padding: 6px 9px; border-radius: 6px; white-space: nowrap; opacity: 0; visibility: hidden; transform: translateY(4px); transition: opacity .15s, transform .15s; box-shadow: var(--shadow); }
.wbk-tip-host:hover .wbk-tip { opacity: 1; visibility: visible; transform: translateY(0); }

/* Countdown */
.wbk-cd { display: inline-flex; gap: 8px; }
.wbk-cd-b { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; text-align: center; min-width: 48px; }
.wbk-cd-b b { display: block; font-family: var(--font-display); font-stretch: 125%; font-size: 20px; font-variant-numeric: tabular-nums; }
.wbk-cd-b span { font-size: 9px; letter-spacing: .08em; color: var(--text-muted); }

/* Date picker */
/* Calendar / date picker — WBK PRO V3 (node 5069-41970). Month header (Label-L),
   weekday labels (Body-XS muted), day cells (Body-S, Radius-M 8), with today /
   selected / range / disabled / hover / focus states. RTL-safe: the 7-col grid
   flows by writing direction, so the week start mirrors automatically. */
.wbk-cal { max-width: 280px; }
.wbk-cal-m { font-family: var(--font-display); font-weight: 600; font-size: var(--fs-label-l); line-height: var(--lh-label-l); color: var(--text); margin-bottom: var(--sp-3); }
.wbk-cal-w, .wbk-cal-g { display: grid; grid-template-columns: repeat(7, 1fr); gap: var(--sp-1); }
.wbk-cal-w span { text-align: center; font-size: var(--fs-body-xs); line-height: var(--lh-body-xs); color: var(--text-muted); padding: var(--sp-2) 0; text-transform: uppercase; letter-spacing: .04em; }
.wbk-cal-d { aspect-ratio: 1/1; display: grid; place-items: center; border: 0; background: transparent; color: var(--text); border-radius: var(--radius-md); cursor: pointer; font-size: var(--fs-body-s); line-height: var(--lh-body-s); font-variant-numeric: tabular-nums; transition: background-color .12s ease, color .12s ease, box-shadow .12s ease; }
.wbk-cal-d:hover:not(.is-empty):not(:disabled) { background: var(--surface-2); }
.wbk-cal-d:focus-visible { outline: none; box-shadow: 0 0 0 2px color-mix(in srgb, var(--brand) 45%, transparent); }
.wbk-cal-d.is-today { box-shadow: inset 0 0 0 1px var(--brand); color: var(--brand); font-weight: 600; }
.wbk-cal-d.is-range { background: var(--state-positive-bg); border-radius: 0; color: var(--text); }
.wbk-cal-d.is-sel { background: var(--brand); color: var(--brand-contrast); font-weight: 600; }
.wbk-cal-d.is-sel.is-today { box-shadow: none; }
.wbk-cal-d:disabled, .wbk-cal-d.is-disabled { color: var(--text-disabled); cursor: not-allowed; }
.wbk-cal-d.is-empty { pointer-events: none; }

/* Card / list item */
.wbk-card { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--surface-2); margin-bottom: 12px; }
.wbk-card-media { height: 96px; display: grid; place-items: center; color: var(--text-muted); background: linear-gradient(135deg, var(--surface-2), var(--surface)); }
.wbk-card-b { padding: 12px; }
.wbk-card-t { font-weight: 600; font-size: 14px; }
.wbk-card-m { color: var(--text-muted); font-size: 12px; margin: 2px 0 10px; }
.wbk-card-f { display: flex; align-items: center; justify-content: space-between; }
.wbk-list { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.wbk-li { display: flex; align-items: center; gap: 10px; padding: 12px; border-bottom: 1px solid var(--border); color: var(--text-muted); }
.wbk-li:last-child { border-bottom: 0; }
.wbk-li div { flex: 1; min-width: 0; }
.wbk-li-t { color: var(--text); font-weight: 600; font-size: 13.5px; }
.wbk-li-m { font-size: 12px; }

/* Modal / dialog */
.wbk-modal { position: fixed; inset: 0; z-index: 200; display: grid; place-items: center; }
.wbk-modal[hidden] { display: none; }
.wbk-modal-bd { position: absolute; inset: 0; background: rgba(0,0,0,.55); backdrop-filter: blur(4px); }
.wbk-modal-card { position: relative; width: min(420px, 90vw); background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; box-shadow: 0 24px 60px rgba(0,0,0,.4); }
.wbk-modal-media { height: 120px; border-radius: var(--radius-sm); background: var(--surface-2); display: grid; place-items: center; color: var(--text-muted); margin-bottom: 14px; }
.wbk-modal-card h4 { margin: 0 0 6px; font-size: 16px; }
.wbk-modal-card p { margin: 0; color: var(--text-muted); font-size: 14px; }
@media (prefers-reduced-motion: reduce) { .wbk-tip, .wbk-toggle span::after { transition: none; } }

/* ── Signature / credits bar — a quiet authed-app footer (Wave 3 supporting drop, v2).
   Credit-only; no data, no logic. Renders at the END of the scrolling content column
   (inside .view-main, after #view) in normal flow — NOT fixed/sticky — and carries no
   positive z-index, so the overlay host, drawers and modals (z-index 40+) always sit
   ABOVE it. Slim + low-key: it reads as a signature, never a banner. Gold is darkened in
   light theme to keep the small role labels readable (WCAG AA). RTL reverses the row. */
#sig-bar { position: relative; z-index: 0; }
.sig-bar { display: flex; align-items: center; gap: var(--sp-5); padding: var(--sp-3) var(--sp-7); margin-top: var(--sp-5);
  border-top: 1px solid var(--border, rgba(255,255,255,.12));
  background: var(--bg);
  font-family: var(--font-sans, system-ui, sans-serif); }
.sig-dept { flex: 1.5; display: flex; align-items: center; gap: var(--sp-2); font-size: 11px; letter-spacing: .16em;
  text-transform: uppercase; color: var(--text-muted); font-weight: 500; line-height: 1; }
.sig-sep { flex: none; width: 1px; height: 22px; align-self: center;
  background: var(--border, rgba(255,255,255,.12)); }
.sig-credit { flex: none; display: inline-flex; align-items: baseline; gap: var(--sp-2); padding: 0; }
.sig-role { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--sig-gold);
  font-weight: 600; margin: 0; }
.sig-name { font-size: 13px; font-weight: 600; color: var(--text-muted); line-height: 1; }
.sig-name--accent { position: relative; display: inline-block; }
.sig-name--accent::after { content: ""; position: absolute; left: 50%; transform: translateX(-50%);
  bottom: -4px; width: 20px; height: 2px; border-radius: 2px; background: var(--brand); }
[dir="rtl"] .sig-bar { flex-direction: row-reverse; }
@media (max-width: 640px) {
  .sig-bar { flex-direction: column; gap: var(--sp-3); align-items: center; text-align: center; margin-top: var(--sp-5); }
  .sig-dept { flex: none; justify-content: center; }
  .sig-sep { display: none; }
}

/* ── Evaluation prep · evidence (Wave 3.002, P2). PREP ONLY — sourced lines + gaps,
   never a score/verdict. Manager-gated; rendered above the scoring criteria. */
.eval-prep { border-left: 3px solid var(--brand); }
.eval-prep .ttl { line-height: 1.5; }
.ep-cat { margin: 12px 0; }
.ep-cat .mini-label { display: flex; align-items: center; gap: 6px; }
.ep-count { color: var(--text-muted); font-weight: 400; }
.ep-list { list-style: none; margin: 6px 0 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
.ep-line { display: flex; flex-direction: column; gap: 2px; padding: 8px 10px;
  background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); }
.ep-text { color: var(--text); font-size: 14px; line-height: 1.45; }
.ep-src { display: inline-flex; align-items: center; gap: 5px; color: var(--text-muted); font-size: 12px; }
.ep-highlights .ep-line { border-color: color-mix(in srgb, var(--brand) 35%, var(--border)); }
.ep-empty { padding: 12px; border: 1px dashed var(--border); border-radius: var(--radius-sm);
  background: var(--surface-2); margin-top: 8px; }
.ep-gaps { margin-top: 14px; }
.ep-gap { color: var(--text-muted); font-size: 13px; padding: 4px 0; }
[dir="rtl"] .eval-prep { border-left: 0; border-right: 3px solid var(--brand); }

/* ── Suggested-range SUPPORT panel (P3, WP.evalIntel.suggestedRange). A calm aid
   BESIDE the manager's own rating — never replaces it. Shows a RANGE band on /5
   (never a single number to copy), confidence, cited reasoning, and risks framed
   "weigh these". Sensitive-gated. Tokens only; both themes; RTL via logical props. */
.wbk-band { border-inline-start: 3px solid var(--brand); }
.wbk-band .ttl { line-height: 1.5; }
.wbk-band-head { display: flex; align-items: center; gap: var(--sp-2); flex-wrap: wrap; }
.wbk-band-sub { color: var(--text-muted); font-size: var(--fs-body-s); line-height: var(--lh-body-s); margin-top: 2px; }
.wbk-band-conf { display: inline-flex; align-items: center; gap: var(--sp-1); margin-inline-start: auto;
  font-size: var(--fs-label-xs); line-height: var(--lh-label-xs); text-transform: uppercase; letter-spacing: .06em;
  color: var(--text-muted); }
/* the /5 range track — a highlighted band [low–high], not a point */
.wbk-band-track { position: relative; block-size: 8px; border-radius: 999px; background: var(--surface-3);
  margin: var(--sp-5) 0 var(--sp-3); }
/* 1–5 gridlines: thin marks at 0/25/50/75/100% so the span reads against the scale (#4). */
.wbk-band-grid { position: absolute; inset: 0; pointer-events: none; border-radius: inherit;
  background-image: repeating-linear-gradient(to right,
    var(--border) 0, var(--border) 1px, transparent 1px, transparent 25%);
  border-inline-end: 1px solid var(--border); /* the 5/right-edge tick */
  opacity: .9; }
.wbk-band-span { position: absolute; block-size: 100%; border-radius: 999px;
  background: color-mix(in srgb, var(--brand) 55%, transparent); border: 1px solid var(--brand); }
.wbk-band-scale { display: flex; justify-content: space-between; font-variant-numeric: tabular-nums;
  color: var(--text-tertiary); font-size: var(--fs-body-xs); }
.wbk-band-val { font-family: var(--font-display); font-weight: 600; color: var(--text);
  font-size: var(--fs-h5); line-height: var(--lh-h5); font-variant-numeric: tabular-nums; }
.wbk-band-val span { color: var(--text-muted); font-size: var(--fs-body-m); font-weight: 400; }
.wbk-band-reason { list-style: none; margin: var(--sp-3) 0 0; padding: 0; display: flex; flex-direction: column; gap: var(--sp-2); }

  <script>
/* ============================================================
 * Webook Workload — Engagement data (the "My Progress" dashboard)
 * ------------------------------------------------------------
 * Healthy engagement, NOT addiction-to-overwork. Built on:
 *  - Progress Principle (small daily wins) → "Done today" feed
 *  - Endowed progress (goal bar starts already partly full)
 *  - Gentle streaks WITH a freeze/forgiveness (no red shaming)
 *  - Recognition / kudos (the documented burnout-reducer)
 *  - Self-referenced growth (you vs your past) — never leaderboards.
 * All mocked for the demo.
 * ========================================================== */
(function (WP) {
  'use strict';

  // Habit science (Lally et al. 2010, UCL): a habit takes ~66 days on
  // average (range 18–254). The "21 days" figure is a myth, and missing
  // ONE day does not derail it — so streaks here are gentle, with freezes.
  const HABIT_DAYS = 66;
  const MILESTONES = [7, 14, 30, 66];

  const ENGAGE = {
    p_akram:  { streak: 9, freeze: 1, daysActive: 23, weekGoal: 8, weekDone: 6, level: 'Operator', levelNo: 4, levelPct: 70,
      doneToday: ['Locked MDLBEAST staffing grid', 'Approved crew budget'],
      kudos: [{ from: 'p_motaa', text: 'You saved the festival load-in 🙌' }] },
    p_osama:  { streak: 14, freeze: 2, daysActive: 40, weekGoal: 6, weekDone: 5, level: 'Specialist', levelNo: 3, levelPct: 85,
      doneToday: ['Two site visits (festival + summit)'],
      kudos: [{ from: 'p_akram', text: 'Carried two events at once — legend.' }] },
    p_talal:  { streak: 4, freeze: 2, daysActive: 10, weekGoal: 5, weekDone: 3, level: 'Specialist', levelNo: 2, levelPct: 40,
      doneToday: ['Helped set up the gala AV'],
      kudos: [{ from: 'p_abdulrahman', text: 'Always first to volunteer 👏' }] },
    p_idris:  { streak: 6, freeze: 2, daysActive: 12, weekGoal: 4, weekDone: 3, level: 'Rookie', levelNo: 1, levelPct: 55,
      doneToday: ['Finished signage checklist', 'Learned the booking tool'],
      kudos: [{ from: 'p_akram', text: 'Fastest-learning new hire we’ve had.' }] },
  };

  // For anyone without explicit data, derive a gentle default from their work.
  function get(personId) {
    if (ENGAGE[personId]) return ENGAGE[personId];
    const p = WP.access.byId(personId);
    const done = (p && p.dailyCheckin && p.dailyCheckin.done && p.dailyCheckin.done !== '—') ? [p.dailyCheckin.done] : [];
    const wk = p ? (p.assignedEvents || []).length + done.length : 0;
    return { streak: 3, freeze: 2, daysActive: 3, weekGoal: Math.max(4, wk + 1), weekDone: wk,
      level: 'Specialist', levelNo: 1, levelPct: 30, doneToday: done, kudos: [] };
  }

  // next habit milestone above the current streak (or final)
  function nextMilestone(streak) {
    for (var i = 0; i < MILESTONES.length; i++) { if (MILESTONES[i] > streak) return MILESTONES[i]; }
    return null;
  }

  WP.data.ENGAGE = ENGAGE;
  WP.data.HABIT_DAYS = HABIT_DAYS;
  WP.data.MILESTONES = MILESTONES;
  // Persistence hooks — snapshot/restore stored records so check-ins survive a reload.
  function snapshot() { return ENGAGE; }
  function restore(o) { if (o) Object.keys(o).forEach(function (k) { ENGAGE[k] = o[k]; }); }
  WP.engage = { get: get, nextMilestone: nextMilestone, habitDays: HABIT_DAYS, snapshot: snapshot, restore: restore };
})(window.WP = window.WP || {});

/* ============================================================
 * Tempo — Runtime config (sign-in security)
 * ------------------------------------------------------------
 * Tempo supports three levels of sign-in. The strongest one that is
 * configured wins:
 *
 *  1. EMAIL CODE (recommended) — set supabaseUrl + supabaseAnonKey below.
 *     The user enters their @webook.com email, gets a 6-digit code in their
 *     inbox, and types it back. The code goes to the REAL mailbox, so typing
 *     someone else's email gets you nowhere. These two values are PUBLIC by
 *     design (safe to ship in the page). See ACCESS-SETUP.md → "Email code".
 *
 *  2. GOOGLE — set googleClientId to a Google OAuth Web Client ID. Google
 *     proves the @webook.com identity. See ACCESS-SETUP.md → "Google".
 *
 *  3. DIRECTORY GATE (demo, default when nothing is set) — exact-email match
 *     only. Convenient for a trusted internal pilot, but NOT a real lock:
 *     anyone who types a registered email gets in.
 * ========================================================== */
(function (WP) {

  // — Verified sign-in (Supabase). Project URL + publishable key (both public). —
  if (WP.config.supabaseUrl === undefined)     WP.config.supabaseUrl = 'https://ftkbjsxdrxtjdzcojnve.supabase.co';
  if (WP.config.supabaseAnonKey === undefined) WP.config.supabaseAnonKey = 'sb_publishable_0SzG8Od9htPYqlp9PSwYqQ_IvPjdYgt';
  // — Google sign-in (optional alternative). —
  if (WP.config.googleClientId === undefined)  WP.config.googleClientId = '';
  // — Auth provider selector (DECOUPLED from the Supabase DATA layer above). —
  // Supabase stays connected for WP.db (people/evaluations) no matter what this is;
  // this ONLY chooses how people sign IN. Values: 'google' | 'verified-link' | 'directory'.
  //
  // TEMPORARY STOPGAP — set to 'directory' to unblock everyone TODAY. Supabase's
  // built-in email sender is rate-limited ("Could not send the code"), so the
  // verified-LINK path locks people out. Google (PR #51) is the intended provider
  // but is blocked on the real OAuth Client ID. The directory gate is instant
  // (registered @webook.com email → straight in) but is NOT identity-proof:
  // anyone who types a known @webook.com email gets in. Acceptable short-term for
  // an internal pilot on an obscure URL; flip back to 'google' the moment the
  // Client ID is wired.
  if (WP.config.authMode === undefined)        WP.config.authMode = 'directory';

  /* ----------------------------------------------------------------
   * MVP FLAG (reversible, one line) — what the org SEES in v1.
   * ----------------------------------------------------------------
   * Same idea as the theme cutover (WP.DEFAULT_THEME in state.js):
   * ONE constant flips the whole product. The advanced layer stays
   * fully merged and tested — only HIDDEN — so it is one line from
   * returning.
   *
   *   true  → lean v1: login, role dashboard + org/workload map,
   *           daily check-in, evaluations + evaluation, profile, me,
   *           permissions, settings. The deferred layer is hidden:
   *           nav entries removed, routes redirect home, and the
   *           in-screen advanced panels are not rendered.
   *   false → everything returns exactly as built (full nav, all
   *           routes, all panels). Nothing was deleted.
   *
   * ← flip to false to un-defer the advanced layer.
   *
   * NOTE: the append-only events store + Slack ingest keep running
   * under MVP so real evidence still ACCRUES quietly. The intel
   * VIEWS are hidden (compute-on-view ⇒ no cost), but the data keeps
   * building for when you un-defer.
   * -------------------------------------------------------------- */
  if (WP.config.mvp === undefined) WP.config.mvp = true;

  // nav ids / route names AND in-screen panel keys, so a single helper
  // (WP.deferred) gates nav, routes, and panels alike.
  WP.MVP_DEFER = ['library', 'weekly', 'wellbeing', 'fairness', 'upward', 'org',

  WP.deferred = function (id) {

/* ============================================================
 * Tempo — App State
 * ------------------------------------------------------------
 * Single source of truth for UI-level state. Views read this
 * and call WP.render() after mutating it via setState().
 * ========================================================== */
(function (WP) {
  'use strict';

  /* ════════════════════════════════════════════════════════════════════
   * THE V3 CUTOVER SWITCH  —  flip this ONE line to throw the default theme.
   *   'dark'  = current look (held through the directors' observation period)
   *   'light' = the WBK PRO V3 light system (navy on white)
   * Pages are built coherent in BOTH themes; the user toggle and saved prefs
   * always win over this default. Reversible at any time — change & redeploy.
   * ════════════════════════════════════════════════════════════════════ */
  var DEFAULT_THEME = 'dark';   // ← Akram: change to 'light' for the V3 cutover
  WP.DEFAULT_THEME = DEFAULT_THEME;

  WP.state = {
    lang: 'en',            // 'en' | 'ar'
    theme: DEFAULT_THEME,  // default honored only when no saved pref exists (see restore())
    authed: false,         // signed in via company email?
    window: 'month',       // 'week' | 'month' | 'year'
    viewerId: 'p_ahmed',   // who is "logged in" (set at sign-in; admin can View-as)
    route: 'dashboard',    // current screen
    selectedId: null,      // person whose profile is open
    refDate: new Date().toISOString().slice(0, 10), // default to TODAY (current period active)
  };

  /* ── F7: per-USER local cache isolation ────────────────────────────────────
   * tempo_session / tempo_data / tempo_events were GLOBAL browser keys, so on a
   * shared device (or after a handover) two people's locally-saved evals / access
   * grants / events could mix until the server re-synced. We namespace every
   * persisted key by the SIGNED-IN identity (verified email), so each user reads
   * only their own cache. This is local-cache isolation only — the real authority
   * stays the server (evaluations/events/people/growth under RLS), untouched here.
   *
   * Identity is the signed-in ACCOUNT's email — NOT WP.state.viewerId, which an
   * admin can "View as" without changing who is logged in. It is locked when authed
   * flips false→true (sign-in) and cleared when it flips true→false (sign-out); both
   * paths flow through setState, so this is observed entirely in core. A tiny global
   * pointer (tempo_uid) records the active identity so the right namespace can be
   * read at boot. All storage stays wrapped in try/catch (never throws). */
  var IDPTR = 'tempo_uid';
  function readPtr() { try { return localStorage.getItem(IDPTR) || '__anon__'; } catch (e) { return '__anon__'; } }
  function writePtr(id) { try { if (id && id !== '__anon__') localStorage.setItem(IDPTR, id); else localStorage.removeItem(IDPTR); } catch (e) {} }
  var _active = readPtr();
  function resolveEmail(viewerId) {
    if (viewerId === '__admin__') return '__admin__';
    var p = (WP.access && WP.access.byId) ? WP.access.byId(viewerId) : null;
    var em = (p && p.email) ? String(p.email).toLowerCase() : '';
    return em || (viewerId ? String(viewerId) : '__anon__');
  }
  function nsKey(base) { return base + '::' + (_active || '__anon__'); }
  // One-time migration of a legacy un-namespaced key into the current namespace,
  // then REMOVE the global so a different identity can't later re-adopt it.
  function migrateLegacy(base) {
    try {
      var legacy = localStorage.getItem(base);
      if (legacy == null) return;
      var nk = nsKey(base);
      if (localStorage.getItem(nk) == null) localStorage.setItem(nk, legacy);   // best-effort, once
      localStorage.removeItem(base);
    } catch (e) {}
  }
  // Only fold legacy globals into a REAL identity (never anonymous), so a signed-out
  // boot doesn't strand a returning user's work under '__anon__'.
  function migrateLegacyAll() {
    if (!_active || _active === '__anon__') return;
    migrateLegacy('tempo_session'); migrateLegacy('tempo_data'); migrateLegacy('tempo_events');
  }

  WP.identity = {
    current: function () { return _active || '__anon__'; },
    nsKey: nsKey,
    // Lock the namespace to the signed-in account; on a real change, fold any legacy
    // globals in and re-hydrate THIS user's saved work. Returns true if it changed.
    adopt: function (viewerId) {
      var id = resolveEmail(viewerId);
      if (!id) return false;
      if (id === _active) return false;
      _active = id; writePtr(id);
      migrateLegacyAll();
      // Wipe the previous user's in-memory work to the mock baseline, THEN load
      // this user's saved work — so a no-reload handover never leaks A's work into B.
      if (WP.persist && WP.persist.resetToBaseline) WP.persist.resetToBaseline();
      if (WP.persist && WP.persist.hydrate) WP.persist.hydrate();
      return true;
    },
    clear: function () {
      _active = '__anon__'; writePtr('__anon__');
      // Sign-out drops the in-memory work too, so the next user starts clean.
      if (WP.persist && WP.persist.resetToBaseline) WP.persist.resetToBaseline();
    },
    _resolveEmail: resolveEmail   // tests
  };

  // Persist the session so a reload keeps you signed in and on the same page
  // (no re-login after every update). Safe if storage is unavailable.
  // NOTE: refDate is intentionally NOT saved — every load defaults to TODAY (active by default).
  const SAVE_KEYS = ['authed', 'viewerId', 'theme', 'lang', 'window', 'route', 'selectedId'];
  const NEEDS_SELECTION = { profile: 1, evaluation: 1, upward: 1 };
  (function restore() {
    try {
      migrateLegacyAll();                       // fold a returning user's legacy keys in (no-op when anon)
      const raw = localStorage.getItem(nsKey('tempo_session'));
      if (!raw) return;
      const s = JSON.parse(raw);
      SAVE_KEYS.forEach(function (k) { if (s[k] !== undefined) WP.state[k] = s[k]; });

      if (NEEDS_SELECTION[WP.state.route] && !WP.state.selectedId) WP.state.route = 'dashboard';
    } catch (e) {}
  })();
  function persist() {
    try {
      const o = {};
      SAVE_KEYS.forEach(function (k) { o[k] = WP.state[k]; });
      localStorage.setItem(nsKey('tempo_session'), JSON.stringify(o));
    } catch (e) {}
  }

  WP.setState = function (patch) {
    var wasAuthed = !!WP.state.authed;
    Object.assign(WP.state, patch);
    var nowAuthed = !!WP.state.authed;
    // Identity lifecycle: lock on sign-in, clear on sign-out. A "View as" change
    // (viewerId changes while authed stays true) deliberately does NOT re-key.
    if (nowAuthed && !wasAuthed) { if (WP.identity) WP.identity.adopt(WP.state.viewerId); }
    else if (!nowAuthed && wasAuthed) { if (WP.identity) WP.identity.clear(); }
    persist();
    if (WP.persist) WP.persist.saveData();   // persist the user's WORK, not just the session
    if (typeof WP.render === 'function') WP.render();
  };

  WP.viewer = function () {
    if (WP.state.viewerId === '__admin__') {
      return { id: '__admin__', level: 'admin', initials: 'SA',
               name: 'Super Admin', nameAr: 'مدير الصلاحيات',
               title: 'Super Admin · Access management', titleAr: 'مدير النظام · إدارة الصلاحيات' };
    }
    // Fall back to the first person if a stale/unknown viewerId was restored,
    // so the app shell never crashes dereferencing an undefined viewer.
    return WP.access.byId(WP.state.viewerId) || (WP.data && WP.data.PEOPLE && WP.data.PEOPLE[0]) || null;
  };

  WP.activityLog = []; // overrides + view-as changes (who/when/why) — provenance
  WP.logEvent = function (entry) {
    WP.activityLog.unshift(Object.assign({ at: new Date().toISOString() }, entry));
  };

  WP.applyDocAttrs = function () {
    document.documentElement.lang = WP.state.lang;
    document.documentElement.dir = WP.i18n.isRTL() ? 'rtl' : 'ltr';
    document.documentElement.setAttribute('data-theme', WP.state.theme);
  };
})(window.WP = window.WP || {});

/* ============================================================
 * Tempo — Access Model
 * ------------------------------------------------------------
 * Locked decision:
 *   employee  → only their own page
 *   manager   → their team (their reports, recursively)
 *   director  → everyone (macro view)
 *
 * The "View as" switcher in the UI swaps the viewer to demo this.
 * ========================================================== */
(function (WP) {
  'use strict';

  function byId(id) { return WP.data.PEOPLE.find(function (p) { return p.id === id; }); }

  function directReports(managerId) {
    return WP.data.PEOPLE.filter(function (p) { return p.managerId === managerId; });
  }

  /* All descendants (team) of a person, inclusive of self. */
  function teamOf(personId) {
    const result = [];
    const seen = {};
    (function walk(id) {
      if (seen[id]) return;
      seen[id] = true;
      const p = byId(id);
      if (p) result.push(p);
      directReports(id).forEach(function (c) { walk(c.id); });
    })(personId);
    return result;
  }

  /* People a given viewer is allowed to see. */
  function visiblePeople(viewer) {
    if (!viewer) return [];
    switch (viewer.level) {
      case 'admin':
      case 'director':
        return WP.data.PEOPLE.slice();
      case 'sr_manager':
      case 'manager':
        return teamOf(viewer.id);           // self + all reports
      default:
        return [viewer];                    // specialists: self only
    }
  }

  function canSee(viewer, targetId) {
    return visiblePeople(viewer).some(function (p) { return p.id === targetId; });
  }

  /* Can this viewer act (assign / message) vs view-only?  Open question
   * in handoff §10 — defaulted to: managers+ can act, specialists view-only. */
  function canAct(viewer) {
    return viewer && (viewer.level === 'admin' || viewer.level === 'director' || viewer.level === 'sr_manager' || viewer.level === 'manager');
  }

  /* Who can manage roles & permissions (the Super Admin screen). */
  function canManage(viewer) {
    return viewer && (viewer.superAdmin || viewer.level === 'admin' || viewer.level === 'director');
  }
  function isSuperAdmin(viewer) { return !!(viewer && (viewer.superAdmin || viewer.level === 'admin')); }

  /* Upward feedback about manager M is visible to people ABOVE M (skip-level
   * routing) + admin/C-level — NEVER to M or anyone below. So raters feel safe. */
  function canSeeUpward(viewer, managerId) {
    if (!viewer || viewer.id === managerId) return false;
    if (viewer.level === 'admin') return true;               // C-level / Super Admin

  }

  /* Score a person object directly (testable without registering them). */

    if (!person) return { id: null, band: null, score: 0, factors: factors, omitted: omitted, suggestedAction: null };
    var refISO = toISO(ref);

    // 1) Sustained overload (from the capacity engine — capacity, never hours)
    var loads = weeklyLoads(person, refISO);
    var overWeeks = loads.filter(function (l) { return l >= CONFIG.overloadPct; }).length;
    if (overWeeks >= CONFIG.overloadMinWeeks) {

        en: 'Over capacity ' + overWeeks + ' of the last ' + CONFIG.lookbackWeeks + ' weeks',
        ar: 'فوق الطاقة ' + overWeeks + ' من آخر ' + CONFIG.lookbackWeeks + ' أسابيع' });

          en: 'Workload trending up (' + Math.round(older) + '% → ' + Math.round(newer) + '%)',
          ar: 'الحِمل في ارتفاع (' + Math.round(older) + '٪ ← ' + Math.round(newer) + '٪)' });
      }

    if (WP.capacity.burnoutSignal(person)) {
      score += CONFIG.points.scheduleClash;
      factors.push({ key: 'scheduleClash', points: CONFIG.points.scheduleClash,
        en: 'Back-to-back / overlapping events with no recovery gap',
        ar: 'فعاليات متتالية أو متداخلة دون فترة تعافٍ' });

        factors.push({ key: 'missedCheckins', points: CONFIG.points.missedCheckins,
          en: 'Daily check-ins dropping (' + (eng.weekDone || 0) + '/' + eng.weekGoal + ' this week)',
          ar: 'تراجع التحديثات اليومية (' + (eng.weekDone || 0) + '/' + eng.weekGoal + ' هذا الأسبوع)' });

    } else {
      omitted.push({ key: 'checkins', en: 'No check-in history yet — factor skipped', ar: 'لا يوجد سجل تحديثات بعد — تم تخطّي العامل' });

    omitted.push({ key: 'recovery', en: 'Leave / time-off not tracked yet — factor skipped', ar: 'الإجازات غير مسجّلة بعد — تم تخطّي العامل' });

   * director/admin, everyone) — enforced by the existing canSeeSensitive gate,
   * which returns true only for self / direct-manager / director. Peers => none.
   * Self is excluded (this is a manager's relief view, not a self-check). */

      .filter(function (r) { return r.band; })

    CONFIG: CONFIG,
    bandFor: bandFor,

  <script>
/* ============================================================
 * Tempo — Fairness / Overload Radar (core)  ·  SPEC: docs/SPEC-fairness-radar.md
 * ------------------------------------------------------------
 * A TEAM-BALANCE support tool, NOT a "bad manager" scoreboard and NOT employee
 * surveillance (Constitution Article II). Pure functions. No DOM. Rule-based and
 * fully explainable (Article V): every flag lists the exact numbers behind it and
 * a suggested rebalancing action.
 *
 * Decision it serves (Article IV): "Which teams have workload concentrated /
 * unevenly distributed, so leadership can rebalance work, coach the manager, or
 * justify a hire?" — redistribute load · coach · justify a hire.
 *
 * Hard rules baked in:
 *  - Inputs are WORKLOAD-distribution signals already in the system (per-person
 *    weekly capacity load %, from capacity.js). NEVER hours, activity, behaviour
 *    or personality. We measure how work is SPREAD across a team, not people.
 *  - No assignments in a team => "not enough data". The balance is NEVER inferred
 *    from an absence of data (Article V).
 *  - Audience gating lives in scan()/canView() via the EXISTING access model: a
 *    director / super-admin sees across teams; a manager sees ONLY their own team.
 *    Never peer-visible, never employee-facing as a judgment.
 * ========================================================== */
(function (WP) {
  'use strict';

  /* Tunable, auditable config — ONE place so thresholds are explainable and any
   * Phase-2 calibration is a config change, not a code change. All in load-% pts. */
  var CONFIG = {
    lookbackWeeks: 4,        // weeks of capacity history we read for the "sustained" check
    overloadPct: 100,        // a member at/above this in the current week is "over capacity"
    lightPct: 40,            // a member at/below this is "light" (matches the 'available' band)
    watchSpreadPts: 30,      // max−min load gap at/above this = worth watching
    bigSpreadPts: 50,        // max−min load gap at/above this = a large imbalance
    wholeTeamRatio: 0.75,    // this share of the team over capacity = whole-team overload
    sustainedMinWeeks: 2     // the imbalance/overload pattern must persist this many weeks to call it sustained
  };

  /* ---- date helpers (mirror capacity/wellbeing: ISO strings, UTC week steps) ---- */
  function toISO(ref) {
    if (!ref) ref = (WP.state && WP.state.refDate) || new Date().toISOString().slice(0, 10);
    if (ref instanceof Date) return ref.toISOString().slice(0, 10);
    return String(ref).slice(0, 10);
  }
  function shiftISO(refISO, days) {
    var d = new Date(refISO + 'T00:00:00Z');
    d.setUTCDate(d.getUTCDate() + days);
    return d.toISOString().slice(0, 10);
  }

  /* The members whose load distribution we balance: a manager's DIRECT reports
   * (the people doing assignable work), excluding unfilled TBC placeholders so an
   * empty seat never fakes a "light" member. */
  function membersOf(managerId) {
    return WP.access.directReports(managerId).filter(function (p) { return !p.tbc; });
  }

  /* Current-week load for one member (reuses the capacity engine — capacity %,
   * never hours). */
  function memberLoad(person, refISO) {
    return WP.capacity.loadForPerson(person, 'week', refISO);
  }

  /* Did the team show the imbalance/overload pattern in a given past week?
   * Pattern = someone over capacity (the thing we want to catch early). */
  function patternInWeek(members, refISO) {
    return members.some(function (p) { return memberLoad(p, refISO) >= CONFIG.overloadPct; });
  }

  function bandActionFor(band, pattern, nums) {
    // pattern: 'wholeTeam' | 'uneven' | null   ·  nums: {over, light, n, spread}
    if (band === 'unbalanced' && pattern === 'wholeTeam') {
      return {
        en: nums.over + ' of ' + nums.n + ' over capacity — the whole team is stretched. Consider load relief or a hire.',
        ar: nums.over + ' من ' + nums.n + ' فوق الطاقة — الفريق كله مضغوط. فكّر بتخفيف الحمل أو بتوظيف.'
      };
    }
    if (band === 'unbalanced') {
      return {
        en: nums.over + ' over 100% while ' + nums.light + ' under ' + CONFIG.lightPct + '% — rebalance work across the team.',
        ar: nums.over + ' فوق 100٪ بينما ' + nums.light + ' تحت ' + CONFIG.lightPct + '٪ — أعد توزيع العمل على الفريق.'
      };
    }
    if (band === 'watch') {
      return {
        en: 'Load is starting to spread unevenly (gap ' + nums.spread + ' pts) — redistribute before it tips.',
        ar: 'الحِمل بدأ يتوزّع بشكل غير متساوٍ (فجوة ' + nums.spread + ' نقطة) — أعد التوزيع قبل أن يختل.'
      };

  /* Balance for ONE team (a manager + their direct reports). Returns band +
   * explainable metrics + factors + a suggested action. Never throws on a missing
   * person; returns a 'noData' shape instead. */
  function teamBalance(managerId, ref) {
    var manager = WP.access.byId(managerId);
    var refISO = toISO(ref);

    var base = {

      band: null,
      size: members.length,
      metrics: null,
      factors: [],
      suggestedAction: null,
      noData: false

    if (!manager || members.length < 2) {
      // need at least two members to talk about distribution between them
      base.noData = true;
      base.factors.push({ key: 'noTeam', en: 'Not enough team members to assess balance', ar: 'لا يوجد أعضاء كافون لتقييم التوازن' });

    }

    var loads = members.map(function (p) { return { id: p.id, load: memberLoad(p, refISO), events: (p.assignedEvents || []).length }; });
    var totalEvents = loads.reduce(function (a, x) { return a + x.events; }, 0);
    if (totalEvents === 0) {
      // genuinely no assignments yet — never infer balance from an absence of data
      base.noData = true;
      base.factors.push({ key: 'noAssignments', en: 'No assignments yet for this team', ar: 'لا توجد مهام مُسندة لهذا الفريق بعد' });
      return base;
    }

    var values = loads.map(function (x) { return x.load; });
    var maxLoad = Math.max.apply(null, values);
    var minLoad = Math.min.apply(null, values);
    var spread = maxLoad - minLoad;
    var n = members.length;
    var over = loads.filter(function (x) { return x.load >= CONFIG.overloadPct; });
    var light = loads.filter(function (x) { return x.load <= CONFIG.lightPct; });

    // how many of the last N weeks showed the pattern (sustained vs one-off)
    var sustainedWeeks = 0;
    for (var i = 0; i < CONFIG.lookbackWeeks; i++) {
      if (patternInWeek(members, shiftISO(refISO, -7 * i))) sustainedWeeks++;
    }

    var wholeTeam = over.length >= Math.ceil(n * CONFIG.wholeTeamRatio);
    var uneven = spread >= CONFIG.bigSpreadPts && over.length >= 1 && light.length >= 1;

    var band, pattern = null;
    if (wholeTeam) { band = 'unbalanced'; pattern = 'wholeTeam'; }
    else if (uneven && sustainedWeeks >= CONFIG.sustainedMinWeeks) { band = 'unbalanced'; pattern = 'uneven'; }
    else if (uneven || over.length >= 1 || spread >= CONFIG.watchSpreadPts) { band = 'watch'; }
    else { band = 'balanced'; }

    // ---- explainable factors: every number that drove the band ----
    var factors = [];
    if (over.length >= 1) {
      factors.push({ key: 'overload', en: over.length + ' of ' + n + ' over capacity (≥' + CONFIG.overloadPct + '%)',
        ar: over.length + ' من ' + n + ' فوق الطاقة (≥' + CONFIG.overloadPct + '٪)' });
    }
    factors.push({ key: 'spread', en: 'Load spread ' + minLoad + '%–' + maxLoad + '% (gap ' + spread + ' pts)',
      ar: 'تفاوت الحِمل ' + minLoad + '٪–' + maxLoad + '٪ (فجوة ' + spread + ' نقطة)' });
    if (over.length >= 1 && light.length >= 1) {
      factors.push({ key: 'unevenSplit', en: light.length + ' under ' + CONFIG.lightPct + '% while ' + over.length + ' over capacity',
        ar: light.length + ' تحت ' + CONFIG.lightPct + '٪ بينما ' + over.length + ' فوق الطاقة' });
    }
    if (band !== 'balanced' && sustainedWeeks >= 1) {
      factors.push({ key: 'sustained', en: 'Pattern seen ' + sustainedWeeks + ' of the last ' + CONFIG.lookbackWeeks + ' weeks',
        ar: 'النمط ظهر ' + sustainedWeeks + ' من آخر ' + CONFIG.lookbackWeeks + ' أسابيع' });
    }
    if (band === 'balanced') {
      factors = [{ key: 'balanced', en: 'Work is evenly distributed (gap ' + spread + ' pts, none over capacity)',
        ar: 'العمل موزّع بالتساوي (فجوة ' + spread + ' نقطة، لا أحد فوق الطاقة)' }];
    }

    var nums = { over: over.length, light: light.length, n: n, spread: spread };
    return {
      managerId: managerId,
      band: band,
      size: n,
      noData: false,
      metrics: {
        overloaded: over.length,
        light: light.length,
        maxLoad: maxLoad,
        minLoad: minLoad,
        spread: spread,
        sustainedWeeks: sustainedWeeks,
        loads: loads
      },
      factors: factors,
      suggestedAction: bandActionFor(band, pattern, nums)
    };
  }

  /* ---- access gate (reuse the existing model) ----
   * A director / super-admin sees balance ACROSS all teams. A line manager (or
   * sr-manager) sees ONLY their own team. Specialists / individual contributors
   * get nothing (never employee-facing as a judgment). */
  function isManagerOf(personId) { return WP.access.directReports(personId).length > 0; }

  function teamsInScope(viewer) {
    if (!viewer) return [];
    if (viewer.level === 'admin' || viewer.level === 'director' || viewer.superAdmin) {
      // every real manager in the org is a team unit
      return WP.data.PEOPLE.filter(function (p) { return !p.tbc && isManagerOf(p.id); }).map(function (p) { return p.id; });
    }
    if (viewer.level === 'manager' || viewer.level === 'sr_manager') {
      return isManagerOf(viewer.id) ? [viewer.id] : []; // own team only
    }
    return [];
  }

  function canView(viewer) { return teamsInScope(viewer).length > 0; }

  /* All teams a viewer may see, worst balance first (unbalanced → watch → balanced
   * → noData). Returns the FULL list in scope (the view shows balanced as a positive
   * outcome); never includes a team outside the viewer's gate. */
  function scan(viewerId, ref) {
    var viewer = WP.access.byId(viewerId);
    var ids = teamsInScope(viewer);
    if (!ids.length) return [];
    var ORDER = { unbalanced: 0, watch: 1, balanced: 2 };
    return ids.map(function (id) { return teamBalance(id, ref); })
      .sort(function (a, b) {
        var oa = a.noData ? 3 : (ORDER[a.band] != null ? ORDER[a.band] : 3);
        var ob = b.noData ? 3 : (ORDER[b.band] != null ? ORDER[b.band] : 3);
        if (oa !== ob) return oa - ob;
        return (b.metrics ? b.metrics.spread : 0) - (a.metrics ? a.metrics.spread : 0);
      });
  }

  WP.fairness = {
    CONFIG: CONFIG,
    teamBalance: teamBalance,
    scan: scan,
    canView: canView
  };
})(window.WP = window.WP || {});

/* ============================================================
 * Tempo — Evidence/Decision events (Intelligence Layer P1, core)
 * SPEC: docs/SPEC-evidence-timeline.md · GATE: ai-os/00-governance/INTELLIGENCE-ETHICS.md
 * ------------------------------------------------------------
 * Pure derivation + query over the append-only event store. Every event is
 * derived from a REAL existing signal and carries its `source` — nothing is
 * fabricated (Ethics #2). Risk entries are framed as early support, not
 * punishment (Ethics #5). No DOM, no business logic in views.
 *
 * P1 timeline = events DERIVED from signals we already have (capacity, wellbeing,
 * completed evaluations, check-ins/kudos) + DECISION events from WP.activityLog,
 * merged with any explicitly appended events from WP.db.events.
 * ========================================================== */
(function (WP) {
  'use strict';

  // delivery/risk/plan are the Slack daily check-in categories (F-034) — appended
  // events from WP.db.events flow through the same timeline + filter as derived ones.
  var CATEGORIES = ['workload', 'wellbeing', 'evaluation', 'recognition', 'decision', 'delivery', 'risk', 'plan'];

  function iso(d) { return (d instanceof Date ? d : new Date(d)).toISOString(); }
  function quarterOf(ts) {

  }
  function ev(o) {
    // every event MUST have a source — guard against fabrication at construction
    if (!o.source) throw new Error('event without a source is not allowed (Ethics #2): ' + o.description);
    return {
      id: o.id, ts: o.ts, type: o.type || 'evidence', actor: o.actor || null, subjectId: o.subjectId,
      category: o.category, description: o.description, source: o.source,
      confidence: o.confidence || 'observed', growth: !!o.growth, evidenceRefs: o.evidenceRefs || []
    };
  }

  /* F6: a broken engine must NOT masquerade as "no evidence". Each derive branch is
   * wrapped in try/catch so one thrown signal can't blank the whole timeline — but a
   * silent catch makes a wiring regression look identical to a genuine absence. So in
   * dev we LOG the branch + error (production stays silent). User-facing behaviour is
   * unchanged: still no fabricated events, still graceful — the failure is just now
   * observable to us, and "not enough evidence" stays reserved for TRUE absence. */
  function isDevMode() {
    try {
      if (WP.config && WP.config.debug != null) return !!WP.config.debug;
      var h = (typeof location !== 'undefined' && location.hostname) ? location.hostname : '';
      return h === 'localhost' || h === '127.0.0.1' || h === '0.0.0.0' || h === '';
    } catch (e) { return false; }
  }

    try {

        '[events.derive] "' + branch + '" branch threw for ' + subjectId +
        ' — emitting nothing for it (a wiring fault, NOT absence of evidence): ' +
        (e && e.message ? e.message : e));
    } catch (_) {}
  }

  /* Build evidence/decision events for one person from live signals. Pure +
   * deterministic given the data; emits NOTHING when a signal is absent (we say
   * "no evidence" rather than invent it). */
  function derive(subjectId, refDate) {

    if (!p) return [];
    var refISO = iso((refDate || (WP.state && WP.state.refDate) || new Date().toISOString().slice(0, 10)) + (String(refDate).length === 10 ? 'T12:00:00Z' : ''));
    var out = [];

      var snap = WP.capacity.snapshot(p, 'month', (refDate || (WP.state && WP.state.refDate)));
      if (snap && snap.load > 0) {
        out.push(ev({ id: 'der_workload_' + subjectId + '_' + refISO, ts: refISO, type: 'evidence', subjectId: subjectId,
          category: 'workload', confidence: 'observed', source: 'Capacity engine',
          description: 'Workload at ' + snap.load + '% (' + WP.i18n.stateLabel(snap.state) + ') this period' }));
      }
    } catch (e) { warnDerive('workload', subjectId, e); }

    // 2) Wellbeing — early SUPPORT signal, never punishment (Ethics #5)
    try {

        var w = WP.wellbeing.scoreFor(subjectId, refDate);
        if (w && w.band) {
          out.push(ev({ id: 'der_wellbeing_' + subjectId + '_' + refISO, ts: refISO, type: 'evidence', subjectId: subjectId,
            category: 'wellbeing', confidence: 'signal', source: 'Wellbeing engine',

        out.push(ev({ id: 'der_eval_' + subjectId + '_' + (rec.updated_at || rec.period || refISO), ts: iso(rec.updated_at || refISO),
          type: 'evidence', subjectId: subjectId, category: 'evaluation', confidence: 'recorded', source: 'Evaluation', growth: true,
          description: 'Evaluation completed (' + (rec.period || '') + ')' + (overall != null ? ' — overall ' + overall + '/5' : '') }));
      }
    } catch (e) { warnDerive('evaluation', subjectId, e); }

    // 4) Recognition / check-ins (growth highlighted)
    try {
      var eng = (WP.engage && WP.engage.snapshot) ? WP.engage.snapshot()[subjectId] : null;
      if (eng) {
        (eng.kudos || []).forEach(function (k, i) {
          out.push(ev({ id: 'der_kudos_' + subjectId + '_' + i, ts: refISO, type: 'evidence', subjectId: subjectId,
            category: 'recognition', confidence: 'recorded', source: 'Check-in / kudos', growth: true,
            description: 'Recognition: “' + k.text + '”' + (k.from ? ' — ' + WP.i18n.name(WP.access.byId(k.from) || { name: k.from }) : '') }));
        });
        if (eng.weekGoal && eng.weekDone >= eng.weekGoal) {
          out.push(ev({ id: 'der_checkin_' + subjectId + '_' + refISO, ts: refISO, type: 'evidence', subjectId: subjectId,
            category: 'recognition', confidence: 'observed', source: 'Daily check-ins', growth: true,
            description: 'Consistent check-ins (' + eng.weekDone + '/' + eng.weekGoal + ' this week)' }));
        }
      }
    } catch (e) { warnDerive('recognition', subjectId, e); }

    // 5) Decision events from the existing activity log (role changes, access, eval edits)
    try {
      (WP.activityLog || []).forEach(function (a, i) {
        if (a.target !== subjectId) return;
        out.push(ev({ id: 'der_act_' + subjectId + '_' + (a.at || i) + '_' + i, ts: iso(a.at || refISO),
          type: 'decision', actor: a.by || null, subjectId: subjectId, category: 'decision', confidence: 'recorded',
          source: 'Activity log', description: (a.type || 'decision') + (a.reason ? ' · ' + a.reason : '') }));

  }

  function filter(events, opts) {
    opts = opts || {};
    return events.filter(function (e) {
      if (opts.category && opts.category !== 'all' && e.category !== opts.category) return false;
      if (opts.quarter && opts.quarter !== 'all' && quarterOf(e.ts) !== opts.quarter) return false;
      return true;
    });

    return events.slice().sort(function (a, b) { return new Date(b.ts) - new Date(a.ts); });
  }

  /* Full timeline: derived (from live signals) ∪ appended (persisted), de-duped

  function query(subjectId, opts, refDate) {

    var listP = (WP.db && WP.db.events) ? WP.db.events.list(subjectId) : Promise.resolve([]);

      var byId = {};
      derived.concat(persisted || []).forEach(function (e) { if (e && e.id) byId[e.id] = e; });

    var seen = {}; events.forEach(function (e) { var q = quarterOf(e.ts); if (q) seen[q] = true; });
    return Object.keys(seen).sort().reverse();
  }

  WP.events = {

 *     Framed as growth/support, every item cites real events. NO readiness score, NO
 *     promote/hold verdict, NO percentage, NO rank. Sparse → "Not enough evidence yet".
 *   orgCapability(opts) -> an AGGREGATED + ANONYMIZED org planning view: capability
 *     distribution + skill-gap areas. HARD k-anonymity: any cohort/cell smaller than
 *     CONFIG.minCohort is suppressed ("too few to show"). No per-person rows, no names.
 *

 *  - Support, not surveil — development evidence + org planning aggregates only;
 *    never a person-score/rank/profile, never presence/behaviour. (Ethics #1)
 *  - Evidence-first — every item cites sourced events; "Not enough evidence yet" and
 *    "too few to show" are valid, first-class outputs. (Ethics #2)
 *  - Human decides — output INFORMS; NO promote/hold/rank/recommendation field. The
