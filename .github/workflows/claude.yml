name: claude-review
on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write          # claude-code-action fetches an OIDC token; without this it errors
jobs:
  review:
    # Only run when explicitly enabled AND a key is configured. Without the ANTHROPIC_API_KEY
    # secret the action can never succeed, so gating here keeps PRs GREEN instead of a red X
    # for a feature that isn't set up. To turn it on: set the repo secret ANTHROPIC_API_KEY
    # and the repo variable ENABLE_CLAUDE_REVIEW=true.
    if: >-
      ${{ (github.event_name == 'pull_request' || contains(github.event.comment.body, '@claude'))
          && vars.ENABLE_CLAUDE_REVIEW == 'true' }}
    runs-on: ubuntu-latest
    continue-on-error: true   # a review hiccup must never block a mergeable PR
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR against Tempo's standards (see docs/ and CLAUDE.md):
            - Finish-gate: base not stale, dist == from-source rebuild, tests green, scope clean, no secrets/real personal data in the repo.
            - Ethics invariants: track work not people; NO surveillance metrics (hours/utilization-as-performance); ranges not per-person scores; k-anonymity on aggregates; explainable/evidence-cited.
            - Craft: a11y (keyboard/aria/focus), i18n (EN+AR, no hardcoded strings), both themes, responsive.
            Post concise inline comments + a summary. Do NOT merge or push to main.
          claude_args: "--max-turns 12"
