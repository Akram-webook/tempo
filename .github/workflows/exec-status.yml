name: Executive Status

# Derive Project-delivery status from merged PRs and COMMIT it into the repo:
#   data/exec-status.json  (the warehouse; git history = audit log)
#   src/status.html        (the shareable report; replaces Google Slides)
# GitHub Pages then serves both with no auth / no CORS / no JSONP. No Google.
on:
  push:
    branches: [main]
    # Its OWN commits write these two files - ignore them so the workflow does
    # not trigger itself in an infinite loop. A real PR merge touches other paths
    # and still fires.
    paths-ignore:
      - 'data/exec-status.json'
      - 'src/status.html'
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      override_narrative:
        description: 'Override narrative text (optional)'
        required: false
      override_wave_notes:
        description: 'JSON object of wave name -> note override (optional)'
        required: false
      override_needsYou:
        description: 'Comma-separated needsYou items (optional)'
        required: false

env:
  EXEC_REQUIRE_COMMIT: '1'   # job FAILS if the commit does not land. Green = data in repo.

# Avoid overlapping runs racing on the same two files (each commit needs the
# latest SHA); newer run wins.
concurrency:
  group: exec-status
  cancel-in-progress: false

jobs:
  update-exec-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to commit data/exec-status.json + src/status.html
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Prove the pipeline end-to-end against a mock GitHub API (compute +
      # history append + commit json/html). Green here == the machine is correct.
      - name: Self-test (compute + history + commit)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: node scripts/compute-exec-status.js --selftest

      - name: Compute + commit exec status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          OVERRIDE_NARRATIVE: ${{ inputs.override_narrative }}
          OVERRIDE_WAVE_NOTES: ${{ inputs.override_wave_notes }}
          OVERRIDE_NEEDSYOU: ${{ inputs.override_needsYou }}
        run: node scripts/compute-exec-status.js
