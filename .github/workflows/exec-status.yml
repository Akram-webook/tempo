name: Exec status (derive from PRs)

# Recompute the exec/project-delivery status from real merged-PR counts and
# push it to the Google Sheet + deck. Fires on every merge to main and daily
# at 07:00 UTC as a catch-all. Health is COMPUTED, never asserted.
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  exec-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Compute + push exec status
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          # EXEC_ENDPOINT falls back to the known /exec URL if unset.
        run: node scripts/compute-exec-status.js
