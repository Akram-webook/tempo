name: Build & deploy to Pages
on:
  push:
    branches: [main]
  # Also deploy after a bot workflow commits new data - those commits are made
  # with GITHUB_TOKEN, which does NOT trigger `push`, so without this the fresh
  # data/exec-status.json or data/feedback.json would never reach Pages.
  #   Executive Status  -> data/exec-status.json + src/status.html
  #   Receive Feedback  -> data/feedback.json
  workflow_run:
    workflows: ["Executive Status", "Receive Feedback"]
    types: [completed]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci || npm install
      - run: node build.js
      - run: npm test
      - run: |
          mkdir -p _site _site/data
          cp dist/index.html _site/index.html
          cp dist/chart.html _site/chart.html
          # GitHub-warehouse: serve the committed status data + shareable report.
          # The app fetch()es /tempo/data/exec-status.json; /tempo/status.html is
          # the leadership report (both committed by the exec-status workflow).
          cp data/exec-status.json _site/data/exec-status.json
          cp data/feedback.json _site/data/feedback.json
          # Durable planned-work backlog: SEPARATE from the CI-regenerated
          # exec-status.json so the auto-refresh can't wipe planned items. The
          # Project-delivery page folds it in for the honest done/planned %.
          cp data/delivery-backlog.json _site/data/delivery-backlog.json
          cp src/status.html _site/status.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
