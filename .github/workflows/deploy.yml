name: Build & deploy to Pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci || npm install
      - run: node build.js
      - run: npm test
      - run: |
          mkdir -p _site _site/data
          cp dist/index.html _site/index.html
          cp dist/chart.html _site/chart.html
          # GitHub-warehouse: serve the committed status data + shareable report.
          # The app fetch()es /tempo/data/exec-status.json; /tempo/status.html is
          # the leadership report (both committed by the exec-status workflow).
          cp data/exec-status.json _site/data/exec-status.json
          cp src/status.html _site/status.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
